name: Actions Security Lint

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: '"$HOME/go/bin/actionlint" .github/workflows/*.yml'

      - name: Install zizmor
        run: python -m pip install zizmor==1.24.1

      - name: Run zizmor high-severity audit
        run: zizmor --offline --min-severity high .github/workflows
