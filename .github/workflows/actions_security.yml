name: Actions Security Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: '"$HOME/go/bin/actionlint" .github/workflows/*.yml'

      - name: Install zizmor
        run: python -m pip install zizmor

      - name: Run zizmor high-severity audit
        run: zizmor --offline --min-severity high .github/workflows
