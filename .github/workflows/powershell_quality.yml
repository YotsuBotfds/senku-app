name: PowerShell Quality Gate

on:
  pull_request:
    paths:
      - ".github/workflows/powershell_quality.yml"
      - "PSScriptAnalyzerSettings.psd1"
      - "scripts/**/*.ps1"
      - "scripts/**/*.psm1"
      - "scripts/**/*.psd1"
      - "tests/powershell/**/*.ps1"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/powershell_quality.yml"
      - "PSScriptAnalyzerSettings.psd1"
      - "scripts/**/*.ps1"
      - "scripts/**/*.psm1"
      - "scripts/**/*.psd1"
      - "tests/powershell/**/*.ps1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-quality:
    name: PowerShell Quality
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PowerShell quality modules
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.24.0 -Scope CurrentUser -Force -AllowClobber
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -AllowClobber
          Get-Module -ListAvailable -Name PSScriptAnalyzer, Pester | Sort-Object Name, Version -Descending | Format-Table Name, Version, Path

      - name: Run PowerShell quality gate
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\run_powershell_quality_gate.ps1 -RequireAnalyzer -RequirePester
