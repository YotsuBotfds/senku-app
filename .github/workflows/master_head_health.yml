name: Master Head Health

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-fixture-head-health:
    name: Generated Fixture Head Health
    uses: ./.github/workflows/non_android_regression.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      mode: Generated
      label: head_health_${{ github.sha }}_generated_fixture
      generated_bench_json: tests\fixtures\non_android_generated\candidate.json
      generated_baseline_diag: tests\fixtures\non_android_generated\baseline_diag
      fail_on_generated_regression: true
      allow_retrieval_warnings: false
      include_safety_critical: false
      retrieval_index_flavor: compact
