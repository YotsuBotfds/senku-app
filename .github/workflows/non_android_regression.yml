name: Non-Android Regression Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Gate mode to run.
        required: true
        default: Fast
        type: choice
        options:
          - Fast
          - Generated
          - All
      label:
        description: Optional output label. Defaults to the GitHub run id.
        required: false
        type: string
      include_safety_critical:
        description: Include the safety-critical retrieval pack.
        required: false
        default: false
        type: boolean
      allow_retrieval_warnings:
        description: Allow retrieval expectation warnings.
        required: false
        default: false
        type: boolean
      generated_bench_json:
        description: Bench JSON path for Generated or All mode.
        required: false
        type: string
      fail_on_generated_regression:
        description: Fail when generated regression gate detects regression.
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      mode:
        required: false
        default: Fast
        type: string
      label:
        required: false
        default: ""
        type: string
      include_safety_critical:
        required: false
        default: false
        type: boolean
      allow_retrieval_warnings:
        required: false
        default: false
        type: boolean
      generated_bench_json:
        required: false
        default: ""
        type: string
      fail_on_generated_regression:
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  non-android-regression:
    name: Non-Android Regression
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install validation dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          "SENKU_PYTHON_PATH=$((Get-Command python).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run non-Android regression gate
        shell: pwsh
        env:
          INPUT_ALLOW_RETRIEVAL_WARNINGS: ${{ inputs.allow_retrieval_warnings }}
          INPUT_FAIL_ON_GENERATED_REGRESSION: ${{ inputs.fail_on_generated_regression }}
          INPUT_GENERATED_BENCH_JSON: ${{ inputs.generated_bench_json }}
          INPUT_INCLUDE_SAFETY_CRITICAL: ${{ inputs.include_safety_critical }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          $label = $env:INPUT_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) {
            $label = "github_${{ github.run_id }}_${{ github.run_attempt }}"
          }

          $args = @(
            '-Mode', $env:INPUT_MODE,
            '-Label', $label,
            '-VenvPath', '.venvs\senku-validate'
          )

          if ($env:INPUT_INCLUDE_SAFETY_CRITICAL -eq 'true') {
            $args += '-IncludeSafetyCritical'
          }
          if ($env:INPUT_ALLOW_RETRIEVAL_WARNINGS -eq 'true') {
            $args += '-AllowRetrievalWarnings'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:INPUT_GENERATED_BENCH_JSON)) {
            $args += @('-GeneratedBenchJson', $env:INPUT_GENERATED_BENCH_JSON)
          }
          if ($env:INPUT_FAIL_ON_GENERATED_REGRESSION -eq 'true') {
            $args += '-FailOnGeneratedRegression'
          }

          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\run_non_android_regression_gate.ps1 @args
          "SENKU_GATE_LABEL=$label" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build attested bench bundle
        id: bench_bundle
        if: always()
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:RUNNER_TEMP 'senku-bench-bundle'
          $benchRoot = Join-Path $bundleRoot 'bench'
          New-Item -ItemType Directory -Force -Path $benchRoot | Out-Null

          $label = $env:SENKU_GATE_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) {
            $label = "github_$($env:GITHUB_RUN_ID)_$($env:GITHUB_RUN_ATTEMPT)"
          }
          $benchDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\bench'
          $selected = @()
          if (Test-Path -LiteralPath $benchDir) {
            $selected += Get-ChildItem -LiteralPath $benchDir -File -ErrorAction SilentlyContinue |
              Where-Object { @('.json', '.md') -contains $_.Extension -and $_.Name.Contains($label) }
            $selected += Get-ChildItem -LiteralPath $benchDir -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name.Contains($label) }
          }

          foreach ($item in $selected) {
            Copy-Item -LiteralPath $item.FullName -Destination $benchRoot -Recurse -Force
          }

          $manifest = @{
            schema_version = 'senku.ci_bench_bundle.v1'
            label = $label
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            repository = $env:GITHUB_REPOSITORY
            sha = $env:GITHUB_SHA
            artifact_count = @($selected).Count
            artifact_names = @($selected | ForEach-Object { $_.Name } | Sort-Object)
            generated_at = (Get-Date).ToUniversalTime().ToString('o')
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $bundleRoot 'bundle_manifest.json') -Encoding utf8

          $bundleZip = Join-Path $env:RUNNER_TEMP ("senku-non-android-regression-{0}-{1}.zip" -f $env:GITHUB_RUN_ID, $env:GITHUB_RUN_ATTEMPT)
          Compress-Archive -Path (Join-Path $bundleRoot '*') -DestinationPath $bundleZip -Force
          "bundle_zip=$bundleZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload bench bundle
        id: upload_bench_bundle
        if: always() && steps.bench_bundle.outputs.bundle_zip != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: non-android-regression-bench-bundle
          path: ${{ steps.bench_bundle.outputs.bundle_zip }}
          if-no-files-found: error
          retention-days: 14

      - name: Attest bench bundle provenance
        if: always() && steps.bench_bundle.outputs.bundle_zip != ''
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: ${{ steps.bench_bundle.outputs.bundle_zip }}
