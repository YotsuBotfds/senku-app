name: Non-Android Regression Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Gate mode to run.
        required: true
        default: Fast
        type: choice
        options:
          - Fast
          - Generated
          - All
      label:
        description: Optional output label. Defaults to the GitHub run id.
        required: false
        type: string
      include_safety_critical:
        description: Include the safety-critical retrieval pack.
        required: false
        default: false
        type: boolean
      allow_retrieval_warnings:
        description: Allow retrieval expectation warnings.
        required: false
        default: false
        type: boolean
      generated_bench_json:
        description: Bench JSON path for Generated or All mode.
        required: false
        type: string
      fail_on_generated_regression:
        description: Fail when generated regression gate detects regression.
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      mode:
        required: false
        default: Fast
        type: string
      label:
        required: false
        default: ""
        type: string
      include_safety_critical:
        required: false
        default: false
        type: boolean
      allow_retrieval_warnings:
        required: false
        default: false
        type: boolean
      generated_bench_json:
        required: false
        default: ""
        type: string
      fail_on_generated_regression:
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  non-android-regression:
    name: Non-Android Regression
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install validation dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock.txt
          "SENKU_PYTHON_PATH=$((Get-Command python).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run non-Android regression gate
        shell: pwsh
        env:
          INPUT_ALLOW_RETRIEVAL_WARNINGS: ${{ inputs.allow_retrieval_warnings }}
          INPUT_FAIL_ON_GENERATED_REGRESSION: ${{ inputs.fail_on_generated_regression }}
          INPUT_GENERATED_BENCH_JSON: ${{ inputs.generated_bench_json }}
          INPUT_INCLUDE_SAFETY_CRITICAL: ${{ inputs.include_safety_critical }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          $label = $env:INPUT_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) {
            $label = "github_${{ github.run_id }}_${{ github.run_attempt }}"
          }

          $args = @(
            '-Mode', $env:INPUT_MODE,
            '-Label', $label,
            '-VenvPath', '.venvs\senku-validate'
          )

          if ($env:INPUT_INCLUDE_SAFETY_CRITICAL -eq 'true') {
            $args += '-IncludeSafetyCritical'
          }
          if ($env:INPUT_ALLOW_RETRIEVAL_WARNINGS -eq 'true') {
            $args += '-AllowRetrievalWarnings'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:INPUT_GENERATED_BENCH_JSON)) {
            $args += @('-GeneratedBenchJson', $env:INPUT_GENERATED_BENCH_JSON)
          }
          if ($env:INPUT_FAIL_ON_GENERATED_REGRESSION -eq 'true') {
            $args += '-FailOnGeneratedRegression'
          }

          "SENKU_GATE_LABEL=$label" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:SENKU_EMBED_URL = 'http://127.0.0.1:8801/v1'

          $cacheDir = Join-Path $env:RUNNER_TEMP 'fastembed-cache'
          $stdoutLog = Join-Path $env:RUNNER_TEMP 'fastembed-stdout.log'
          $stderrLog = Join-Path $env:RUNNER_TEMP 'fastembed-stderr.log'
          "SENKU_FASTEMBED_STDOUT_LOG=$stdoutLog" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SENKU_FASTEMBED_STDERR_LOG=$stderrLog" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:PYTHONUNBUFFERED = '1'

          function Write-FastEmbedLogTail {
            param(
              [Parameter(Mandatory)]
              [string]$Label,

              [Parameter(Mandatory)]
              [string]$Path,

              [int]$LineCount = 40
            )

            if (-not (Test-Path -LiteralPath $Path)) {
              Write-Host "FastEmbed $Label log is not present yet: $Path"
              return
            }

            $lines = Get-Content -LiteralPath $Path -Tail $LineCount -ErrorAction SilentlyContinue
            if ($lines) {
              Write-Host "FastEmbed $Label (last $LineCount lines):"
              $lines | Write-Host
            } else {
              Write-Host "FastEmbed $Label log is empty."
            }
          }

          function Assert-FastEmbedProcessRunning {
            param(
              [Parameter(Mandatory)]
              [System.Diagnostics.Process]$Process
            )

            if ($Process.HasExited) {
              Write-Host "FastEmbed process exited before readiness with exit code $($Process.ExitCode)."
              Write-FastEmbedLogTail -Label 'stdout' -Path $stdoutLog
              Write-FastEmbedLogTail -Label 'stderr' -Path $stderrLog
              throw "FastEmbed service exited before readiness."
            }
          }

          $process = Start-Process `
            -FilePath python `
            -ArgumentList @(
              '-u',
              'scripts\fastembed_openai_server.py',
              '--host', '127.0.0.1',
              '--port', '8801',
              '--cache-dir', $cacheDir,
              '--threads', '2'
            ) `
            -PassThru `
            -WindowStyle Hidden `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog

          try {
            $readinessBody = @{
              input = 'senku readiness probe'
            } | ConvertTo-Json -Compress

            for ($attempt = 1; $attempt -le 30; $attempt++) {
              Assert-FastEmbedProcessRunning -Process $process
              Write-Host "FastEmbed readiness attempt $attempt/30: POST /v1/embeddings"
              try {
                Invoke-RestMethod `
                  -Uri 'http://127.0.0.1:8801/v1/embeddings' `
                  -Method Post `
                  -ContentType 'application/json' `
                  -Body $readinessBody `
                  -TimeoutSec 30 | Out-Null
                Write-Host "FastEmbed service is ready after attempt $attempt."
                break
              } catch {
                Write-Host "FastEmbed readiness attempt $attempt/30 failed: $($_.Exception.Message)"
                Assert-FastEmbedProcessRunning -Process $process
                if ($attempt -eq 1 -or $attempt % 5 -eq 0 -or $attempt -eq 30) {
                  Write-FastEmbedLogTail -Label 'stdout' -Path $stdoutLog -LineCount 30
                  Write-FastEmbedLogTail -Label 'stderr' -Path $stderrLog -LineCount 30
                }
                if ($attempt -eq 30) { throw }
                Start-Sleep -Seconds 2
              }
            }

            python -B ingest.py --rebuild
            powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\run_non_android_regression_gate.ps1 @args
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            } elseif ($process) {
              Write-Host "FastEmbed process had already exited with code $($process.ExitCode)."
            }
            Write-FastEmbedLogTail -Label 'stdout' -Path $stdoutLog
            Write-FastEmbedLogTail -Label 'stderr' -Path $stderrLog
          }

      - name: Collect non-Android failure logs
        id: failure_logs
        if: failure()
        shell: pwsh
        run: |
          $logRoot = Join-Path $env:RUNNER_TEMP 'senku-non-android-failure-logs'
          New-Item -ItemType Directory -Force -Path $logRoot | Out-Null

          $stdoutLog = $env:SENKU_FASTEMBED_STDOUT_LOG
          if ([string]::IsNullOrWhiteSpace($stdoutLog)) {
            $stdoutLog = Join-Path $env:RUNNER_TEMP 'fastembed-stdout.log'
          }
          $stderrLog = $env:SENKU_FASTEMBED_STDERR_LOG
          if ([string]::IsNullOrWhiteSpace($stderrLog)) {
            $stderrLog = Join-Path $env:RUNNER_TEMP 'fastembed-stderr.log'
          }

          $logInputs = @(
            [pscustomobject]@{
              Name = 'fastembed-stdout.log'
              Path = $stdoutLog
            },
            [pscustomobject]@{
              Name = 'fastembed-stderr.log'
              Path = $stderrLog
            }
          )

          $copiedLogs = @()
          foreach ($log in $logInputs) {
            if (Test-Path -LiteralPath $log.Path) {
              Copy-Item -LiteralPath $log.Path -Destination (Join-Path $logRoot $log.Name) -Force
              $item = Get-Item -LiteralPath $log.Path
              $copiedLogs += [pscustomobject]@{
                name = $log.Name
                source = $log.Path
                size_bytes = $item.Length
                last_write_time_utc = $item.LastWriteTimeUtc.ToString('o')
              }
            }
          }

          $manifest = @{
            schema_version = 'senku.ci_failure_logs.v1'
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            job = $env:GITHUB_JOB
            repository = $env:GITHUB_REPOSITORY
            sha = $env:GITHUB_SHA
            gate_label = $env:SENKU_GATE_LABEL
            copied_log_count = @($copiedLogs).Count
            copied_logs = @($copiedLogs)
            generated_at = (Get-Date).ToUniversalTime().ToString('o')
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $logRoot 'failure_manifest.json') -Encoding utf8

          "log_dir=$logRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload non-Android failure logs
        if: failure() && steps.failure_logs.outputs.log_dir != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: non-android-regression-failure-logs
          path: ${{ steps.failure_logs.outputs.log_dir }}
          if-no-files-found: error
          retention-days: 14

      - name: Build attested bench bundle
        id: bench_bundle
        if: always()
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:RUNNER_TEMP 'senku-bench-bundle'
          $benchRoot = Join-Path $bundleRoot 'bench'
          New-Item -ItemType Directory -Force -Path $benchRoot | Out-Null

          $label = $env:SENKU_GATE_LABEL
          if ([string]::IsNullOrWhiteSpace($label)) {
            $label = "github_$($env:GITHUB_RUN_ID)_$($env:GITHUB_RUN_ATTEMPT)"
          }
          $benchDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\bench'
          $selected = @()
          if (Test-Path -LiteralPath $benchDir) {
            $selected += Get-ChildItem -LiteralPath $benchDir -File -ErrorAction SilentlyContinue |
              Where-Object { @('.json', '.md') -contains $_.Extension -and $_.Name.Contains($label) }
            $selected += Get-ChildItem -LiteralPath $benchDir -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name.Contains($label) }
          }

          foreach ($item in $selected) {
            Copy-Item -LiteralPath $item.FullName -Destination $benchRoot -Recurse -Force
          }

          $manifest = @{
            schema_version = 'senku.ci_bench_bundle.v1'
            label = $label
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            repository = $env:GITHUB_REPOSITORY
            sha = $env:GITHUB_SHA
            artifact_count = @($selected).Count
            artifact_names = @($selected | ForEach-Object { $_.Name } | Sort-Object)
            generated_at = (Get-Date).ToUniversalTime().ToString('o')
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $bundleRoot 'bundle_manifest.json') -Encoding utf8

          $bundleZip = Join-Path $env:RUNNER_TEMP ("senku-non-android-regression-{0}-{1}.zip" -f $env:GITHUB_RUN_ID, $env:GITHUB_RUN_ATTEMPT)
          Compress-Archive -Path (Join-Path $bundleRoot '*') -DestinationPath $bundleZip -Force
          "bundle_zip=$bundleZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload bench bundle
        id: upload_bench_bundle
        if: always() && steps.bench_bundle.outputs.bundle_zip != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: non-android-regression-bench-bundle
          path: ${{ steps.bench_bundle.outputs.bundle_zip }}
          if-no-files-found: error
          retention-days: 14

      - name: Attest bench bundle provenance
        if: always() && steps.bench_bundle.outputs.bundle_zip != '' && github.event.repository.private == false
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ steps.bench_bundle.outputs.bundle_zip }}
