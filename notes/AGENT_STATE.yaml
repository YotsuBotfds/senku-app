current_focus:
  primary_objective: "Android parity and testing efficiency"
  active_tracks:
    - id: "retrieval-water-storage"
      status: "in_progress"
      summary: "Broad water-storage still has noisy raw search ordering, but the live Android answer path is stable again: the latest 5554 one-turn replay kept GD-252 as the anchor guide with GD-252 guide-focus sections leading context instead of a GD-373 takeover."
    - id: "retrieval-water-distribution"
      status: "in_progress"
      summary: "Explicit gravity-fed distribution remains a key validation lane. After the latest PackRepository patch, a fresh live 5556 Android replay is now logging water_distribution_priority on the real FTS4/no-bm25 route path and finishes with GD-553/GD-270 top results plus GD-553/GD-270 context."
    - id: "followup-session-continuity"
      status: "in_progress"
      summary: "SessionMemory now carries both water_distribution and cabin-house site/foundation follow-ups with structured retrieval hints instead of collapsing into generic synthetic queries. The latest 5560 drainage/runoff follow-up kept site_selection/foundation in the retrieval query and stayed in the GD-446/GD-094/GD-593 lane."
    - id: "detail-followup-harness"
      status: "landed"
      summary: "The follow-up harness now works end to end across water, candle, house, and water-distribution lanes: per-run temp dumps, frozen second-turn captures, quiet dump-transfer helpers, in-detail submission without fallback, and verified source-link probes are all validated. The 5556 water-distribution source-probe run now also completes cleanly and opens the expected GD-553 guide detail view."
    - id: "auto-followup-automation-contract"
      status: "in_progress"
      summary: "MainActivity automation no longer steals focus into the main search box during auto-followup runs. Manual adb validation on 5554 now keeps the initial search box clean, launches the second turn with a microclimate-aware site-selection query, and returns to DetailActivity with the follow-up prompt in the correct thread input."
    - id: "android-fts4-fallback"
      status: "in_progress"
      summary: "Android runtime still lacks FTS5, but route-focused chunk/guide search no longer skips FTS outright when bm25 is unavailable. Broad site-selection now uses a no-bm25 site-selection priority order plus site-focused route specs, and the current code now also has a dedicated water-distribution no-bm25 priority order instead of falling straight to row-id ordering on that lane."
    - id: "android-harness-warm-start"
      status: "landed"
      summary: "Prompt and detail-followup harnesses now support warm-start runs that skip app force-stop, and the logged wrappers record warm_start plus start/end timestamps in their JSON manifests. A paired 5560 deterministic-candle replay measured cold=15.4 s vs warm=10.0 s, a 35.2% improvement."
    - id: "retrieval-community-governance"
      status: "in_progress"
      summary: "The live Android merge-and-trust lane now anchors on GD-626 instead of GD-865 after tightening specialized structured-anchor bias for community_governance prompts."
    - id: "headless-preflight-harness"
      status: "in_progress"
      summary: "Headless preflight is now baseline-aware and is the preferred off-emulator lane for metadata audits, family-pack review, and no-regression checks before guarded emulator runs."
    - id: "headless-answer-harness"
      status: "in_progress"
      summary: "The off-emulator answer harness remains the preferred scout lane, and it just got materially closer to Android on broad siting prompts. The seasonal house-site crash is fixed, site-selection priority ordering now mirrors the Android no-bm25 broad-site ordering, and a fresh probe now puts GD-446 at the top of both headless search and context for the broad building-site query."
    - id: "retrieval-soapmaking"
      status: "in_progress"
      summary: "The live Android soapmaking lane now backfills cleanly after the route FTS starvation fix: a fresh 5556 search-log replay surfaced GD-122 Cold Process, GD-122 Hot Process, GD-572 Making Soap, and GD-572 Making Lye from Wood Ash ahead of the broader chemistry supports."
    - id: "external-audit-verification"
      status: "landed"
      summary: "The external Android audit has now been re-verified against current code. The prompt/system-role, centroid-drop, and FTS-fallback claims are stale in-tree; the still-real misses are narrower now, mainly house-subsystem over-seeding, broad water-storage answer shaping, and remaining harness brittleness on long Android ask runs."
    - id: "prompt-contract-upgrade"
      status: "in_progress"
      summary: "Host inference now sends a real system-role prompt built from the Android route guidance, and targeted JVM plus live 5556 smoke validation confirmed the new host payload reaches the GPU path cleanly."
    - id: "desktop-tooling-hardening"
      status: "in_progress"
      summary: "Second-audit desktop tooling hardening now covers the whole low-risk batch: guide catalog loading rejects duplicate ids/slugs, bench artifact tooling supports markdown-only artifacts and duplicate prompts, lmstudio_utils classifies opaque 400/request failures more safely, ingest frontmatter/tag cleanup is safer, and bench summary reporting no longer inflates avg-per-successful-prompt."
    - id: "desktop-query-script-guardrails"
      status: "in_progress"
      summary: "Second-audit guardrails are landing on the desktop and harness side: query.py now fails loudly on embedding/spec count mismatches and degrades safely on sparse metadata rows, while the launcher scripts have cleaner default model-path resolution, safer run-label handling, and a repaired session-flow query encoding path."
    - id: "metadata-gate-baseline"
      status: "in_progress"
      summary: "The no-regression metadata gate against refreshed full-pack v5 is now a real tool, not just a note. Active assets still regress badly on water_distribution, and a fresh current-builder probe recovers key GD-105/GD-270/GD-553 structure types but still fails the baseline gate overall."
    - id: "android-search-log-harness"
      status: "landed"
      summary: "Long Android search checks can now skip repeated uiautomator polling and validate from SenkuPackRepo logcat alone through scripts/run_android_search_log_only.ps1."
    - id: "pack-hotswap-harness"
      status: "landed"
      summary: "Pack-only iterations can now push senku_manifest/sqlite/vector directly into files/mobile_pack on debuggable emulator/device targets without rebuilding the APK, and the main prompt/follow-up harnesses can trigger that push inline with -PushPackDir."
    - id: "house-route-cleanup"
      status: "in_progress"
      summary: "Broad house/site routing improved materially again: the no-bm25 broad-site fallback now runs with routeSpecs=2 and site-selection priority ordering, and 5554 broad-site search.topResults are now led by GD-446 guide-focus plus Terrain Analysis / Wind Exposure / Natural Hazards / Water Proximity. House-subsystem cleanup also landed: QueryMetadataProfile now stops treating weatherproofing text as implicit roofing for wall-weatherproof queries, QueryRouteProfile now narrows roof/foundation route specs, and fresh live v15 probes show `explicitTopics=[roofing, weatherproofing]` on 5554 roof, `explicitTopics=[wall_construction, weatherproofing]` on 5556 wall-weatherproof, and `explicitTopics=[foundation, drainage]` on 5560 foundation."
    - id: "detail-followup-input-hardening"
      status: "landed"
      summary: "DetailActivity now disables IME suggestions/personalized learning on the in-thread follow-up field and clears composing text before auto-followups run, which should reduce the merged/jumbled emulator text issue seen in the detail composer."
    - id: "structured-agent-state"
      status: "landed"
      summary: "Structured YAML state file added so agents and harness scripts can read exact repo state without parsing prose notes."
