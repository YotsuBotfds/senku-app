notes: >
  Reviewed for safe, high-level planning closure for GD-873. This card intentionally
  limits scope to pre-build readiness and triage, with explicit forbidden-action
  boundaries around excavation, structural design, detailed ventilation/flooding engineering,
  construction sequencing, and tactical-concealment guidance. It requires
  escalation when flood, air, or egress hazards are present or uncertain.
