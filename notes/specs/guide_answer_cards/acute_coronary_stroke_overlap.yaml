source_invariants:
  - name: chest pain stroke overlap emergency routing
    guide: GD-601
    must_include:
      - cardiac emergency first even if panic, stress, or hyperventilation is also present
      - both sets of signs, or unsure -> treat as the most dangerous; start evacuation
    must_not_match:
      - "chest pressure[^\\n]{0,120}(routine anxiety|panic only|hyperventilation only)"
      - "stroke signs[^\\n]{0,120}(give food|give water|give pills)"
  - name: stroke overlap oral intake precaution
    guide: GD-232
    must_include:
      - do not give food, water, or pills by mouth
    must_not_match:
      - "stroke signs[^\\n]{0,120}(give food|give water|give pills)"
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  Primary owner is GD-601 for cardiac emergency recognition and mixed
  stroke/cardiac routing. GD-232 is reviewed source-family support for
  symptom-first emergency routing, stroke precautions, CPR/AED escalation, and
  no oral intake when stroke signs or reduced alertness are present. This card
  intentionally avoids becoming a medication dosing protocol.
