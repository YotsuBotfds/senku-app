review_status: pilot_reviewed
notes: >
  Reviewed closure for GD-508 as a boundary-only transformer
  condition/intake inventory and handoff card. The source guide contains
  transformer construction, winding, core, insulation, testing, mounting, and
  efficiency material, but this reviewed card carries only visible condition
  inventory, high-voltage/stored-energy red flags, labeling/isolation
  documentation, do-not-energize triggers, access control, and qualified
  electrical owner handoff.
