source_invariants:
  - name: boundary_only_intake_and_handoff
    guide: GD-491
    must_include:
      - "Use it only for labor and delivery practice intake"
      - "timeline logging"
      - "support-person communication"
      - "concise handoff to a clinician, midwife, obstetric service, or emergency responder"
    must_not_match:
      - "Use it only[^\\n]{0,160}(for vaginal exams|for pushing instructions|for delivery maneuvers|for medication)"
      - "Use it only[^\\n]{0,160}(to manage delivery|to treat hemorrhage|for resuscitation)"
  - name: route_emergencies_to_specific_owners
    guide: GD-491
    must_include:
      - "Escalate or route away from this boundary card"
      - "active labor requiring management"
      - "postpartum hemorrhage"
      - "newborn not breathing normally"
      - "hypertensive emergency"
    must_not_match:
      - "heavy bleeding[^\\n]{0,160}(routine|stay home|watchful waiting)"
      - "newborn not breathing[^\\n]{0,160}(routine|wait)"
  - name: exclusions_for_procedures_dosing_clearance
    guide: GD-491
    must_include:
      - "Do not use this reviewed answer-card surface for vaginal exams"
      - "medication or dosing advice"
      - "neonatal resuscitation"
      - "legal decisions"
      - "safe-to-transport certification"
    must_not_match:
      - "safe-to-transport certification[^\\n]{0,120}(provide|issue|confirm)"
runtime_citation_policy: >
  Cite this card only for boundary-level labor/delivery intake logs,
  support-person communication, escalation triggers, and clinician, midwife, OB,
  or emergency handoff. Do not cite it as authority for delivery maneuvers,
  procedures, medication or dosing, induction, fetal-monitor interpretation,
  diagnosis, postpartum hemorrhage treatment, neonatal resuscitation, legal
  decisions, clearance, or certification.
review_status: pilot_reviewed
notes: >
  Boundary-only reviewed answer card for GD-491. It closes the metadata/card
  audit gap by owning labor/delivery practice intake, contraction/ruptured
  membranes/bleeding/fetal movement/maternal symptom timeline logs,
  support-person communication, transport and escalation triggers, and
  clinician/midwife/OB/emergency handoff. It deliberately excludes delivery
  maneuvers, procedures, medication/dosing, induction, fetal-monitoring
  interpretation, diagnosis, postpartum hemorrhage treatment, neonatal
  resuscitation, legal decisions, clearance, and certification. Active labor,
  obstetric emergencies, hypertensive emergency, ectopic pregnancy concern, and
  postpartum hemorrhage should route to more specific owners.
