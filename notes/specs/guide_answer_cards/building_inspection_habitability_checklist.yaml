source_invariants:
  - name: outside-first safety lane
    guide: GD-964
    must_include:
      - Never start by wandering room to room.
      - Use the four levels below before you do anything else.
  - name: decision ladder structure
    guide: GD-964
    must_include:
      - Do not enter
      - Enter only for short salvage
      - Use after repair
      - Reasonable for occupancy after checks
  - name: red-flag priority
    guide: GD-964
    must_include:
      - A building can look "mostly fine" and still be unsafe
      - Active collapse, major sagging, strong gas smell, heavy fire damage, sewage backup, or a floor that feels soft or bouncy
      - Leave and reassess from outside.
review_status: pilot_reviewed
notes: >
  Reviewed for safe triage-only closure on GD-964. This card keeps decisions in a
  do-not-enter / short salvage / use-after-repair / occupancy-after-checks
  lane, enforces outside-first assessment, and blocks rescue, extraction,
  structural engineering, demolition, utility repair, and roof-work playbook
  details. It includes explicit storage-only branch notes and routing handoffs for
  specialist domains.
