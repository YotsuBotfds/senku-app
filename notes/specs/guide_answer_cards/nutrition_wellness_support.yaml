    guide: GD-735
    must_include:
      - "For routine general nutrition when no urgent red flags are present, build most meals from available foods rather than aiming for a perfect menu"
      - "A **starch or grain** for energy"
      - "A **protein food**"
      - "A **fruit or vegetable if available**"
      - "A **small amount of fat** when available"
      - "Water with meals and between meals"
      - "If food is scarce enough that portions must be allocated across people or days, use the rationing guide instead of this general meal-pattern guide."
  - name: hydration signs and severe dehydration boundary
    guide: GD-735
    must_include:
      - "Adequate:** Pale yellow urine, normal thirst"
      - "Mild dehydration:** Dark urine, increased thirst, mild weakness"
      - "Moderate dehydration:** Very dark urine, no urination for hours, weakness, dizziness"
      - "Severe dehydration:** Little/no urine, dizziness even lying down, mental confusion"
  - name: deficiency and professional care red flags
    guide: GD-735
    must_include:
      - "Bleeding gums, loose teeth"
      - "Slow wound healing"
      - "Fatigue, weakness"
      - "Shortness of breath"
      - "Numbness/tingling in extremities"
      - "Unexplained weight loss"
      - "Suspected deficiency disease symptoms"
      - "Growth problems in children"
      - "Pregnancy/lactation"
      - "Chronic disease"
    must_not_match:
      - "(severe dehydration|mental confusion|persistent vomiting|persistent diarrhea|edema|wasting|eating-disorder)[^\\n]{0,180}(routine meal planning|safe to watch|reassure)"
