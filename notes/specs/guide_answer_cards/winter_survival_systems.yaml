      - Pick the smallest protected zone.
      - Build dry insulation before comfort.
  - name: wet-dry wind combustion boundaries
    guide: GD-024
    must_include:
      - Separate wet from dry.
      - Block wind and drafts.
      - Use fire or heaters only as support.
      - do not seal combustion inside a tight sleeping space.
