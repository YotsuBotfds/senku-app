notes: >
  Primary owner is GD-024 for immediate below-freezing, lights-out, or
  overnight winter shelter priorities where the answer must reduce heat loss
  before comfort, food, full shelter construction, or fire-first advice. The
  card is deliberately constrained to GD-024 language and should not add
  unsourced heater procedures, snow-shelter engineering, hypothermia treatment
  protocols, or rescue guarantees.
