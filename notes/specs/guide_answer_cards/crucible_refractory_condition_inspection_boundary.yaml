card_id: crucible_refractory_condition_inspection_boundary
guide_id: GD-604
slug: crucible-refractory-inspection
title: Crucible & Refractory Inspection & Maintenance
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user needs boundary-level crucible or refractory condition inspection, visible crack/spalling/contamination/moisture logging, quarantine or retire trigger screening, or owner handoff.
  - The question is about visible cracks, crack growth, crazing, spalling, missing refractory, adhered metal or slag, contamination, moisture, discoloration, dull or changed ring-test findings already observed, prior failure history, or uncertainty about who can pause use.
  - The problem is observation, documentation, quarantine/retire red flags, and heat/fume/melt owner handoff, not crucible making, refractory recipes, drying/firing schedules, furnace operation, molten-metal work, repair/relining steps, thermal calculations, safe-to-use declarations, legal/code claims, or safety certification.
required_first_actions:
  - Start with non-invasive condition observation only; do not tell the user to touch hot equipment, operate a furnace, melt metal, dry, fire, repair, reline, patch, calculate, or certify the item.
  - Classify the prompt as condition inspection, visible damage log, contamination or moisture question, quarantine/retire trigger screen, prior failure record, or responsible owner handoff.
  - Identify the item, location, owner or responsible operator, current activity status, cooled/access status, visible condition, documentation gaps, and who has authority to pause, quarantine, retire, or escalate the item.
  - Screen no-go triggers before routine logging; if present, route to the responsible foundry, furnace, heat, fume, melt, fire-safety, chemical-safety, emergency, or site owner.
conditional_required_actions:
  - trigger_terms:
      - crack
      - cracked
      - crack growth
      - spalling
      - missing refractory
      - missing lining
      - adhered metal
      - slag
      - contamination
      - contaminated
      - moisture
      - wet
      - damp
      - discoloration
      - dull ring
      - changed ring
      - prior failure
      - pressure to proceed
    required_actions:
      - Treat as a quarantine/retire or owner-handoff screen, not routine approval.
      - Keep the answer limited to non-invasive observation, logging, access control, and responsible owner or emergency routing.
  - trigger_terms:
      - make a crucible
      - refractory recipe
      - drying schedule
      - firing schedule
      - preheat schedule
      - furnace operation
      - melt
      - molten metal
      - repair
      - reline
      - patch
      - calculate
      - safe to use
      - certify
      - code compliant
    required_actions:
      - Give a boundary and do not provide making, recipe, schedule, furnace, molten-metal, repair, relining, calculation, safe-use, legal/code, or certification instructions from this card.
first_actions:
  - Build a condition log with item type, location, date, observer, owner or responsible operator, current activity status, cooled/access status, prior failure or repair notes if already known, and whether work is paused.
  - Record visible condition from a safe non-invasive vantage point: cracks, crack length or growth if already measured safely, crazing, spalling, missing refractory, exposed backing, adhered metal or slag, contamination, moisture, discoloration, erosion, and any dull or changed ring-test finding already observed.
  - Separate observations from decisions: document what was seen, what is unknown, what authority is needed, and whether the item is quarantined, retired, or awaiting qualified review.
  - Record surrounding red flags that change handoff urgency: active heat, fumes, smoke, burn or exposure symptoms, wet area, blocked access control, pressure to proceed, unclear ownership, or planned molten-metal work.
  - End with foundry, furnace, heat, fume, melt, fire-safety, chemical-safety, emergency, or site-owner routing whenever condition, moisture, ownership, activity status, or authority is uncertain.
urgent_red_flags:
  - Visible cracks, crack growth, bottom or side cracks, spalling, missing refractory, exposed backing, adhered metal, contamination, moisture, wetness, discoloration, or evidence of prior failure.
  - Dull, flat, inconsistent, or changed ring-test finding if already observed; do not use this card to teach or certify testing.
  - Active heat, fumes, smoke, molten-metal work planned or active, burn or inhalation symptoms, wet area, uncontrolled access, unclear owner, or pressure to proceed despite uncertainty.
  - Any request to declare a crucible, lining, repair, drying state, furnace setup, PPE, or operation safe, code-compliant, ready for use, or professionally certified.
forbidden_advice:
  - Do not provide crucible making, refractory recipes, material formulation, castable mixing, drying schedules, firing schedules, preheat schedules, or temperature/time ramps.
  - Do not provide furnace setup, fuel or air settings, furnace operation, molten-metal handling, pouring, charging, slag management procedure, or melt workflow.
  - Do not provide repair, patching, relining, re-mortaring, brick replacement, scraping, cleaning, drying, heating, or testing procedures as actionable instructions.
  - Do not provide thermal calculations, life-cycle calculations, safe-to-use declarations, return-to-service approvals, PPE guarantees, legal/code claims, environmental claims, or safety certification.
  - Do not tell users to continue, restart, approach, touch, lift, pour, melt, heat, dry, repair, reline, test, or certify a crucible or refractory after a no-go trigger.
do_not:
  - Do not convert the source guide's refractory selection, thermal cycling, drying/preheating, repair, furnace operation, slag management, or emergency sections into reviewed-card instructions.
  - Do not treat moisture, visible cracks, spalling, missing material, contamination, changed sound, active heat/fumes, prior failure, or pressure to proceed as routine checklist items only.
  - Do not infer fitness, dryness, structural integrity, safe operation, legal compliance, or certification from appearance or from a completed log.
  - Do not let condition logging become repair guidance, furnace operation, molten-metal work, recipe, schedule, calculation, legal advice, or certification.
routine_boundary: >
  This card owns only the reviewed boundary lane for GD-604: non-invasive
  crucible and refractory condition inspection, visible crack/spalling/
  contamination/moisture logging, quarantine or retire trigger recognition,
  and heat/fume/melt owner handoff. It does not own crucible making,
  refractory recipes, drying or firing schedules, furnace operation,
  molten-metal work, repair or relining steps, thermal calculations,
  safe-to-use declarations, legal/code claims, or safety certification.
acceptable_uncertain_fit: >
  If the exact item, material, or severity is unclear but the prompt reports
  visible damage, moisture, contamination, changed sound, prior failure, active
  heat/fumes, planned molten-metal work, or uncertainty about who can pause use,
  provide a conservative observation, quarantine/retire trigger, and handoff
  answer. Ask for owner, activity status, cooled/access status, visible
  condition, and authority; avoid procedure, schedule, calculation, repair,
  operation, safe-use, legal/code, or certification advice.
clarifying_questions:
  - Are you trying to document visible condition, decide whether to quarantine or retire the item, or identify who owns the heat/fume/melt handoff?
  - What item is involved, where is it located, who owns it, and is any heating or molten-metal work planned or active?
  - What can be seen without touching hot equipment: cracks, crack growth, spalling, missing refractory, adhered metal or slag, contamination, moisture, discoloration, or prior failure signs?
  - Is anyone asking for making, recipes, drying/firing schedules, furnace operation, molten-metal work, repair/relining, calculations, safe-to-use approval, legal/code claims, or certification?
applicability:
  owner: crucible/refractory condition inspection, visible damage and moisture logging, quarantine/retire triggers, and heat/fume/melt owner handoff only
  use_when:
    - crucible_condition_inspection
    - refractory_visible_crack_or_spalling_log
    - contamination_or_moisture_screen
    - quarantine_or_retire_trigger_screen
    - heat_fume_melt_owner_handoff
  do_not_use_when:
    - crucible_making_or_refractory_recipe
    - drying_firing_or_preheat_schedule
    - furnace_setup_or_operation
    - molten_metal_work_or_pouring
    - repair_relining_or_patching_steps
    - thermal_calculation_or_life_prediction
    - safe_to_use_legal_code_or_safety_certification
  handoff:
    - foundry-casting for broader foundry-area readiness and owner handoff when the work area, molds, tools, materials, or pouring context dominate.
    - chemical-safety, fire-safety, emergency-care, or local authority when fumes, fire, burns, chemical exposure, symptoms, or active incident response dominate.
    - responsible foundry, furnace, heat, fume, melt, fire-safety, chemical-safety, emergency, or site owner for red flags, authority gaps, operation, repair, return-to-service, legal, or certification requests.
actions:
  required:
    - classify the request as condition inspection, visible damage log, contamination/moisture screen, quarantine/retire trigger, prior failure record, or owner handoff
    - identify item, location, owner, current activity status, cooled/access status, and authority to pause or quarantine
    - lead with quarantine, retire, keep-back, or qualified handoff if red flags are present
    - document visible observations from safe non-invasive vantage points only
    - route making, recipes, schedules, operation, molten-metal work, repair/relining, calculations, safe-use declarations, legal/code claims, and certification away from the card
  standard:
    - create a short condition log with date, observer, item, location, owner, access status, visible condition, moisture/contamination status, prior failure notes, work-paused status, and person notified
    - separate crack, spalling, missing material, adhered metal/slag, contamination, moisture, discoloration, ring-test concern if already observed, heat/fume concern, and ownership/authority gaps
forbidden:
  - crucible making, refractory recipes, material formulation, drying schedules, firing schedules, preheat schedules, or temperature/time ramps
  - furnace setup, fuel/air settings, furnace operation, charging, pouring, slag management procedure, or molten-metal workflow
  - repair, patching, relining, re-mortaring, brick replacement, scraping, cleaning, drying, heating, or testing procedures
  - thermal calculations, life-cycle predictions, safe-to-use declarations, return-to-service approvals, PPE guarantees, legal/code claims, environmental claims, or safety certification
fallback_handoff_language:
  - If a red flag is present, keep people back as appropriate, pause routine condition logging, quarantine or retire the item through the responsible authority, and route to the responsible foundry, furnace, heat, fume, melt, fire-safety, chemical-safety, emergency, or site owner.
  - If the user asks for making, recipes, schedules, furnace operation, molten-metal work, repair/relining, calculations, safe-use, legal/code claims, or certification, explain that this card can organize observations and records for handoff but cannot make those decisions.
  - If someone is burned, exposed to fumes, near active heat, dealing with fire/smoke, or involved in an active molten-metal incident, stop condition-inventory advice and route to emergency or site authorities without giving rescue, repair, or operation tactics.
output:
  required:
    - item identity, location, owner, current activity status, and cooled/access status
    - quarantine, retire, keep-back, or qualified-handoff trigger screen
    - visible condition inventory from safe non-invasive observation
    - crack, spalling, missing material, adhered metal/slag, contamination, moisture, discoloration, prior failure, ring-test concern if already observed, and heat/fume status
    - work-paused or access-control note
    - responsible foundry, furnace, heat, fume, melt, fire-safety, chemical-safety, emergency, or site-owner handoff
    - explicit boundary against making, recipes, drying/firing schedules, furnace operation, molten-metal work, repair/relining, calculations, safe-to-use declarations, legal/code claims, and safety certification
  prohibited:
    - safe-to-use or safe-to-return-to-service declaration
    - crucible making, refractory formulation, drying, firing, preheating, repair, relining, furnace, pouring, or molten-metal procedure
    - thermal calculation, life prediction, PPE guarantee, legal/code claim, environmental claim, or safety certification
routing_tests:
  positive:
    - prompt: "Make a condition log for a crucible with visible side cracks, spalling, adhered slag, possible moisture, and who should decide quarantine."
      expect: crucible_refractory_condition_inspection_boundary
    - prompt: "What should we record before handing a damaged furnace lining with missing refractory and discoloration to the melt owner?"
      expect: crucible_refractory_condition_inspection_boundary
    - prompt: "A crucible sounded dull during an inspection and has prior failure notes. What are the retire or owner-handoff triggers?"
      expect: crucible_refractory_condition_inspection_boundary
  near_miss:
    - prompt: "Give me a refractory recipe and firing schedule for a homemade crucible."
      expect_handoff: qualified_refractory_or_foundry_process_owner
    - prompt: "How should I patch and reline this furnace wall?"
      expect_handoff: qualified_repair_or_refractory_owner
    - prompt: "What preheat schedule and temperature ramp should I use before melting bronze?"
      expect_handoff: qualified_foundry_or_furnace_owner
    - prompt: "Can you certify this crucible is safe to use for a melt?"
      expect_handoff: certification_handoff_not_card
  boundary:
    - prompt: "The crucible has cracks and moisture but people want to pour anyway."
      expect: quarantine_or_retire_owner_handoff_not_routine_logging
    - prompt: "There are fumes, active heat, and a cracked lining; what should we do?"
      expect: heat_fume_emergency_or_site_owner_handoff_not_operation_advice
