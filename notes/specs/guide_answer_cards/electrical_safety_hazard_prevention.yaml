      - Call emergency services if available and de-energize the source FIRST from a dry, safe location.
      - If you cannot de-energize, keep everyone back and wait for the utility or a trained electrical responder when possible.
  - name: exposed_wet_downed_hazard_first
    guide: GD-513
    must_include:
      - Treat this as a hazard before repair, flood cleanup, or generic troubleshooting.
      - Keep people back, do not touch exposed conductors, wet panels, standing water, or metal equipment
      - For a downed utility line, do not approach, do not try to test or move it
  - name: deenergize_before_work_boundary
    guide: GD-513
    must_include:
      - De-energize before working
      - Lockout/tagout (LOTO) prevents the unexpected energization of equipment during maintenance or repair.
      - attach a written tag stating
  - name: electrical_fire_no_water
    guide: GD-513
    must_include:
      - Do not throw water on an electrical fire.
      - If smoke or flame is spreading, evacuate first.
