  - name: post-storm staged restoration sequence
    guide: GD-649
    must_include:
      - Stop and isolate hazards first.
      - Map what is actually energized.
      - Triage loads before restoring circuits.
      - Bring temporary power up in small steps.
      - Log and hand off the temporary state.
  - name: temporary load priorities and documentation
    guide: GD-649
    must_include:
      - communication, lighting for safe movement, medical refrigeration or care loads, water pumping, and battery charging
