source_invariants:
  - name: reviewed answer-card scope and exclusions
    guide: GD-029
    must_include:
      - This is the reviewed answer-card surface for GD-029.
      - disaster or mass-casualty intake and handoff support
      - simple casualty status log
      - obvious life-threat red flags
      - Do not use this reviewed card to diagnose patients
      - certify that a scene is safe
  - name: incident command and documentation anchors remain present
    guide: GD-029
    must_include:
      - The Incident Command System (ICS) is a standardized approach to managing emergency incidents.
      - Begin scene assessment
      - Transfer command to senior authority as they arrive
      - Maintained at command post to track all patients
      - Incident number
      - Situation summary
  - name: excluded source content is not reviewed card authority
    guide: GD-029
    must_include:
      - START Triage System
      - JumpSTART Triage (Pediatric Version)
      - Resource Allocation Under Scarcity
      - Transport Coordination
      - BLACK - EXPECTANT (Unsurvivable)
review_status: pilot_reviewed
notes: >
  Reviewed boundary card for GD-029. It closes the metadata/card audit gap for
  disaster-triage as an intake, status-log, scene-safety reminder, obvious
  life-threat red-flag, incident-command handoff, and documentation card only.
  It deliberately excludes diagnosis, treatment or procedure instructions,
  detailed triage algorithms or color-tag assignment authority, resource
  allocation, transport priority decisions, death/pronouncement,
  legal/liability claims, and safety certification. READY_FOR_PARENT_CLOSE.
