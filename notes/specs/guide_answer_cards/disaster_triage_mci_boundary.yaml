card_id: disaster_triage_mci_boundary
guide_id: GD-029
slug: disaster-triage
title: Disaster Triage & MCI
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A disaster, accident, mass-casualty incident, crowd injury, collapse, crash, explosion, storm, fire, or similar scene has multiple people injured or possibly injured and the user needs boundary-safe first-pass intake.
  - The user needs help recording casualty count, location, status, obvious life-threat red flags, scene hazards, current role, incident-command contact, or responder handoff details.
  - The prompt asks for disaster-triage help but must avoid diagnosis, treatment/procedure instructions, detailed triage algorithms, color-tag authority, resource allocation, transport priority, death/pronouncement, legal/liability claims, or safety certification.
required_first_actions:
  - Start with scene safety and role boundary; do not imply the user should enter an unsafe scene or personally manage the incident beyond their training and assigned role.
  - If emergency services, site command, incident command, EMS, fire, police, or trained responders are available, direct the user to hand off or report through that chain immediately.
  - Keep the answer to an intake-and-handoff log: casualty count, locations, approximate age/description if known, conscious/breathing/bleeding/altered status if obvious, hazards, time found, and who received the handoff.
  - Flag obvious life-threat concerns for urgent handoff without diagnosing or assigning triage-category authority.
conditional_required_actions:
  - trigger_terms:
      - unsafe scene
      - fire
      - smoke
      - collapse
      - downed wire
      - gas leak
      - active shooter
      - hazmat
      - flood
      - structural damage
    required_actions:
      - Lead with staying out of the hazard area, moving to a safer position if already exposed, and reporting the hazard to emergency services or incident command.
      - Do not certify the scene safe or tell the user to enter, search, rescue, or perform technical operations.
  - trigger_terms:
      - triage color
      - red tag
      - yellow tag
      - green tag
      - black tag
      - START
      - JumpSTART
      - priority transport
      - allocate resources
      - ventilator
      - pronounce dead
    required_actions:
      - Give boundary-only handoff language and say detailed triage-category assignment, transport priority, resource allocation, and death/pronouncement decisions belong to trained incident/medical authority.
      - Do not teach the detailed algorithm or make the category, allocation, transport, or pronouncement decision.
first_actions:
  - Establish the user's role and location relative to the scene, then separate what they directly observed from reports or guesses.
  - Record scene hazards, access limits, safe rally point or command-post location if already identified, and whether emergency services or incident command has been notified.
  - Build a simple casualty count/status log with a unique temporary identifier, location, description, obvious status, time seen, and handoff recipient.
  - Note obvious life-threat red flags for handoff such as not breathing, severe bleeding, altered or unresponsive behavior, trapped/crushed person, chest pain or severe shortness of breath, major burns, or rapidly worsening condition.
  - End with a concise handoff script to incident command, EMS, fire, police, site safety, or the responsible responder.
urgent_red_flags:
  - The scene is still unsafe because of fire, smoke, collapse risk, traffic, electrical hazard, gas, hazmat, violence, floodwater, unstable ground, or other active danger.
  - Any person appears not breathing, unresponsive, severely bleeding, trapped, crushed, badly burned, rapidly worsening, or unable to move away from ongoing danger.
  - A person has chest pressure, jaw or arm pain, sudden shortness of breath, sweating, nausea, confusion, dizziness, or altered behavior after the incident.
  - Casualty count is uncertain, people may still be missing, or the incident is larger than available responders can manage.
forbidden_advice:
  - Do not diagnose injuries or illness, name definitive conditions, or tell the user a patient is stable.
  - Do not give treatment, medication, airway, bleeding-control, splinting, extrication, rescue, or other procedure instructions from this card.
  - Do not teach detailed START, JumpSTART, pediatric triage, triage category, or color-tag assignment algorithms.
  - Do not decide resource allocation, rationing, field-hospital staffing, transport priority, destination, discharge, or evacuation order.
  - Do not pronounce death, decide expectant/non-survivable status, make legal or liability claims, or certify scene safety.
do_not:
  - Do not let documentation delay emergency notification or handoff to incident command or trained responders.
  - Do not convert the source guide's START, JumpSTART, color categories, resource allocation, transport coordination, treatment, medication, airway, ventilator, or death/pronouncement content into reviewed-card instructions.
  - Do not answer as incident commander, EMS authority, physician, safety officer, legal advisor, or certifying inspector unless the prompt is only asking how to prepare an observation handoff for them.
routine_boundary: >
  Routine GD-029 reviewed-card answers are limited to disaster/MCI intake and
  handoff: scene-safety reminders, casualty count and status logs, obvious
  life-threat red-flag noting, role or incident-command handoff, and
  documentation. Diagnosis, treatment or procedure instructions, detailed
  triage algorithms, color-tag assignment authority, resource allocation,
  transport priority decisions, death/pronouncement, legal/liability claims,
  and safety certification are outside this card.
acceptable_uncertain_fit: >
  If the prompt may involve a mass-casualty or disaster scene but casualty
  count, hazards, command structure, or user role is unclear, lead with safety,
  emergency/incident-command handoff, and a minimal observation log. Ask only
  clarifying questions that improve handoff and do not delay reporting active
  danger or obvious life threats.
clarifying_questions:
  - What active hazards are present, and are you in a safe place outside the hazard area?
  - Has emergency services, site safety, EMS, fire, police, or incident command been notified?
  - How many casualties can you see, where are they, and are any unresponsive, not breathing, severely bleeding, trapped, burned, altered, or rapidly worsening?
  - What is your role at the scene: bystander, assigned staff, first responder, medical responder, or command/support?
  - Who should receive the handoff, and what identifier or location should be used for each casualty?
applicability:
  owner: disaster and mass-casualty intake, documentation, and command handoff boundary
  use_when:
    - disaster_mci_scene_intake
    - casualty_count_status_log
    - scene_hazard_handoff
    - obvious_life_threat_red_flag_reporting
    - incident_command_or_responder_handoff
    - disaster_documentation_tracking
  do_not_use_when:
    - diagnosis_or_medical_stability_claim
    - treatment_procedure_or_medication_instruction
    - start_jumpstart_algorithm_or_color_tag_assignment
    - resource_allocation_transport_priority_or_destination_decision
    - death_pronouncement_expectant_status_or_legal_liability_claim
    - safety_certification_or_rescue_entry_decision
  handoff:
    - acute-coronary-cardiac-emergencies for focused chest-pain or heart-attack emergency content after urgent scene handoff.
    - shock-recognition-resuscitation for clinician or trained responder shock support outside this MCI intake card.
    - search-rescue, fire-suppression, nbc-defense, or structural-safety-building-entry when the prompt asks for technical rescue, fire, hazardous material, or damaged-building operations.
actions:
  required:
    - classify the prompt as scene-safety, casualty-count, status-log, obvious-red-flag, role-handoff, or documentation support
    - preserve the user's role boundary and route command decisions to incident command or trained responders
    - separate direct observations from uncertain reports
    - include an emergency or incident-command handoff when any active hazard or obvious life threat is present
  standard:
    - create a concise log with casualty identifier, location, time seen, obvious status, hazards, and handoff recipient
    - include scene access and command-post or rally-point details only if already known
    - use plain red-flag language rather than diagnosis or triage color assignment
forbidden:
  - diagnosis or stability claims
  - treatment, medication, airway, bleeding-control, splinting, rescue, extrication, or transport instructions
  - detailed START, JumpSTART, pediatric triage, color-tag assignment, or category authority
  - resource allocation, rationing, transport priority, destination, or discharge decisions
  - death/pronouncement, legal/liability advice, or safety certification
fallback:
  - If the prompt asks what tag color to assign, answer that this reviewed card can help record observations for trained triage authority but cannot assign triage categories.
  - If the prompt asks how to treat someone, answer only the MCI handoff boundary and route treatment to EMS, trained responders, or the relevant emergency guide.
  - If the prompt asks whether the scene is safe, say this card cannot certify safety and route to incident command, safety officer, fire, hazmat, law enforcement, or structural authority as applicable.
output:
  required:
    - scene-safety and role boundary
    - emergency or incident-command handoff path
    - casualty count/status log fields
    - obvious life-threat red flags for handoff
    - documentation and handoff script
    - explicit exclusion of diagnosis, treatment, detailed triage/color authority, allocation, transport, pronouncement, legal/liability, and certification decisions when relevant
  prohibited:
    - triage color assignment
    - detailed START or JumpSTART instructions
    - treatment or procedure instruction
    - resource allocation or transport priority decision
    - death/pronouncement or safety-certification claim
routing_tests:
  positive:
    - prompt: "There are multiple injured people after a bus crash. I need a quick casualty count and handoff note for EMS."
      expect: disaster_triage_mci_boundary
    - prompt: "How should I log who is hurt and report obvious red flags to incident command after an explosion?"
      expect: disaster_triage_mci_boundary
  near_miss:
    - prompt: "What START color should I assign to this patient and who gets transported first?"
      expect_handoff: trained_triage_or_incident_command_authority
    - prompt: "Teach me the JumpSTART pediatric algorithm step by step."
      expect_handoff: detailed_triage_algorithm_outside_reviewed_card
  boundary:
    - prompt: "Can I certify this collapse scene safe for volunteers to enter?"
      expect: safety_certification_handoff_not_card_authority
    - prompt: "This person looks dead; should I pronounce them?"
      expect: death_pronouncement_handoff_not_card_authority
runtime_citation_policy: reviewed_source_family
