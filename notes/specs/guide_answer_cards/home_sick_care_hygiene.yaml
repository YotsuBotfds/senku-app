notes: >
  Reviewed card closure for GD-924. It supports household-level routine hygiene for an
  actively sick person at home and sets strict escalation boundaries for blood in stool,
  coffee-ground or bloody vomit, severe abdominal danger signs, dehydration risk, breathing
  compromise, and cluster spread. It excludes diagnosis, invasive care, medication
  instructions, and broad outbreak-management workflows beyond household containment.
