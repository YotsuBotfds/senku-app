fallback:
  - If active red-flag signs suggest surgical abdomen, shock risk, or severe dehydration, route to acute-abdominal-emergencies and emergency care immediately.
  - If several household members become ill quickly with likely shared exposure, route to community-kitchen-mess-hall-operations or camp-outbreak-dysentery-operations while preserving household spread controls.
  - If stool/vomit cleanup looks chemically contaminated or highly toxic, route to chemical-safety for contamination decision support.
