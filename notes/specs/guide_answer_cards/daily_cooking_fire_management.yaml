source_invariants:
  - name: fuel and startup rhythm
    guide: GD-953
    must_include:
      - "The best cooking fuel is dry, predictable, and easy to split or arrange into the size you need."
      - "The simplest rule is this: small, dry fuel plus good airflow usually beats a big fire."
      - "The easiest way to fail at cooking fire management is to try to cook before the fire is ready."
  - name: smoke reduction boundary
    guide: GD-953
    must_include:
      - "Smoke is often a sign of poor fuel, poor airflow, or a fire that is too cool."
      - "If the smoke is thick and gray, the fire is usually too cool or too wet."
      - "Do not smother a cooking fire with too much fuel at once."
  - name: ash and ember boundary
    guide: GD-953
    must_include:
      - "Ash and embers stay dangerous after the flames look gone."
      - "Treat all ash as hot until proven otherwise."
      - "Do not throw hot ash into a trash pile, leaf pile, or wood storage area."
  - name: coal banking boundary
    guide: GD-953
    must_include:
      - "Banking coals means reducing a fire to a small, controlled bed that can be brought back to cooking heat later."
      - "If you are unsure, fully extinguish the fire instead of trying to save it."
      - "in windy conditions that make stray embers likely"
