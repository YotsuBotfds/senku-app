notes: >
  This card is intentionally bounded to routine cooking-fire control, smoke reduction,
  ash/ember safety, and coal banking for daily operation. It avoids recipe coaching,
  indoor stove/chimney diagnostics, carbon-monoxide treatment, and medical-timing
  protocols. If any red-flag respiratory, exposure, injury, or acute safety signal is
  present, use explicit handoff language and stop routine coaching.
