card_id: herbal_medicine_plant_product_safety_boundary
guide_id: GD-369
slug: sur-03-herbal-medicine
title: Herbal Medicine Guide
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user asks for safety intake around a medicinal plant, herbal product, tea, tincture, salve, poultice, supplement, wild-harvested plant material, plant exposure, or plant ingestion discussed in the herbal medicine guide.
  - The prompt includes plant-ID or source uncertainty, dangerous lookalike concern, label/source uncertainty, symptoms after ingestion or exposure, allergy risk, medication interaction risk, pregnancy, child exposure, chronic disease, or a need for stop-use and handoff language.
  - The answer can stay boundary-only without plant identification certainty, edibility claims, treatment diagnosis, dosing, preparation recipes, tincture/salve/poultice instructions, medication substitution, legal claims, certification claims, or safety certification.
required_first_actions:
  - Keep the answer boundary-only: medicinal plant/product intake, plant-ID/source uncertainty, dangerous lookalike concern, allergy/drug interaction/pregnancy/child/chronic disease flags, ingestion or exposure symptom logs, label/source logs, stop-use flags, and clinician, Poison Control, pharmacist, or qualified local expert handoff.
  - Stop use and route to Poison Control, emergency services, a clinician, pharmacist, or qualified local plant expert when plant/product identity or source is uncertain, symptoms are present, ingestion or exposure was accidental, a child or pregnant/breastfeeding person is involved, chronic disease or medication interactions may matter, or a dangerous lookalike is plausible.
  - Treat a user-supplied plant name, folk name, label, photo, smell, taste, or single field trait as intake evidence only, not proof of plant identity, edibility, purity, dose, effectiveness, or safety.
  - For unknown ingestion or mouth exposure, advise no further ingestion and prompt Poison Control or clinical handoff; do not induce vomiting, neutralize with home remedies, or provide treatment instructions.
conditional_required_actions:
  - trigger_terms:
      - unknown plant
      - lookalike
      - hemlock
      - foxglove
      - water hemlock
      - giant hogweed
      - poison parsnip
      - wild harvested
      - unlabeled
      - homemade
      - mold
      - contaminated
    required_actions:
      - Preserve uncertainty, stop use, log source and label details, and route to Poison Control, clinician, pharmacist, or qualified local plant expert.
      - Do not provide plant ID certainty, edibility claims, preparation, dose, or safe-to-use reassurance.
  - trigger_terms:
      - pregnant
      - pregnancy
      - breastfeeding
      - child
      - baby
      - infant
      - blood thinner
      - warfarin
      - heart medicine
      - seizure medicine
      - antidepressant
      - diabetes medicine
      - immunosuppressant
      - birth control
    required_actions:
      - Treat as a medication, pregnancy, child, or chronic-risk handoff before routine herbal discussion.
      - Log the product/plant, route, timing, symptoms, label/source facts, medical context, allergies, and current medicines without giving dosing, substitution, or interaction-management instructions.
  - trigger_terms:
      - vomiting
      - diarrhea
      - rash
      - swelling
      - trouble breathing
      - throat tightness
      - drooling
      - confused
      - fainting
      - seizure
      - chest pain
      - palpitations
      - vision
      - eye pain
    required_actions:
      - Put urgent Poison Control, emergency, or clinician handoff ahead of completing routine documentation.
      - Preserve symptoms and timing in the log without diagnosing or recommending treatment.
first_actions:
  - Ask what was taken, touched, inhaled, applied, or prepared; when; by whom; and by what route.
  - Record the plant or product name exactly as written, ingredient list, concentration or strength as printed on the label, lot or batch, expiration date, seller/source, wild-harvest location if relevant, preparation type if already made, and whether the container, label, receipt, safe photo, or remaining sample is available.
  - Separate known facts from uncertainty: unknown plant, uncertain lookalike, partial plant material, conflicting field-guide or local-name advice, unlabeled product, mixed ingredients, changed smell/color, mold, contamination concern, or unclear dose already taken.
  - Screen for allergy history, pregnancy or breastfeeding, child exposure, older adult/frailty, liver/kidney/heart disease, bleeding disorder, immune suppression, seizure disorder, planned surgery, and current medicines or supplements.
  - Log symptoms and timing after ingestion or exposure, including rash, itching, swelling, breathing trouble, swallowing trouble, drooling, vomiting, diarrhea, abdominal pain, dizziness, fainting, confusion, agitation, drowsiness, seizure, palpitations, chest pain, eye pain, or vision change.
  - Preserve labels, source notes, receipt, safe photos, and remaining sample for handoff when this can be done without more exposure.
urgent_red_flags:
  - Trouble breathing, wheezing, throat tightness, facial/lip/tongue swelling, trouble swallowing, drooling, widespread hives, or fast-worsening allergic symptoms.
  - Severe vomiting or diarrhea, severe abdominal pain, chest pain, palpitations, fainting, confusion, severe drowsiness, seizure, severe agitation, eye pain, or vision change after plant or herbal product exposure.
  - Unknown ingestion, unlabeled product use, suspected dangerous lookalike, mold or contamination concern, or accidental exposure involving a child, pregnant/breastfeeding person, older adult, pet, or livestock.
  - Current prescription medicines, blood thinners, heart medicines, seizure medicines, psychiatric medicines, diabetes medicines, immunosuppressants, birth control, or multiple supplements where interaction risk is plausible.
  - Chronic liver, kidney, heart, bleeding, immune, seizure, pregnancy, or cancer/chemotherapy context before or after herbal use.
forbidden_advice:
  - Do not identify a plant with certainty from a photo, label, smell, taste, folk name, single trait, or user description.
  - Do not decide that an unknown plant, wild-harvested plant, herbal product, tea, tincture, salve, poultice, capsule, powder, supplement, or essential oil is safe to ingest, apply, inhale, forage, feed to animals, or use medicinally.
  - Do not recommend treatment, dosing, frequency, duration, preparation recipes, tincture/salve/poultice instructions, substitutions for medications, pregnancy or child dosing, stopping prescribed medicine, or combining herbs with medications.
  - Do not diagnose symptoms, certify a product/source as safe, make legal or regulatory claims, issue certification claims, or provide foraging edibility decisions.
  - Do not induce vomiting, neutralize with home remedies, advise activated charcoal, or give poisoning treatment unless Poison Control or a clinician specifically directs it.
do_not:
  - Do not convert the source guide's preparation, dosing, condition-treatment, extraction, standardization, or potency-optimization material into reviewed answer-card instructions.
  - Do not let routine herbal education delay emergency, poison-control, pharmacist, clinician, veterinarian, or local expert handoff when red flags or uncertainty are present.
  - Do not treat a source guide plant name, folk name, label claim, photo, or single field trait as proof of identity, purity, dose, effectiveness, or safety.
routine_boundary: >
  Routine GD-369 reviewed-card answers are limited to medicinal plant and
  herbal product safety intake, plant-ID/source uncertainty, dangerous lookalike
  concern, allergy/drug interaction/pregnancy/child/chronic disease red-flag
  screening, ingestion or exposure symptom logs, label/source logs, stop-use
  flags, and concise handoff to Poison Control, a clinician, pharmacist,
  veterinarian, or qualified local plant expert. They are not plant
  identification, edibility, treatment diagnosis, dosing, preparation,
  tincture/salve/poultice, medication-substitution, legal, certification, or
  safety-certification answers.
acceptable_uncertain_fit: >
  If the user is unsure what plant or product was used, whether the source or
  label is reliable, whether a dangerous lookalike is possible, or whether
  symptoms are related, answer from the conservative uncertainty lane: stop use,
  avoid further ingestion or exposure, document facts and symptoms, preserve
  label/source evidence when safe, and hand off to Poison Control, a clinician,
  pharmacist, veterinarian, or qualified local plant expert as appropriate.
clarifying_questions:
  - What exactly was taken, touched, inhaled, applied, or prepared, and when?
  - Who was exposed, and are they a child, pregnant or breastfeeding, older/frail, chronically ill, taking medications, or managing allergies?
  - What symptoms are present now, and when did they start relative to the plant or product exposure?
  - Is the product container or label available, including ingredient list, concentration, lot/batch, expiration date, and seller/source?
  - Was the plant wild-harvested, unlabeled, homemade, moldy, contaminated, or uncertain because of a dangerous lookalike, partial plant material, or local-name mismatch?
fallback:
  - If a prompt mixes intake with plant identification, edibility, treatment, dosing, preparation, medication substitution, legal, certification, or safety-certification requests, answer only the intake, uncertainty, red-flag screen, stop-use, label/source log, and handoff portion.
  - If plant identity, source, label, timing, symptoms, pregnancy/child/chronic-disease status, medication list, or decision owner is unknown, preserve that uncertainty in the log and route before concluding.
  - If allergy signs, severe symptoms, unknown ingestion, suspected toxic lookalike, child/pregnancy exposure, chronic disease, or medication interactions appear, stop routine discussion and prioritize Poison Control, emergency, clinician, pharmacist, veterinarian, or qualified local expert handoff.
fallback_handoff_language:
  - "This GD-369 reviewed card can help build a medicinal plant or herbal product intake log, separate known facts from uncertainty, screen red flags, stop further use, preserve labels/source notes, and prepare Poison Control, clinician, pharmacist, or qualified local expert handoff."
  - "It cannot identify a plant with certainty, decide edibility, diagnose or treat symptoms, give dosing, provide preparation recipes or tincture/salve/poultice instructions, substitute for medication, make legal or certification claims, or certify safety."
  - "If symptoms, unknown ingestion, a possible dangerous lookalike, child or pregnancy exposure, chronic disease, medication interactions, uncertain source, or missing label details are involved, do not wait for a complete log before urgent handoff."
applicability:
  owner: medicinal plant and herbal product safety intake, uncertainty, red-flag screening, label/source logging, stop-use, and handoff
  use_when:
    - medicinal_plant_or_product_intake
    - plant_id_or_source_uncertainty
    - dangerous_lookalike_concern
    - allergy_interaction_pregnancy_child_chronic_disease_flags
    - ingestion_or_exposure_symptom_log
    - label_source_stop_use_handoff
  do_not_use_when:
    - plant_identification_certainty_or_edibility_decision
    - treatment_diagnosis_or_herbal_regimen
    - dosing_frequency_duration_or_standardization
    - preparation_recipe_tincture_salve_or_poultice_instructions
    - medication_substitution_or_interaction_management
    - legal_certification_claim_or_safety_certification
actions:
  required:
    - classify the request as intake, uncertainty, dangerous lookalike concern, red-flag screen, symptom log, label/source log, stop-use, or handoff planning
    - begin with product or plant name as stated, route, timing, exposed person, symptoms, label/source facts, uncertainty, allergies, pregnancy/child/chronic disease status, and current medicines
    - screen red flags before routine herbal discussion and route urgent findings to Poison Control, emergency, clinician, pharmacist, veterinarian, or qualified local expert owners
    - hand off plant ID certainty, edibility, diagnosis, treatment, dosing, preparation, medication substitution, legal, certification, and safety-certification requests
  standard:
    - provide a medicinal plant or herbal product intake log template
    - include known facts, uncertainty, red flags, label/source evidence, stop-use flags, and handoff owner
forbidden:
