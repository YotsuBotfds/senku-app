notes: >
  Reviewed closure for GD-110 as a hazard-recognition, assessment, logging, and
  handoff card only. It covers visible distress, access restrictions, water
  level changes, evacuation or keep-back triggers, inspection logs, and
  owner/engineer routing. It deliberately excludes calculations, design, repair,
  load ratings, construction, temporary shoring, flood-control manipulation,
  rescue tactics, legal/code claims, and safety certification.
