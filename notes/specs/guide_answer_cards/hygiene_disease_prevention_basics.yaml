source_invariants:
  - name: critical handwashing priority
    guide: GD-732
    must_include:
      - The single most effective thing you can do to prevent disease at home is wash your hands with soap and water before eating, before preparing food, and after using the latrine.
      - "If water is scarce, prioritize the moments with highest disease transmission risk: before eating and after latrine use."
      - Do NOT reuse water for hand washing if it's contaminated.
  - name: water and food safety boundaries
    guide: GD-732
    must_include:
      - If you are unsure whether water is safe, bring it to a rolling boil for at least one minute
      - Don't touch treated water with dirty hands
      - Do not taste questionable food to test it.
  - name: escalation and outbreak boundary
    guide: GD-732
    must_include:
      - Multiple people becoming sick with same illness in short time period indicates possible outbreak.
      - Fever lasting more than 48 hours
      - Skin infection spreading despite hygiene efforts
