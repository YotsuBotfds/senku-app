source_invariants:
  - name: appliance comfort boundary stays handoff only
    guide: GD-061
    must_include:
      - Use this guide for dentures, partials, retainers, mouthguards, night guards, and similar removable appliances when the main problem is fit, rubbing, looseness, repair, or appliance cleaning.
      - For a denture, partial, retainer, mouthguard, night guard, or similar removable appliance, keep routine guidance limited to comfort intake and handoff
      - Stop using the appliance and seek dental or clinical help if it causes a mouth sore that is worsening, bleeding, not improving, or looks infected
      - if the appliance is cracked, sharp, loose enough to choke on, or breaks in a way that could be swallowed or inhaled
      - Do not use this boundary card to give denture fabrication, impressions, adjustment, grinding, relining, adhesive formulas, implant work, appliance repair instructions, diagnosis, pain-medicine or antibiotic dosing, return-to-use clearance, legal claims, or safety certification.
    must_not_match:
      - "return\\s+to\\s+use[^\\n]{0,120}(safe|cleared|approved)"
      - "(ibuprofen|acetaminophen|paracetamol|amoxicillin|antibiotic)[^\\n]{0,80}\\b\\d+\\s*(mg|milligram)"
  - name: cleaning and monitoring remain inspection support
    guide: GD-061
    must_include:
      - While cleaning, examine denture for cracks, loose teeth, or damage. Early detection prevents catastrophic failure.
      - Remove denture nightly to allow tissue recovery.
      - If persistent sore spots develop, may require denture adjustment or soft reline application.
review_status: pilot_reviewed
notes: >
  Reviewed GD-061 boundary card for denture/prosthetic comfort intake, wear and
  eating logs, cleaning and inspection notes, stop-use triggers, red flags, and
  dentist/prosthodontist/clinician handoff. It intentionally excludes
  fabrication, impressions, adjustment/grinding, adhesives/formulas, implant
  work, appliance repair instructions, diagnosis, medication dosing,
  return-to-use clearance, legal claims, and safety certification.
