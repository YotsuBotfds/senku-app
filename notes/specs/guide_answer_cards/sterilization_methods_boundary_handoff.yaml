source_invariants:
  - name: boundary_surface_limits
    guide: GD-250
    must_include:
      - This is the reviewed answer-card surface for GD-250.
      - Use it only for boundary-level item and use-context intake
      - Do not use this reviewed card for sterilization recipes
      - safety certification.
  - name: visible_contamination_restart_boundary
    guide: GD-250
    must_include:
      - Any visible blood or tissue on instruments indicates failed pre-cleaning.
      - Do not proceed with sterilization
      - Organic material protects organisms from sterilizing agents
  - name: uncertainty_and_storage_boundary
    guide: GD-250
    must_include:
      - visual inspection (any dust, discoloration, or contamination visible = assume recontaminated, re-sterilize)
      - if sealed storage suspected good but uncertain, re-sterilize before use
      - Visual contamination
      - do not use sterilized items
  - name: clean_dirty_workflow_separation
    guide: GD-250
    must_include:
      - Dirty area (receives used instruments, pre-cleaning occurs here with water/soap/brush).
      - Staging area (instruments arranged, wrapped if necessary).
      - Cooling/drying area (clean surface, covered or enclosed).
      - Storage area (sealed containers, organized by instrument type/date).
review_status: pilot_reviewed
notes: >
  This card closes the GD-250 metadata/card audit gap as a boundary-only
  sterile-item intake and owner-handoff surface. It intentionally excludes the
  source guide's procedural sterilization methods, parameters, validation
  testing, equipment operation, medical/dental/lab readiness claims, pathogen
  guarantees, legal/code claims, and safety certification.
