applicability:
  owner: low-resource routine dishwashing and kitchen cleanup
  use_when:
    - low-water or no-sink dishwashing sequences
    - greasy cookware cleanup with minimal wash water
    - cutting-board and knife cleanup after raw meat prep
    - storage-first cleanup routing for shared dish stacks
  do_not_use_when:
    - suspected concentrated chemical contamination requiring hazardous cleanup
    - visible stool, blood, vomit spread, or group illness clusters requiring hygiene/illness lanes
    - medical treatment decisions or clinical rehydration workflows
  handoff:
    - community-kitchen-mess-hall-operations for outbreak-aware or shared-service illness cases.
    - hygiene-disease-prevention-basics for sick-room boundaries and hand hygiene prioritization.
    - food-safety-contamination-prevention for foodborne contamination control and handoff to food safety.
    - chemical-safety for unknown chemicals and concentrated cleaner residue handling.
output_contract:
  requires_contract_items:
    - required_first_actions
    - first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_output_handoff: true
  avoid_medical_chemicals: true
fallback_handoff_language:
  - If body-fluid contamination, severe chemical residue, or vomiting/stool spread is present, stop routine dish sequence and route to hygiene-disease-prevention-basics plus food-safety boundaries first.
  - If many people become ill after shared meal/service contact, route to community-kitchen-mess-hall-operations before detailed dishwork continues.
  - If user asks for sanitizer concentrations or clinical treatment, state that GD-955 does not provide those formulas or medical dosing; hand off to chemical-safety or medical guides.
