source_invariants:
  - name: reviewed answer-card scope and exclusions
    guide: GD-650
    must_include:
      - This is the reviewed answer-card surface for GD-650.
      - Use it for non-diagnostic rehabilitation support intake
      - Do not use this card to prescribe exercises, progressions, manipulation, gait training, return-to-work or return-to-sport clearance, fracture or neurologic diagnosis, wound care, medication or dosing, device fabrication, legal or disability determinations, or claims that an activity, aid, home setup, or device is safe.
  - name: pain and stop-activity source boundaries
    guide: GD-650
    must_include:
      - Pain is a signal.
      - Sharp pain or pain that worsens for hours after exercise suggests over-aggression.
      - "Red flag: Sudden increase in swelling, warmth, redness, or calf tenderness suggests deep vein thrombosis (DVT)."
      - Stop exercise and seek medical evaluation immediately
  - name: tracking source content
    guide: GD-650
    must_include:
      - Record pain levels before, during, and after exercise
      - Weekly Progress Notes
      - Pain changes.
      - Swelling changes.
