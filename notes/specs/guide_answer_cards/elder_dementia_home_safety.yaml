source_invariants:
  - name: sudden confusion and emergency boundary
    guide: GD-930
    must_include:
      - sudden changes in confusion as a medical warning
      - sudden confusion is not something to dismiss as "just dementia."
      - overdose or poisoning concern
    must_not_include:
      - sudden confusion is just dementia
      - sudden confusion is normal dementia
    must_not_match:
      - "(?:give|increase|decrease|start|stop)[^\\n]{0,80}(?:sedative|antipsychotic|benzodiazepine|haloperidol|quetiapine|donepezil|memantine)"
  - name: medication reminders stay non-dosing
    guide: GD-930
    must_include:
      - one caregiver gives meds at the same times daily
      - pill organizer with clearly separated doses
      - written medication log
      - alarms or phone reminders for the caregiver
    must_not_match:
      - "\\b\\d+(?:\\.\\d+)?\\s*(?:mg|mcg|g|ml)\\b"
review_status: pilot_reviewed
notes: >
  Reviewed-card scope is day-to-day dementia home safety and supportive
  caregiver communication. It intentionally excludes medication dosing/changes,
  diagnostic certainty, overdose/poisoning management, stroke/head-injury
  protocols, and sedating or restraint advice.
