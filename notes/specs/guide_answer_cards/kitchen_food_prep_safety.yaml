  - name: contamination-prevention boundaries
    guide: GD-919
    must_include:
      - "Do not rinse raw chicken, meat, or fish just to \"clean\" it"
      - "raw meat, its packaging, and its juices away from cooked food and fresh produce"
      - "If a board, cloth, or sponge cannot be cleaned well, stop using it for food prep"
      - "Clean first, then sanitize if the item will touch ready-to-eat food."
