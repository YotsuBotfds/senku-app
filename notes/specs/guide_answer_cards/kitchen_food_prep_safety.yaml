notes: >
  Safety-first card for routine kitchen preparation and recovery in low-resource settings.
  Scope excludes treatment of foodborne illness, sanitizer formula engineering, medical
  triage, and decontamination guarantees. When those boundaries are crossed, route to spoilage
  and sickness/medical guides.
