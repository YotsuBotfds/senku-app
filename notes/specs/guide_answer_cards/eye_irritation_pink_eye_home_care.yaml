    must_include:
      - This guide is for mild, common eye complaints when vision is stable and the eye is not badly injured.
      - Chemical exposure and eye trauma should go to the emergency eye-injury guide before pink-eye home care.
      - Contact lens wear with redness, pain, or discharge
    must_not_match:
      - "chemical exposure is safe for home care"
      - "contact lens[^\\n]{0,120}(routine pink eye|watch at home|harmless)"
  - name: embedded and high-speed debris negatives remain conservative
    guide: GD-922
    must_include:
      - Do not use this mild-debris flushing plan if the object may be embedded
      - do not flush, remove, rub, or press on the eye
      - shield it without pressure
    must_not_match:
      - "embedded[^\\n]{0,120}(safe to flush|try to remove|rub it|press on it)"
  - name: routine care actions remain nonprescriptive
    guide: GD-922
    must_include:
