    guide: GD-400
    must_include:
      - Any breathing difficulty, throat/tongue swelling, or dizziness/fainting after allergen exposure = anaphylaxis until proven otherwise.
      - Epinephrine and emergency help come first; inhalers are adjuncts.
      - Antihistamines are adjuncts to epinephrine, not replacements.
    must_not_match:
      - "allergen-triggered airway[^\\n]{0,120}antihistamine-first"
