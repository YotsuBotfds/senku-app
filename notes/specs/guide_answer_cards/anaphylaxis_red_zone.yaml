notes: >
  Primary owner is GD-400 for allergen-triggered airway, breathing, circulation,
  color, and swelling red-zone prompts. This card deliberately excludes mild
  skin-only hives, itch, or rash with normal breathing and normal alertness so
  the runtime does not default-match GD-400 for non-red-zone allergy prompts.
