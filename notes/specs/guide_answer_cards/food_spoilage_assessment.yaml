output_contract:
  required_actions:
    - "Discard-first decision first; include at least one discard trigger if found."
    - "State no taste/smell challenge methods are valid safety proofs."
    - "Constrain salvage to hard-dry-localized and clearly bounded cases."
  forbidden_advice:
    - "No cure-it, de-toxify, or scarcity-pressure directives."
    - "No medical diagnosis or treatment language for ingestion illness."
    - "No claim that reheating fixes suspect food."
  fallback_handoff:
    - If symptoms exist or shared illness is likely, hand off to food-safety-contamination-prevention and care guidance.
    - If prevention hygiene context dominates, hand off to kitchen-food-prep-safety.
    - If shared meal illness clustering is present, hand off to community-kitchen-mess-hall-operations.
    - If canned-food suspicion is the trigger, include packaging-failure-safe handling language.
  output_contract:
    - "Return concise rule first, then one conditional salvage example only when safe conditions are met."
    - "Keep the response conservative and explicitly narrow salvage."
source_invariants:
  - name: discard-first warning
    guide: GD-906
    must_include:
      - "if you notice any of these, do not eat it:"
      - "Hunger pressure does not make spoiled food safe."
  - name: packaging failure discard policy
    guide: GD-906
    must_include:
      - "Bulging can, leaking jar, broken seal, or foamy spurting"
      - "Do not open suspect cans indoors"
  - name: reheating limitation
    guide: GD-906
    must_include:
      - "Reheating is not a magic reset button."
      - "toxins already formed by spoilage bacteria"
  - name: forbidden testing
    guide: GD-906
    must_include:
      - "Do not use taste, spit-and-wait, mouth-burn, or \"tiny sample\" checks"
      - "Do not use taste"
