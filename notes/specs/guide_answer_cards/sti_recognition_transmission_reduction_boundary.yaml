source_invariants:
  - name: GD-937 symptoms remain non-diagnostic and silent spread remains explicit
    guide: GD-937
    must_include:
      - "Symptoms are clues, not proof."
      - "Many STIs are asymptomatic, especially early on."
      - "Do not use \"I feel normal\" as proof that no STI is present."
    must_not_match:
      - "(diagnose|confirm)[^\\n]{0,80}(chlamydia|gonorrhea|herpes|syphilis|sti|std)[^\\n]{0,80}(from symptoms|by symptoms)"
  - name: GD-937 exposure, testing, and safer-sex handoff remain explicit
    guide: GD-937
    must_include:
      - "Stop sex until the situation is clearer."
      - "Arrange testing and medical evaluation rather than waiting for symptoms."
      - "Avoid sex when symptoms are present"
      - "Use condoms or other barriers every time"
      - "Tell partners about confirmed infection so they can be tested and treated"
  - name: GD-937 partner, pregnancy, and red-flag routing remain explicit
    guide: GD-937
    must_include:
      - "If an STI is possible or confirmed, communication matters because untreated partners can reinfect each other."
      - "Pregnancy and newborn exposure are not situations for guesswork."
      - "Severe pelvic or lower abdominal pain"
      - "Testicular pain or swelling"
      - "Pregnancy with pain, bleeding, or fever"
    must_not_match:
      - "(take|use|prescribe)[^\\n]{0,80}(azithromycin|doxycycline|ceftriaxone|acyclovir|valacyclovir|metronidazole)"
