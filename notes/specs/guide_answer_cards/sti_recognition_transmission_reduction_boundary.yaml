notes: >
  Reviewed boundary-only card for GD-937 STI concern intake and transmission
  reduction. It covers symptom/exposure timeline logging, asymptomatic-spread
  reminders, abstain/barrier-use safer-sex reminders, high-level factual
  partner-notification planning, testing and clinician/public-health handoff,
  and pregnancy, assault, severe pelvic/testicular pain, newborn, fever,
  bleeding, and systemic red-flag routing. It intentionally excludes diagnosis,
  antibiotic/antiviral selection or dosing, treatment regimens, test
  interpretation, coercive disclosure/contact tracing, legal reporting
  decisions, sexual-assault investigation, pregnancy management, clearance,
  and certification. READY_FOR_PARENT_CLOSE.
