source_invariants:
  - name: leave and fresh air before identification
    guide: GD-598
    must_include:
      - "**Evacuate immediately** if gas is suspected"
      - "**Provide fresh air**"
      - Move to fresh air immediately
      - Evacuate and move to fresh air
    must_not_match:
      - "(identify|test|sample|sniff)[^\\n]{0,120}before\\s+(leaving|evacuat|fresh air)"
      - "stay[^\\n]{0,120}(identify|test|sample|sniff)"
  - name: symptom and delayed red flags
    guide: GD-598
    must_include:
      - Loss of consciousness
      - respiratory distress
      - delayed pulmonary edema
      - Delayed onset
    must_not_match:
      - "(symptoms improve|feels better)[^\\n]{0,120}(safe|clear|return|re-enter)"
  - name: confined space and odor limits
    guide: GD-598
    must_include:
      - In confined spaces
      - '"Fresh-looking" air is not guaranteed to be safe.'
      - do not rely on smell for safety
      - CO poisoning is insidious because the victim loses consciousness and cannot self-rescue.
    must_not_match:
      - "smell[^\\n]{0,120}(guarantees|proves)[^\\n]{0,80}safe"
      - "fresh-looking[^\\n]{0,120}(guarantees|proves)[^\\n]{0,80}safe"
  - name: no improvised detection as action advice
    guide: GD-598
    must_include:
      - Candle test (unreliable)
      - Gas | Odor | Color | Density | Detection Method
    must_not_match:
      - "(candle test|animal indicator|lead acetate|starch-iodide|pH paper)[^\\n]{0,160}(do this|perform|use this test|step)"
      - "(ppm|concentration)[^\\n]{0,120}(safe to enter|safe for re-entry|go/no-go)"
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  Boundary-only reviewed card for GD-598. It converts a detection-heavy guide
  into first-hop toxic-gas exposure triage: evacuate or avoid entry, fresh air,
  emergency/hazmat/poison-control or medical handoff, symptom red flags,
  confined-space no-entry/no-solo-rescue framing, and clarifying questions for
  handoff. It intentionally excludes detector calibration, improvised tests,
  gas-generation chemistry, concentration thresholds as action rules, hazardous
  entry procedure, and rescue instructions.
