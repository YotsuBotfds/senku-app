source_invariants:
  - name: restorative boundary keeps post-care red flags visible
    guide: GD-055
    must_include:
      - "Symptoms to watch for: fever, swelling, pus discharge, worsening pain after treatment (patient must report these)"
      - "Post-treatment care: avoid chewing on restoration for 24 hours, maintain oral hygiene, report any discomfort"
      - "Return for any complications (pain, restoration loss, sensitivity increase)."
  - name: temporary protection remains bridge and handoff oriented
    guide: GD-055
    must_include:
      - "Provide patient instructions: avoid chewing on that tooth for 24 hours, report if sensitivity persists or filling loss occurs, avoid sticky/hard foods"
      - "Document placement material and date for future provider reference."
      - "Temporary is bridge to definitive care, not solution."
  - name: pulp and infection content does not become routine reassurance
    guide: GD-055
    must_include:
      - "Document exposure; monitor for abscess formation."
      - "Undiagnosed periapical pathology = restoration over infection fails, spreads."
      - "Persistent or increasing pain"
  - name: restorative card does not authorize procedure or medication dosing
    guide: GD-055
    must_not_match:
      - "(drill|excavat|remove decay|condense|inject|extract|prescribe|dose)[^\\n]{0,160}(from this card|boundary card|answer card)"
review_status: pilot_reviewed
notes: >
  Reviewed boundary card for GD-055. It closes the metadata/card audit gap
  without expanding runtime ownership into restorative dentistry procedures.
  It is limited to intake, symptom/restoration logs, temporary avoid-chewing
  and protective hygiene notes, red flags, and dentist or clinician handoff.
  It intentionally excludes drilling, filling, extraction, restoration
  placement, anesthetic/injection technique, antibiotics and pain-medication
  dosing, diagnosis, dental appliance fabrication, return-to-service or
  chewing clearance, legal claims, and safety certification.
