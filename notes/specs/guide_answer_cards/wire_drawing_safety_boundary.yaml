source_invariants:
  - name: safety_hazard_context_remains
    guide: GD-173
    must_include:
      - "Wire drawing involves significant mechanical hazards from tension and pinch-point equipment."
      - "Wire drawing equipment generates extreme tension and creates multiple hazard zones."
      - "Operators must understand and avoid all pinch points and snap-back dangers."
  - name: pinch_and_entanglement_context_remains
    guide: GD-173
    must_include:
      - "Fingers, hands, and clothing can be caught between wire and equipment during pulling"
      - "Draw plates and capstans create pinch points"
      - "Never adjust or reposition wire while equipment is under tension"
  - name: snap_back_context_remains
    guide: GD-173
    must_include:
      - "If wire breaks under tension during drawing, the free end snaps back at high velocity"
      - "Tension energy stored in wire and equipment releases suddenly and violently"
      - "If wire breaks, do not attempt to retrieve it immediately"
