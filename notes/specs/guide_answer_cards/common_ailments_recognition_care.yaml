source_invariants:
  - name: common ailments routes stroke and chest pain away
    guide: GD-733
    must_include:
      - sudden face droop, one-sided weakness or numbness, trouble speaking, or sudden confusion
      - heavy chest pressure or tightness, pain spreading into the jaw/arm/back
      - Do not give food, water, or pills by mouth if stroke signs, confusion, or reduced alertness are present.
  - name: common ailments routes hard belly away
    guide: GD-733
    must_include:
      - If the belly is swollen or hard, the person cannot keep anything down, and they are not passing stool or farting, do not stay in this guide.
      - A hard or rigid belly, guarding, refusing to walk upright because of belly pain
      - Swollen or hard belly, not passing stool or fart, and repeated vomiting
  - name: common ailments watchful waiting criteria
    guide: GD-733
    must_include:
      - Alert, talking normally, breathing comfortably
      - Drinking and keeping fluids down
      - Symptoms improving or stable over the last
      - No red-flag items from the list above
