source_invariants:
  - name: safe planning boundary excludes high-risk runtime sources
    guide: GD-089
    must_include:
      - "Inventory only food that is clearly safe to use."
      - "Remove suspect food from the ration plan"
      - "This safe-planning lane does not provide starvation timelines"
      - "punitive ration reductions"
    must_not_match:
      - "This safe-planning lane[^\\n]{0,200}(starvation timelines|refeeding schedules|severe calorie-restriction plans)[^\\n]{0,200}(provide|recommend)"
  - name: inventory duration math stays transparent
    guide: GD-089
    must_include:
      - "List all available foods"
      - "Calculate calories per item"
      - "Total available calories"
      - "Divide by daily ration"
      - "Maintain simple spreadsheet or written log"
  - name: vulnerable groups protected
    guide: GD-089
    must_include:
      - "Never cut children's rations first."
      - "Prioritize pregnant women for nutrient-dense foods"
      - "Prioritize for milk quality and quantity"
      - "Elderly (65+ years)"
  - name: food safety handoff before scarcity pressure
    guide: GD-089
    must_include:
      - "Discard any produce with visible mold, rot, or insect damage."
      - "Multiple people (3+) experiencing same gastrointestinal symptoms"
      - "Immediately cease serving suspected food."
    must_not_match:
      - "(serve|use|eat)[^\\n]{0,120}(suspect|spoiled|questionable|moldy|bulging|leaking)[^\\n]{0,120}(scarce|shortage|ration)"
