source_invariants:
  - name: incident response routing remains present
    guide: GD-696
    must_include:
      - This guide is for response, not identification.
      - evacuation, sheltering, decontamination, or triage
      - "Quick routing: is this the right guide?"
      - mass-exposure response for an industrial release
  - name: evacuation and shelter anchors remain present
    guide: GD-696
    must_include:
      - Position yourself upwind.
      - Move perpendicular to the wind
      - Close all windows and doors.
      - Turn off HVAC, air conditioning, or fans
    must_not_match:
      - "certif(?:y|ies|ied)[^\\n]{0,120}(safe|re-entry|clearance)"
      - "re-?enter[^\\n]{0,120}(?:is safe|safe to enter|clearance)"
  - name: decontamination and clothing isolation anchors remain present
    guide: GD-696
    must_include:
      - Remove all outer clothing
      - Place it in a plastic bag or outside area.
      - Avoid touching the face, eyes, or mouth
      - Rinse with copious water.
    must_not_match:
      - "neutraliz(?:e|ation)[^\\n]{0,120}(acid|base|spill|chemical)"
      - "mix[^\\n]{0,120}(bleach|ammonia|acid|base)[^\\n]{0,120}(safe|neutraliz)"
  - name: symptom and handoff anchors remain present
    guide: GD-696
    must_include:
      - Delayed Symptoms Are Dangerous.
      - Move to fresh air immediately
      - "**Emergency management** issues evacuation orders and provides guidance."
      - "**Fire departments** assess hazard zones and guide evacuees."
review_status: pilot_reviewed
