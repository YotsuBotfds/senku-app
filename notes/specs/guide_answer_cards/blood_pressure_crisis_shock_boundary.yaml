source_invariants:
  - name: bp crisis symptoms require emergency transport
    guide: GD-402
    must_include:
      - "very high BP with neurologic symptoms, chest pain, breathing trouble, vision change, confusion, or seizure as an emergency"
      - "needs emergency evaluation and transport"
      - "A high reading without red-flag symptoms is not a rapid self-lowering situation"
    must_not_match:
      - "very high bp[^\\n]{0,160}(routine home|watchful waiting)"
      - "asymptomatic high bp[^\\n]{0,160}(rapidly lower|crash)"
  - name: shock boundary forbids fluid protocol expansion
    guide: GD-402
    must_include:
      - "Low BP with shock signs is immediately life-threatening"
      - "This guide does not provide saline bolus details"
      - "Do not provide antihypertensive dosing, IV medication protocols, rapid BP-lowering targets, saline bolus details, or herbal emergency treatment"
    must_not_include:
      - "Normal saline bolus"
      - "Labetalol: IV"
      - "Target: Lower BP"
review_status: pilot_reviewed
notes: >
  Reviewed bounded answer card for GD-402 safety triage only. It preserves the
  guide's emergency boundary for very high BP with neurologic/chest/breathing/
  vision/confusion/seizure symptoms, separates asymptomatic high BP from rapid
  self-lowering advice, and treats low BP with shock signs as emergency
  transport. It deliberately forbids antihypertensive dosing, IV medication
  protocols, rapid BP-lowering targets, saline bolus details, and herbal
  emergency treatment.
