source_invariants:
  - name: reviewed answer-card scope and exclusions
    guide: GD-651
    must_include:
      - This is the reviewed answer-card surface for GD-651.
      - Use it for lawful, non-tactical site-safety and access-control support
      - Do not provide tactical hardening, booby traps, surveillance evasion, weapons, force instructions
    must_not_match:
      - (?i)step-by-step bypass
      - (?i)disable cameras
      - (?i)evade patrols
      - (?i)ambush plan
  - name: handoff log contents
    guide: GD-651
    must_include:
      - Routine answers should create a simple site-safety handoff log
      - visitor name and purpose
      - lighting or lock condition
      - blocked exits or unsafe routes
      - evacuation status
  - name: access logs and escorts
    guide: GD-651
    must_include:
      - All non-operator personnel
      - must sign in at a **gatehouse or staffed entry point**
      - Escort remains with visitor at all times
      - Log departure time and any observations
  - name: urgent handoff triggers
    guide: GD-651
    must_include:
      - Immediate handoff is required for active intrusion, violence, credible threats
      - medical emergency
      - blocked evacuation route
      - damaged lock or gate with unknown access
      - broken seal on critical infrastructure
