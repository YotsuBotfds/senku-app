card_id: sewage_treatment_systems_monitoring
guide_id: GD-117
slug: sewage-treatment
title: Sewage Treatment Systems
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - User asks how to monitor, inspect, maintain, or keep records for an existing sewage treatment, septic, constructed wetland, composting toilet, greywater, or related wastewater system.
  - User reports sewage odors, sulfur or rotten smells, slow drains, backups, wet spots, standing water, unusually green drain-field vegetation, overflow, pooling, mosquito conditions, or suspected drinking-water separation problems.
  - User needs concise handoff boundaries for professional help, sanitation owners, water testing, medical/public-health guidance, or legal/permit questions.
required_first_actions:
  - Lead with contact prevention and drinking-water separation before routine maintenance advice.
  - Classify the issue as monitoring, odor or overflow red flag, drinking-water separation risk, maintenance scheduling, recordkeeping, or handoff.
  - Treat sewage backups, surfacing effluent, standing water, wet spots, sewer or sulfur odors, multiple slow fixtures, unusually green drain-field growth, and runoff toward wells, springs, surface water, homes, walkways, children, animals, or food areas as red flags.
  - Keep troubleshooting observational and operational; capture what changed, where liquid is going, what smells, what fixtures are slow, what maintenance was last done, and what needs to be documented.
  - Use handoff language for plant design, excavation or construction, chemical dosing or disinfection formulas, pathogen kill guarantees, confined-space entry, legal permit claims, wastewater sampling safety details, and illness treatment.
first_actions:
  - For odors, note the location, timing, weather, fixture use, and whether the odor is near the tank, drain field, wetland, toilet area, or indoor drains; pair odor with leak, backup, pooling, or contact-risk checks.
  - For overflow, backup, wet spots, or standing water, reduce nonessential water use, keep people and animals away from affected areas, and document the affected fixtures or yard locations for handoff.
  - For drinking-water separation, check whether wastewater, runoff, wet spots, or drain-field symptoms are near wells, springs, surface water, flood paths, or drinking-water storage; route water-quality questions to water testing or purification owners.
  - For routine maintenance, schedule septic pumping, wetland sludge or plant-management checks, filter or screen inspections, and toilet or greywater observations before smell, overflow, or slow flow forces action.
  - For recordkeeping, log date, weather or rain, household load, odor, wet spots, standing water, drain speed, pump-outs, repairs, well tests, and who received the handoff.
urgent_red_flags:
  - Sewage, effluent, sludge, greywater, or toilet waste is backing up indoors, surfacing outdoors, overflowing, pooling, or reaching living areas, kitchens, food storage, walkways, children, animals, wells, springs, surface water, or drinking-water storage.
  - Strong sewer, sulfur, rotten, fecal, or persistent wastewater odor appears near the tank, drain field, wetland, toilet, drains, or occupied space.
  - Multiple toilets or drains slow at once, toilets back up, pumping causes backup into the house, or the system cannot accept normal flow.
  - Drain-field grass is abnormally green, isolated vegetation is unusually lush, wet spots or standing water appear, soil settles, or symptoms worsen after rain or heavy use.
  - The user wants to enter a septic tank, vault, pit, enclosed sewage structure, or other confined space.
  - The user asks for treatment/disinfection formulas, pathogen guarantees, sampling safety, legal approval, permit compliance, plant design, excavation/construction, or illness treatment.
forbidden_advice:
  - Do not provide sewage treatment plant design, drain-field design, wetland construction, tank sizing, excavation, grading, pipe layout, or construction engineering instructions from this card.
  - Do not provide chemical dosing, disinfection formulas, bleach/chlorine/lime recipes, enzyme treatment instructions, or wastewater treatment calculations.
  - Do not guarantee pathogen kill, potable quality, safe discharge, food-crop safety, or safety based on appearance, odor, filtration, time, or basic tests.
  - Do not advise confined-space entry into tanks, pits, vaults, wet wells, enclosed sewage structures, or chambers.
  - Do not make legal, permit, code-compliance, or local approval claims.
  - Do not provide wastewater sampling safety procedures or clinical illness treatment.
do_not:
  - Do not treat sewage odor, backups, surfacing liquid, or standing water as normal operation.
  - Do not skip drinking-water separation checks when symptoms are near wells, springs, surface water, flood paths, or storage tanks.
  - Do not turn a monitoring question into design, construction, chemical treatment, or pathogen-certification advice.
  - Do not rely on smell alone to rule out dangerous gas or contamination.
  - Do not let temporary symptom improvement replace a maintenance log and handoff when red flags occurred.
routine_boundary: >
  This card owns monitoring existing sewage treatment systems, odor and overflow
  red-flag triage, drinking-water separation checks, maintenance scheduling,
  recordkeeping, and handoffs. It does not own plant design, excavation or
  construction, chemical dosing or disinfection formulas, pathogen kill
  guarantees, confined-space entry, legal permit claims, wastewater sampling
  safety details, or illness treatment.
acceptable_uncertain_fit: >
  If the prompt is plausibly about an existing sewage or wastewater system but
  details are incomplete, answer conservatively with contact prevention,
  drinking-water separation, visible/odor/flow checks, maintenance record
  review, and one clarifying question about the symptom and location. Hand off
  immediately if the prompt asks for design, construction, chemicals, pathogen
  guarantees, confined-space entry, legal approval, sampling safety, or illness
  care.
clarifying_questions:
  - What system is involved; septic tank and drain field, constructed wetland, composting toilet, greywater route, or a mixed/unknown sewage system?
  - What is the main symptom; odor, backup, slow drains, wet spots, standing water, overflow, unusual vegetation, or concern near a well, spring, surface water, or drinking-water storage?
  - When was the last pump-out, inspection, filter or screen check, well test, or documented maintenance visit?
  - Are you asking for monitoring and handoff notes, or for design, construction, chemical treatment, legal approval, sampling safety, confined-space entry, or illness care?
