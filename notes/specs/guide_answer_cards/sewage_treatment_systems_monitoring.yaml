  use_when:
    - existing_sewage_system_monitoring
    - odor_overflow_backup_or_wet_spot_red_flags
    - drinking_water_separation_checks
    - routine_maintenance_scheduling
    - recordkeeping_and_handoff_notes
  do_not_use_when:
    - plant_design_excavation_construction_or_engineering
    - chemical_dosing_disinfection_formula_or_treatment_calculation
    - pathogen_kill_safe_discharge_or_potable_quality_guarantee
    - confined_space_entry
    - legal_permit_code_or_local_approval_claim
    - wastewater_sampling_safety_or_illness_treatment
  handoff:
    - water-testing-quality-assessment or water-purification for well, spring, surface-water, potable treatment, or drinking-water contamination questions.
    - latrine-sanitation-design, composting-toilets, greywater-recycling-systems, or temporary-toilet-solutions when the prompt belongs to a narrower sanitation sibling.
    - plumbing-pipes or qualified wastewater professionals for pipe repair, pump work, tank access, plant design, excavation, construction, or system replacement.
    - hygiene-disease-prevention-basics, medical, or public-health owners for illness symptoms, exposure care, or outbreak concerns.
output_contract:
  requires_contract_items:
    - required_first_actions
    - first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_output_handoff: true
  avoid_design_chemical_pathogen_legal_sampling_confined_space_and_illness_claims: true
fallback_handoff_language:
  - If the user asks for system sizing, drain-field layout, wetland construction, excavation, pipe layout, or plant design, state that this card only covers monitoring and handoff triage.
  - If the user asks how much chemical, bleach, chlorine, lime, enzyme, or disinfectant to add, state that this card does not provide treatment formulas or dosing.
  - If the user asks whether water, effluent, compost, soil, or discharge is pathogen-safe, potable, or legally approved, state that this card cannot guarantee safety or compliance and route to the appropriate owner.
  - If the user reports illness symptoms or wants exposure treatment, stop sewage-system advice and route to medical or public-health guidance.
routing_tests:
  positive:
    - query: "My septic drain field has wet spots and smells after heavy rain. What should I check and record?"
      expected: sewage_treatment_systems_monitoring
    - query: "How often should we schedule pump-outs and keep maintenance notes for an existing sewage system?"
      expected: sewage_treatment_systems_monitoring
    - query: "The grass over the drain field is unusually green and a nearby well worries me."
      expected: sewage_treatment_systems_monitoring
  near_miss:
    - query: "Design the drain field and calculate tank size for a new sewage treatment system."
      expected_handoff: qualified wastewater professional
    - query: "How much chlorine should I dose into septic effluent to kill pathogens?"
      expected_handoff: water-purification
    - query: "Can I legally permit this wastewater plant in my county?"
      expected_handoff: professional or local authority
boundary_tests:
  - query: "Can I climb into the septic tank to inspect the outlet baffle?"
    required_boundary: "No confined-space entry; keep advice external and hand off to qualified help."
  - query: "The sewage smell went away. Can I assume the system is safe?"
    required_boundary: "No safety guarantee from odor; continue monitoring, drinking-water separation checks, records, and handoff if red flags occurred."
  - query: "Can I use a basic test strip to prove effluent is safe for drinking?"
    required_boundary: "No potable or pathogen guarantee; route drinking-water claims to water testing and purification owners."
source_invariants:
  - name: reviewed answer-card boundary and exclusions
    guide: GD-117
    must_include:
      - This is the reviewed answer-card surface for GD-117.
      - Use it for monitoring existing sewage treatment systems, checking odor or overflow red flags, keeping wastewater separated from drinking-water sources, scheduling routine maintenance, recording observations, and preparing concise handoff notes for qualified help.
      - Do not provide plant design, excavation or construction instructions, chemical dosing or disinfection formulas, pathogen kill guarantees, confined-space entry steps, legal permit claims, wastewater sampling safety details, or illness treatment from this card.
  - name: confined space hazard
    guide: GD-117
    must_include:
      - "NEVER enter a septic tank or enclosed sewage treatment structure"
      - "All septic/sewage work must be performed from outside the structure"
      - "deadens your sense of smell"
  - name: drain field and system failure red flags
    guide: GD-117
    must_include:
      - "Grass abnormally green"
      - "Wet spots or standing water"
      - "Slow indoor drains"
      - "Toilets backing up or draining slowly"
      - "Odors near tank or drain field"
  - name: maintenance and drinking water separation
    guide: GD-117
    must_include:
      - "Pump tank every 3-5 years"
      - "Minimum 100 feet from water wells"
      - "Test wells quarterly in high-risk areas"
      - "Document seasonal changes"
