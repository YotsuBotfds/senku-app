    guide: GD-591
    must_include:
      - "suspected/unsafe food"
      - "Do NOT reduce rations for infants or young children"
  - name: vulnerable prioritization
    guide: GD-591
    must_include:
      - "children"
      - "pregnant women"
      - "lactating mothers"
      - "heavy laborers"
      - "elderly"
  - name: continuity and transparency
    guide: GD-591
    must_include:
      - "transparent"
      - "inventory"
      - "weekly"
      - "distribution"
      - "spoilage"
applicability:
  owner: community ration closure
  route_from: emergency-food-rationing
  must_handle_within_card:
    - fair allocation and public formula
    - household-size-based distribution
    - record-keeping and adjustment loop
  must_handoff:
    - food-safety-contamination-prevention (GD-666) when contamination drives decisions
    - food-spoilage-assessment (GD-906) for spoilage/salvage uncertainty
    - food-rationing (GD-089) for household-level nutrition optimization
    - food-system-outage-illness-boundary for clustered illness logistics
actions:
  required_first:
    - required_first_actions
  core:
    - first_actions
  safety_override:
    - urgent_red_flags
    - fallback
forbidden:
  - forbidden_advice
  - do_not
fallback:
  - If contamination, outbreak, or uncertain food safety is detected, defer detailed ration numbers and immediate distribution policy to GD-666 and GD-906.
  - If individual clinical decline is likely (confusion, repeated vomiting/diarrhea, severe weakness, dehydration), hand off to medical/illness owners immediately.
  - If the user is asking primarily for individual clinical dosing or correction plans, close the community lane and switch to the household/clinical sibling route.
fallback_handoff_language:
  - "Food safety checks and outbreak/illness triage are done before any normal rationing plan continues."
  - "Do not normalize severe restriction or suspect-food use because food is scarce."
output:
  requires_contract_items:
    - required_first_actions
    - first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_urgent_handoff: true
  forbid_unsafe_source_usage: true
  include_recordkeeping: true
review_status: pilot_reviewed
notes: >
  This is a safe community-scale closure card for GD-591. It intentionally limits
  output to fair allocation, transparent distribution governance, stock tracking,
  vulnerability-aware prioritization, spoilage accounting, and reserve planning.
  It explicitly excludes medical dosing, severe malnutrition treatment, refeeding
  protocols, chemical/recipe details, and suspect-food-serving guidance. Coverage
  and handoff logic are aligned to GD-666/GD-906 contamination boundaries and
  sibling individual ration planning (GD-089) when appropriate.
