source_invariants:
  - name: reviewed boundary and forbidden detail
    guide: GD-065
    must_include:
      - "This is the reviewed answer-card surface for GD-065."
      - "Start by separating already-questionable food from preservation planning."
      - "Do not provide recipes, canning times, pressure settings, brine or acid ratios, botulism treatment, processing shortcuts, sensory-only safety guarantees, or guarantees that a batch is safe."
  - name: quick triage routes spoilage away
    guide: GD-065
    must_include:
      - "Already moldy, slimy, leaking, or foul-smelling?"
      - "Preservation is for sound food, not a fix for bad food."
      - "How long does preserved food last, or should I discard it?"
  - name: low-acid pressure canning category
    guide: GD-065
    must_include:
      - "Pressure canning is the ONLY safe method for low-acid foods"
      - "Water bath canning, by contrast, reaches only 212"
      - "Never adapt or \"improve\" canning recipes."
  - name: discard and no taste guarantee
    guide: GD-065
    must_include:
      - "Even if only one of these signs is present, discard the entire jar's contents."
      - "Do not taste it to check."
      - "Botulism toxin may be present without visible, olfactory, or gustatory evidence."
  - name: salted humid boundary
    guide: GD-065
    must_include:
      - "Boundary for salted foods:"
      - "Use `salt-production` only for making or purifying salt itself."
      - "In a hot humid room, even salted fish can absorb moisture"
