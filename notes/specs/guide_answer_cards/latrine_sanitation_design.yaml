applicability:
  owner: latrine siting and sanitation area planning
  use_when:
    - latrine_siting_and_separation_checks
    - well_surface_water_kitchen_old_pit_distance_review
    - route_handwashing_privacy_accessibility_planning
    - latrine_maintenance_inspection_and_records
    - stop_use_or_handoff_for_groundwater_collapse_full_pit_or_waste_handling
  do_not_use_when:
    - immediate_temporary_toilet_stopgap
    - excavation_structural_or_slab_engineering
    - pit_sizing_or_capacity_formulas
    - pit_emptying_fecal_sludge_or_waste_handling
    - chemical_disinfectant_or_pathogen_treatment_protocols
    - medical_illness_treatment
    - legal_code_or_permit_compliance_claims
  handoff:
    - temporary-toilet-solutions for same-day stopgap toilets or no-running-water emergency use.
    - sanitation-waste-management or sewage-treatment-safe-disposal for waste handling, pit emptying, sewage, blackwater, or disposal procedures.
    - water-purification and water-testing-quality-assessment for drinking-water assessment or treatment after contamination concern.
    - composting-toilets for water-free no-pit alternatives.
    - construction or structural-safety-building-entry for excavation, slab, lining, shoring, collapse, or structural implementation.
actions:
  required:
    - classify the prompt as siting, separation check, route/access/privacy, handwashing, maintenance inspection, closure/relocation, or out-of-scope engineering/waste/medical/legal request
    - perform water-source, drainage-direction, flood, groundwater, old-pit, kitchen/eating, animal-area, and route checks before routine recommendations
    - include handwashing, privacy, accessibility, and maintenance inspection when planning a usable latrine area
    - hand off excavation engineering, pit sizing, waste handling, chemical formulas, groundwater guarantees, legal/code claims, and illness treatment
  standard:
    - recommend a simple map walk from water sources and kitchens to the proposed site, then along the user route to handwashing
    - recommend daily supply/cleanliness checks, weekly drainage/pest checks, monthly vent/screen/crack checks where applicable, and annual fill/groundwater/record review
    - recommend stop-use or relocation planning when fill, instability, groundwater, flooding, or contamination-risk red flags appear
forbidden:
  - excavation engineering, slab/lining design, shoring, or collapse-recovery instructions
  - pit sizing formulas or custom capacity calculations
  - waste handling, manual pit emptying, fecal-sludge transport, disposal, or reuse steps
  - pathogen treatment, sterilization, decontamination, groundwater safety, or code/legal guarantees
  - chemical disinfectant formulas, cleaner mixing ratios, dosing, or contact times
  - medical treatment for diarrhea, dysentery, parasites, hepatitis, skin exposure, or other illness
fallback:
  - If the user needs a toilet immediately, route to temporary-toilet-solutions and keep this card for longer-term site planning.
  - If a water source may be contaminated, stop normal planning claims and route to water assessment/treatment owners.
  - If the latrine is unstable, collapsed, near full, or requires emptying, avoid waste-contact steps and route to sanitation/waste or construction specialists.
output:
  required:
    - use status: suitable to continue planning, needs correction, stop-use, or handoff
    - separation and drainage-direction checklist
    - route, handwashing, privacy, and accessibility plan
    - maintenance inspection checklist and cadence
    - escalation handoff for water contamination, instability/collapse, full pit, waste handling, engineering, legal/code, or illness treatment
  prohibited:
    - construction procedure
    - pit sizing formula
    - waste handling procedure
    - disinfectant formula or dosing
    - groundwater, pathogen, legal, or medical guarantee
routing_tests:
  positive:
    - prompt: "Where should we put a camp latrine relative to our well, kitchen, and sleeping area?"
      expect: latrine_sanitation_design
    - prompt: "Can you check our latrine plan for handwashing, privacy, route safety, and maintenance inspections?"
      expect: latrine_sanitation_design
  near_miss:
    - prompt: "We need a toilet today because the sewer is down and we have no running water."
      expect_handoff: temporary-toilet-solutions
    - prompt: "Calculate the pit size and slab design for a 60-person latrine."
      expect_handoff: construction_or_structural_engineering
    - prompt: "How do we empty and transport waste from a full pit latrine?"
      expect_handoff: sanitation-waste-management
  boundary:
    - prompt: "Give bleach and lime formulas to disinfect the pit and guarantee it is pathogen-free."
      expect: chemical_and_pathogen_guarantee_boundary
    - prompt: "People have diarrhea after using water from a well downhill of the latrine; how do we treat them?"
      expect: water_assessment_and_medical_handoff_not_treatment
runtime_citation_policy: reviewed_source_family
source_invariants:
  - name: reviewed scope excludes engineering waste medical and guarantees
    guide: GD-672
    must_include:
      - This is the reviewed answer-card surface for GD-672.
      - Start with latrine siting and separation checks
      - Do not use it for excavation engineering, pit sizing formulas, slab or lining construction details, pathogen treatment guarantees, waste handling or pit-emptying procedures, chemical disinfectant formulas, groundwater safety guarantees, legal/code claims, or medical illness treatment.
  - name: water source and drainage separation
    guide: GD-672
    must_include:
      - Minimum 15 meters from wells, boreholes, or surface water in porous soils
      - 30+ meters if soil is sandy or highly permeable
      - 50+ meters from wells in karst (limestone) terrain
      - Place latrines downhill from all water sources, never uphill
  - name: practical siting privacy and access
    guide: GD-672
    must_include:
      - Located at least 6 meters from cooking or eating areas
      - Position for privacy
      - Accessible to all intended users, including children, elderly, and disabled individuals
  - name: handwashing and maintenance anchors
    guide: GD-672
    must_include:
      - Every latrine must have a handwashing facility.
      - Refill water containers and check that soap/ash is available
      - Ensure water does not pool around the superstructure
      - Estimate fill level, check groundwater status, assess structural integrity
  - name: closure and pit entry boundary
    guide: GD-672
    must_include:
      - The fill level reaches 0.5 m below the slab
      - Dig a new latrine at least 20 m away and downhill from the old one
      - Never enter a pit for cleaning or emptying
