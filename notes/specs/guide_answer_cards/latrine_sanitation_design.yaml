card_id: latrine_sanitation_design
guide_id: GD-672
slug: latrine-sanitation-design
title: Latrine & Sanitation Design
risk_tier: medium
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - User asks where to place a latrine, outhouse, pit toilet, privy, or planned sanitation area relative to wells, surface water, kitchens, paths, homes, animal areas, old pits, slopes, or flood-prone ground.
  - User needs a review of separation distances, drainage direction, route access, handwashing placement, privacy, accessibility, shared-use layout, or routine inspection for a latrine site.
  - User reports odor, flies, pooling water, blocked access, missing handwashing supplies, privacy problems, unstable structure, rising groundwater, or a full/near-full latrine and needs bounded operational handoff.
required_first_actions:
  - Start with siting and separation checks before fixture choice, construction style, or maintenance details.
  - Check distance and direction from wells, boreholes, surface water, cooking/eating areas, old latrine sites, animal areas, flood-prone ground, and likely drainage or groundwater flow.
  - Keep the answer at planning, inspection, route/privacy/handwashing setup, maintenance, and handoff level.
  - Use boundary language for excavation/construction engineering, pit sizing formulas, pathogen treatment guarantees, waste handling, chemical disinfectant formulas, groundwater safety guarantees, legal/code claims, or medical treatment.
first_actions:
  - Confirm the site is downhill from water sources and not on flood-prone or waterlogged ground.
  - Use the guide's separation checks as planning thresholds, including greater setbacks for sandy/highly permeable soil or karst/limestone terrain.
  - Keep the latrine away from cooking/eating areas, animal shelters/feed areas, old pits, and main routes while preserving a safe, visible, accessible path for intended users.
  - Place handwashing immediately near the latrine route with water, soap or ash, and runoff control that prevents mud and standing water.
  - Plan privacy, door or screen orientation, lighting or visibility on the route, and accessibility for children, elders, disabled users, and caretakers.
  - Set daily, weekly, monthly, and annual inspection checks for cleanliness, handwashing supplies, drainage/pooling, pests, vent or screen condition, cracks, instability, fill level, and records.
urgent_red_flags:
  - The proposed or current latrine is uphill from, too close to, or draining toward a well, borehole, spring, stream, or other drinking-water source.
  - The site is flood-prone, waterlogged, has a high water table, or groundwater has risen into or near the pit.
  - The slab, walls, door, route, or superstructure is unstable, cracked, collapsing, blocked, or unsafe to access.
  - Fill level is near the closure threshold, the pit has collapsed, or continued use creates obvious exposure risk.
  - There is persistent pooling, severe fly/odor problem, missing handwashing supplies, or users avoid the latrine because of privacy, harassment, darkness, or accessibility barriers.
forbidden_advice:
  - Do not provide excavation/construction engineering, structural design, slab design, lining design, shoring, collapse-recovery steps, or pit-entry instructions.
  - Do not provide pit sizing formulas, capacity calculations, or custom engineering dimensions as answer-card output.
  - Do not promise pathogen treatment, sterilization, safe decomposition, decontamination, groundwater safety, or legal/code compliance.
  - Do not provide waste handling, pit emptying, fecal-sludge handling, manual removal, transport, disposal, or reuse procedures.
  - Do not provide chemical disinfectant formulas, cleaner mixing ratios, lime/bleach dosing, contact-time tables, or medical treatment for sanitation-related illness.
do_not:
  - Do not choose a fixture type before checking water-source separation, drainage direction, soil/permeability concern, flood risk, and old-pit separation.
  - Do not keep a latrine in normal use when groundwater intrusion, collapse, severe instability, unsafe route access, or obvious water-source contamination risk is present.
  - Do not frame the card as a guarantee that the selected site is safe for groundwater, disease prevention, code compliance, or all users.
  - Do not give pit-emptying or waste-contact instructions; route those requests away.
routine_boundary: >
  This card owns latrine siting, separation-distance checks, route planning,
  handwashing placement, privacy/accessibility planning, routine maintenance
  inspection, and escalation handoffs. It does not own excavation or structural
  engineering, pit sizing formulas, waste handling, pathogen treatment claims,
  chemical disinfectant formulas, groundwater safety guarantees, code/legal
  determinations, or medical treatment.
acceptable_uncertain_fit: >
  If details are incomplete but the prompt is about where to put, inspect, or
  safely operate a planned latrine area, give conservative siting and inspection
  steps and ask one clarifying question only when needed. If any water-source,
  flood, groundwater, collapse, route-safety, privacy, or handwashing red flag
  is plausible, lead with stop-use or handoff language before routine planning.
clarifying_questions:
  - What water sources, kitchens, animal areas, old pits, homes, paths, and low or flood-prone ground are near the proposed site?
  - Is the latrine downhill from drinking-water sources, and what soil or terrain is present: clay, sandy/gravelly, rock, shallow bedrock, or karst/limestone?
  - Are there current problems with pooling water, flies, odor, missing handwashing supplies, privacy, unsafe access, cracks, collapse, or a nearly full pit?
