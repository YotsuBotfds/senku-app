source_invariants:
  - name: low-back strain scope
    guide: GD-915
    must_include:
      - It focuses on **lower-back pain from labor, sore muscles, and lifting habits**.
      - Use this guide for **common low-back strain after lifting, overuse, bending, twisting, or heavy work only after red flags are excluded**.
      - Do not route stiff neck, sprained ankle, broad "general trauma," major injury, abdominal emergency symptoms, or neurologic warning signs here as routine self-care.
  - name: relative rest and movement
    guide: GD-915
    must_include:
      - Back off the activity that caused the pain.
      - Keep moving gently.
      - The best pattern is usually **movement with limits**, not complete bed rest.
  - name: red flags are not routine self-care
    guide: GD-915
    must_include:
      - numbness in the groin or saddle area
      - loss of bladder or bowel control
      - new weakness in a leg or foot
      - fever, chills, or back pain with illness
      - history of cancer, IV drug use, or immune suppression with new back pain
      - severe pain after a fall, crash, or direct blow
      - back pain with abdominal pain, vomiting, a hard or swollen belly, no stool or gas, fainting, or a pulsing abdomen
      - pain that is getting worse every day instead of improving
    must_not_match:
      - "(saddle numbness|loss of bladder|loss of bowel|leg weakness|pulsing abdomen)[^\\n]{0,120}(routine|watch at home|simple strain)"
