notes: >
  Primary owner is GD-298 for pediatric emergency medicine prompts where age,
  weight, airway anatomy, pediatric vital signs, seizure duration, dehydration,
  shock, respiratory distress, common pediatric emergencies, fluid resuscitation,
  or neonatal emergency physiology drives the answer. This card preserves the
  source guide's educational/austere-setting boundary and does not add dosing,
  treatments, diagnostic rules, or emergency thresholds beyond GD-298.
