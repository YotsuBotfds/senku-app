source_invariants:
  - name: pediatric emergency escalation and weight based dosing
    guide: GD-298
    must_include:
      - In any acute emergency, call professional emergency services immediately.
      - Accurate weight is essential for all pediatric drug dosing.
      - Children are not small adults.
    must_not_match:
      - "children are small adults"
  - name: shock hypotension delay guard
    guide: GD-298
    must_include:
      - Do NOT wait for hypotension to initiate resuscitation.
      - Tachycardia + delayed capillary refill + cool extremities = shock until proven otherwise.
  - name: seizure and airway negative instructions
    guide: GD-298
    must_include:
      - do not force anything into the mouth.
      - Do NOT examine the throat or manipulate the airway unnecessarily.
      - Do NOT perform blind finger sweeps.
      - abdominal thrusts** in infants
