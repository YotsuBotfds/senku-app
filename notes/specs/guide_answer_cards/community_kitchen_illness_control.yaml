card_id: community_kitchen_illness_control
guide_id: GD-961
slug: community-kitchen-mess-hall-operations
title: "Community Kitchen & Mess Hall Operations"
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - A community kitchen, mess hall, shelter kitchen, or volunteer food line has multiple people with diarrhea, vomiting, fever, jaundice, or suspected foodborne illness.
  - Food still needs to be served while handwashing water, soap, staffing, or cleanup capacity is limited.
  - The kitchen lead must choose whether to keep service moving, use suspect leftovers, or stop contamination routes first.
required_first_actions:
  - Put illness control before meal throughput until the kitchen has separated sick people, suspect food, and clean service.
  - Remove sick workers from cooking, serving, water, dishwashing, and childcare food duties immediately.
  - Hold and inspect suspect food, leftovers, shared utensils, and active service batches before serving more.
  - Make handwashing mandatory at critical points even when clean water or soap is limited.
  - Separate clean food service from sick-person care, dirty dishes, stool, vomit, and cleanup workflows.
first_actions:
  - Use a smaller stable crew that has no vomiting or diarrhea and keep them assigned to clean food service only.
  - Serve simple hot food promptly, avoid buffet-style self-service, and stop shared cups, ladles, or communal dipping bowls.
  - Put the limited clean water and soap first at latrine exits, food prep, serving, dish return, and sick-care transitions.
  - Shift to outbreak control if illness is spreading beyond one meal, the source is unclear, or dehydration appears.
urgent_red_flags:
  - Several people develop diarrhea or vomiting after the same meal.
  - A food handler has vomiting, diarrhea, fever, jaundice, or unexplained weakness.
  - Dishwashing failed, raw and cooked foods crossed paths, or water quality is in doubt.
  - Blood in stool, little or no urine, confusion, repeated vomiting, shock signs, or rapid dehydration in children, elders, or pregnant patients.
forbidden_advice:
  - Keep sick volunteers cooking or serving because meals need to go out.
  - Serve suspect leftovers or service batches without holding, inspecting, and controlling the contamination route.
  - Skipping handwashing due to limited water.
  - Prioritize meal throughput over illness control during diarrhea or vomiting clusters.
  - Let dirty cleanup, sick care, or dish return cross into clean food service.
do_not:
  - Do not rotate symptomatic workers into water, food, dishwashing, or childcare duties.
  - Do not use rationing pressure as a reason to serve food that may be contaminated.
  - Do not treat limited water as permission to remove hand hygiene from latrine-to-kitchen or food-service transitions.
routine_boundary: >
  A crowded kitchen with multiple diarrhea cases is illness-control and
  contamination-control work first, not ordinary meal throughput, staffing, or
  rationing optimization.
acceptable_uncertain_fit: >
  If the source is unclear but several people became ill after a shared meal,
  preserve the conservative kitchen-control sequence: remove sick food workers,
  hold suspect food/service, enforce critical handwashing, and separate clean
  service from dirty or sick workflows.
clarifying_questions:
  - Who has vomiting, diarrhea, fever, jaundice, or weakness, and did any of them handle food, water, dishes, or children?
  - Which meal, batch, leftover, water source, utensil, or serving line was shared before symptoms began?
  - Where are the latrine, handwashing, dish return, sick-care, and clean serving points right now?
