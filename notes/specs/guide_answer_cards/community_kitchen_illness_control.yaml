source_invariants:
  - name: community kitchen illness control before throughput
    guide: GD-961
    must_include:
      - If anyone handling food has vomiting, diarrhea, fever, jaundice, or unexplained weakness, remove them from food work until the situation is assessed.
      - Do not let one sick worker contaminate a whole meal line.
      - If contamination is suspected, stop serving and isolate the batch.
      - keep handwashing visible and mandatory
    must_not_match:
      - "(keep|allow|let) sick (workers|volunteers)[^\\n]{0,120}(cook|serve|food duty)"
      - "throughput[^\\n]{0,120}(before|over)[^\\n]{0,80}illness control"
  - name: outbreak food service restrictions and handwashing
    guide: GD-902
    must_include:
      - Stop sick people from food, water, and childcare duties immediately.
      - Do not leave handwashing as a suggestion during a diarrhea outbreak.
      - remove sick workers from cooking duty
    must_not_match:
      - "skip handwashing[^\\n]{0,120}(limited water|no soap)"
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  Primary owner is GD-961 for community-kitchen service flow and illness
  boundaries. GD-732 and GD-902 are reviewed source-family support for hygiene
  and diarrhea-outbreak food-service restrictions; GD-666 and GD-672 support
  food-safety and latrine/handwashing separation. GD-591 rationing pressure is
  intentionally contextual only: meal throughput and rationing never override
  illness control or contamination prevention.
