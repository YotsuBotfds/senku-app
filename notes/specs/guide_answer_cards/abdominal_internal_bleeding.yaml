review_status: pilot_reviewed
notes: >
  Candidate family mentions abdominal trauma/internal bleeding. This pilot card
  uses the current guide-owned abdominal emergency surfaces: hard or guarded
  belly, shock/collapse with abdominal pain or injury, GI bleeding with shock
  signs, and possible ruptured ectopic pregnancy, plus first-aid/trauma shock
  routing. It does not add new abdominal trauma procedures. GD-558 EMS/field
  triage and GD-039 field surgery may be adjacent triage or surgical owners
  requiring review, but are not automatic card owners without explicit
  prompt/card evidence.
