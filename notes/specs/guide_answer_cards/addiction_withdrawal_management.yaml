card_id: addiction_withdrawal_management
guide_id: GD-299
slug: addiction-withdrawal-management
title: "Addiction and Withdrawal Management"
risk_tier: critical
evidence_owner: guide-corpus
applies_when:
  - A prompt asks about severe alcohol withdrawal, delirium tremens, DTs, withdrawal seizure, confusion, hallucinations, fever, unsafe agitation, or inability to supervise withdrawal safely.
  - A prompt asks about benzodiazepine, benzo, sedative, or tranquilizer withdrawal with seizure, delirium, confusion, hallucinations, fever, unsafe agitation, unstable vital signs, collapse, or no reliable supervision.
  - A prompt asks about opioid overdose, naloxone use, naloxone-triggered withdrawal, or whether to give opioids after naloxone to relieve withdrawal symptoms.
required_first_actions:
  - Treat severe alcohol withdrawal, delirium tremens, withdrawal seizure, severe sedative withdrawal, or benzodiazepine withdrawal with red flags as an emergency requiring immediate medical care or the fastest available evacuation.
  - Escalate immediately for seizure, delirium tremens, new confusion, disorientation, hallucinations, fever, unsafe agitation, collapse, unstable vital signs, or inability to supervise continuously.
  - For possible opioid overdose, prioritize breathing: give naloxone if available, support airway and breathing, call emergency services, and monitor because overdose symptoms can return.
  - Distinguish opioid withdrawal discomfort from overdose respiratory danger; slow, absent, noisy, or abnormal breathing is the emergency.
first_actions:
  - Keep the answer focused on emergency recognition, supervision limits, naloxone, airway/breathing support, and escalation.
  - Ask only questions that do not delay emergency action, such as whether the person is breathing normally, awake, supervised, and whether naloxone or emergency help is available.
  - Use the guide's harm-reduction framing without converting the response into detox, MAT, tapering, supplement, or alcohol-dose instructions.
urgent_red_flags:
  - Seizure, repeated seizure, withdrawal seizure, or collapse.
  - Delirium tremens, new confusion, disorientation, paranoia, hallucinations, or inability to stay oriented.
  - Fever, severe agitation that is unsafe to the person or others, unstable vital signs, or severe tremor with deterioration.
  - No reliable sober adult able to observe continuously or unsafe setting for supervision.
  - Slow, absent, noisy, gasping, or abnormal breathing; blue or gray color; unresponsiveness; or inability to wake after opioid exposure.
forbidden_advice:
  - Do not frame severe alcohol withdrawal, DTs, withdrawal seizure, or severe sedative withdrawal as a home taper, supplement plan, sleep-it-off plan, or watch-and-wait routine.
  - Do not recommend alcohol dosing or drinking alcohol to treat severe alcohol withdrawal.
  - Do not provide detox, benzodiazepine, sedative, buprenorphine, methadone, clonidine, or MAT dosing as the answer-card output.
  - Do not re-administer opioids after naloxone to relieve acute withdrawal.
  - Do not reassure abnormal breathing after opioid exposure as ordinary opioid withdrawal.
do_not:
  - Do not substitute vitamins, magnesium, herbal remedies, alcohol, or home observation for emergency escalation when severe withdrawal red flags are present.
  - Do not treat hallucinations, confusion, fever, unsafe agitation, or inability to supervise as a routine withdrawal course.
  - Do not blur opioid withdrawal discomfort with overdose respiratory danger.
routine_boundary: >
  Mild withdrawal support, long-term recovery, detox planning, and MAT dosing are
  outside this reviewed card. This card applies to severe withdrawal red flags
  and opioid overdose/naloxone safety boundaries only.
acceptable_uncertain_fit: >
  If the prompt is incomplete but severe alcohol/sedative withdrawal or opioid
  overdose is plausible, preserve emergency escalation and breathing-first
  framing while asking minimal clarifying questions that do not delay care.
clarifying_questions:
  - Is the person awake and breathing normally?
  - Was there a seizure, confusion, hallucination, fever, unsafe agitation, or collapse?
  - Is a reliable sober adult able to supervise continuously while emergency help is arranged?
  - Is naloxone available, and has it already been given?
