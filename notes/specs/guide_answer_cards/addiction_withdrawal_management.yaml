source_invariants:
  - name: severe_withdrawal_emergency_boundary
    guide: GD-299
    must_include:
      - severe alcohol or sedative withdrawal and opioid overdose are escalation problems, not home detox projects.
      - Treat alcohol withdrawal, benzodiazepine withdrawal, or other sedative withdrawal as an emergency when there is a seizure, delirium tremens, new confusion, disorientation, hallucinations, fever, severe tremor with unstable vital signs, unsafe agitation, collapse, or no reliable sober adult able to supervise continuously.
      - Do not frame severe withdrawal as a home taper, supplement plan, or alcohol-dosing plan
    must_not_match:
      - "(?:drink|administer|give|dose)[^\\n]{0,80}alcohol[^\\n]{0,120}(?:withdrawal|DT|delirium tremens)"
      - "treat[^\\n]{0,80}(?:DTs|delirium tremens|withdrawal seizure)[^\\n]{0,120}(?:at home|with supplements)"
  - name: opioid_overdose_naloxone_boundary
    guide: GD-299
    must_include:
      - Opioid withdrawal can be intensely uncomfortable, but overdose is suggested by slow, absent, noisy, or abnormal breathing, blue or gray color, unresponsiveness, or inability to wake.
      - Give naloxone if available, support airway and breathing, call emergency services, and keep monitoring because symptoms can return after naloxone wears off.
      - Do not re-administer opioids to relieve naloxone-triggered withdrawal
    must_not_match:
      - "(?:give|take|use)[^\\n]{0,80}opioids[^\\n]{0,120}relieve naloxone"
      - "ordinary opioid withdrawal[^\\n]{0,120}(?:slow|absent|noisy|abnormal) breathing"
