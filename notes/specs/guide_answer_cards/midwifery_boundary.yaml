notes: >
  Boundary-only reviewed answer card for GD-041. It closes the metadata/card
  audit gap for midwifery while limiting runtime use to pregnancy/labor support
  intake, logs, danger-sign screening, birth-plan communication, and handoff.
  It deliberately excludes delivery procedures, medication/dosing, induction,
  fetal monitoring interpretation, diagnosis, postpartum hemorrhage treatment,
  newborn resuscitation, legal decisions, clearance, and certification.
  READY_FOR_PARENT_CLOSE.
