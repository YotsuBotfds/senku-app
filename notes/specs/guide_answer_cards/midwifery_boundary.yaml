card_id: midwifery_boundary
guide_id: GD-041
slug: midwifery
title: "Midwifery & Childbirth"
risk_tier: critical
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A pregnancy or labor support prompt needs intake, observation logging, danger-sign screening, birth-plan communication, or handoff planning rather than procedure, medication, diagnosis, or emergency treatment instructions.
  - The user needs help organizing gestational context if known, contraction timing, bleeding, fluid leakage, fetal movement, pain, vital-sign concerns, support preferences, and who to call.
  - The answer should keep routine midwifery support separate from obstetric emergencies, ectopic pregnancy concern, hypertensive emergency, postpartum hemorrhage, or newborn danger signs.
required_first_actions:
  - Confirm whether this is routine pregnancy/labor support or a danger-sign handoff; if active emergency signs are present, route away before routine support.
  - Start with gestational age or due date if known, whether labor has started, contraction start/frequency/duration, bleeding, fluid leakage, fetal movement changes, pain location and severity, fever, headache/vision/right-upper-abdominal symptoms, blood pressure concern if already measured, dizziness/fainting, seizure, location, transport, and care team contact status.
  - Keep observations separate from diagnosis, fetal-monitor interpretation, delivery decisions, legal decisions, clearance, and certification.
  - Give only communication, logging, support-role, and handoff framing inside this card.
first_actions:
  - Build a time-stamped contraction log with start time, frequency, duration, intensity description, and whether the pattern is changing.
  - Record bleeding amount and color, fluid leakage timing and character, fetal movement change, pain location and severity, fever or vital-sign concern, and any severe headache, vision change, right-upper-abdominal pain, dizziness, fainting, or seizure.
  - Summarize birth-plan communication points such as preferred support person, known pregnancy risks, allergies if volunteered, transport plan, chosen birth setting, and clinician or midwife contact details.
  - Prepare a concise handoff note for a midwife, OB, clinician, emergency service, or reviewed emergency owner.
  - Use uncertainty language and ask targeted questions when gestational age, membrane status, bleeding amount, fetal movement, pain pattern, or vital signs are unclear.
urgent_red_flags:
  - Heavy bleeding, shock signs, fainting, severe weakness, pale/cool skin, confusion, or rapid worsening.
  - Severe abdominal or pelvic pain with possible pregnancy, missed or late period, one-sided pain, shoulder-tip pain, vaginal bleeding, dizziness, or fainting suggesting ectopic or internal bleeding concern.
  - Seizure, severe headache, vision changes, right-upper-abdominal or epigastric pain, altered mental status, or severe blood-pressure concern during pregnancy, labor, or postpartum.
  - Cord visible or felt before birth, head delivered but shoulders stuck, severe pain between contractions, suspected uterine rupture, or active labor emergency.
  - Fluid leakage with concern for cord prolapse, infection, abnormal color/odor, fever, or fetal movement decrease.
  - Newborn not breathing, blue or pale, limp, fever, low temperature, poor feeding, seizure, severe jaundice, or umbilical infection signs.
  - Postpartum heavy bleeding, boggy uterus concern, large clots, shock signs, fever, foul lochia, or maternal confusion.
forbidden_advice:
  - Do not provide delivery procedure instructions, pushing maneuvers, shoulder dystocia maneuvers, breech delivery steps, cord management, placental delivery, manual removal, or uterine compression instructions from this card.
  - Do not provide induction, medication selection, medication dosing, oxytocin, magnesium sulfate, antihypertensive, antibiotic, pain-medication, or herbal dosing advice.
  - Do not interpret fetal monitoring, diagnose labor stage or complications, determine fetal distress, diagnose ectopic pregnancy, preeclampsia, rupture, infection, or hemorrhage, or clear a person for home birth, travel, return to activity, or delayed care.
  - Do not provide postpartum hemorrhage treatment, newborn resuscitation, neonatal emergency care steps, legal decisions, custody/consent decisions, or safety certification.
  - Do not frame emergency red flags as routine labor discomfort, normal pregnancy changes, watchful waiting, or birth-plan preference.
do_not:
  - Do not turn GD-041 delivery, cord, placenta, newborn, medication, hemorrhage, or emergency sections into reviewed-card instructions.
  - Do not override reviewed emergency owners when the prompt includes active labor emergency, obstetric emergency, possible ectopic, hypertensive emergency, postpartum hemorrhage, or newborn danger.
  - Do not give reassurance without a danger-sign screen when bleeding, fluid leakage, fetal movement change, severe pain, vital-sign concern, or postpartum/newborn danger is mentioned.
routine_boundary: >
  This card owns boundary-only pregnancy and labor support intake: gestational
  context if known, contractions/bleeding/fluid/movement/pain/vital-concern
  logs, danger-sign screening, birth-plan communication, and midwife, OB,
  clinician, emergency-service, or reviewed-owner handoff. It stops before
  delivery procedures, medications or dosing, induction, fetal-monitor
  interpretation, diagnosis, postpartum hemorrhage treatment, newborn
  resuscitation, legal decisions, clearance, or certification.
acceptable_uncertain_fit: >
  If the prompt is incomplete but plausibly pregnancy or labor support, ask for
  gestational age or due date if known, contraction pattern, bleeding, fluid
  leakage, fetal movement, pain, fever or vital concerns, and care-team access.
  If any danger sign appears, keep only the observation log and route to the
  specific reviewed emergency or clinician owner.
clarifying_questions:
  - How many weeks pregnant or what due date, if known, and is this pregnancy, labor, delivery, or postpartum?
  - When did contractions start, how often are they coming, how long do they last, and are they getting stronger or closer together?
  - Is there vaginal bleeding, fluid leakage, decreased fetal movement, severe pain, fever, headache, vision change, right-upper-abdominal pain, high blood pressure concern, dizziness, fainting, or seizure?
  - Has a midwife, OB, clinician, emergency service, or birth facility been contacted, and what transport options are available?
  - What birth-plan preferences or support-person details should be communicated during handoff?
citation_ids:
  - gd-041-reviewed-midwifery-boundary
  - gd-041-prenatal-danger-signs
  - gd-041-labor-stages-contractions
