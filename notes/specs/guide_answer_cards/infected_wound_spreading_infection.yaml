source_invariants:
  - name: spreading wound infection escalation
    guide: GD-585
    must_include:
      - Mark the edge of the red area with a pen or line.
      - Check every 2 hours to see if redness is spreading beyond the line.
      - Red streaking moving up the limb from the wound toward the heart represents lymphangitis
    must_not_match:
      - "close[^\\n]{0,120}(infected|dirty|puncture)[^\\n]{0,80}wound"
review_status: pilot_reviewed
notes: >
  Card avoids chronic-wound ownership and focuses on acute wound infection,
  spreading cellulitis, lymphangitis, and sepsis escalation.
