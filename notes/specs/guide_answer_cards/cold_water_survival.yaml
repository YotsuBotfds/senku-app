source_invariants:
  - name: post-rescue airway breathing and gentle warming
    guide: GD-396
    must_include:
      - Treat airway and breathing first.
      - start CPR with rescue breaths if not breathing normally
      - keep horizontal
      - rewarm gently
    must_not_match:
      - "have them (stand|walk)[^\\n]{0,80}immediately after rescue"
      - "swim hard to (stay warm|warm up|survive)"
  - name: in-water survival favors flotation and conservation
    guide: GD-396
    must_include:
      - Do not swim hard
      - Assume survival floating position (HELP or huddle).
      - Avoid vigorous swimming
      - Conserve energy
  - name: ice rescue visible victim sequence
    guide: GD-396
    must_include:
      - Call emergency help now
      - Keep rescuers off unsafe ice
      - Reach or throw if visible or reachable
      - Pull horizontally
      - Do not lead with probing, chiseling, or body-search actions while a rescue attempt is still possible.
  - name: severe hypothermia apparent death boundary
    guide: GD-396
    must_include:
      - Assume patient is alive.
      - Even if unresponsive and apparently dead, resuscitate all cold-water submersion victims.
      - Do not declare death until patient is warm.
review_status: pilot_reviewed
notes: >
  Primary owner is GD-396 for cold-water immersion, cold shock, swimming
  failure, HELP/huddle positioning, post-rescue horizontal handling, gentle
  rewarming, near-drowning after cold-water rescue, and ice-breakthrough rescue
  sequencing. The card intentionally avoids adding new survival-time thresholds
  or prognosis claims and keeps answer generation anchored to rescue,
  airway/breathing, and gentle hypothermia handling first.
