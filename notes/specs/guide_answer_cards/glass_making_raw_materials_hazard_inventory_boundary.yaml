card_id: glass_making_raw_materials_hazard_inventory_boundary
guide_id: GD-711
slug: glass-making-raw-materials
title: "Glass Making: Raw Materials & Furnace Construction"
risk_tier: critical
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user needs boundary-level glassmaking raw-material or furnace-area hazard inventory without asking how to mix, extract, calcine, melt, form, anneal, build, operate, certify, or return equipment to service.
  - A prompt concerns silica dust, flux labels, unknown additives, container damage, storage separation, access logs, visible heat or fume concern, caustic exposure concern, fire exposure, or owner handoff.
  - A user needs stop-work, batch-hold, access-control, or qualified glass, furnace, materials, chemical-safety, fire-safety, emergency, or site-owner routing before any glassmaking activity.
required_first_actions:
  - Start with boundary-only inventory and non-invasive observation; do not provide batch recipes, furnace construction, melting, forming, annealing, flux extraction, calcination, temperatures, PPE efficacy guarantees, return-to-service, legal/code claims, or safety certification.
  - Identify the material or area, owner or responsible operator, current activity status, access-control status, material labels and sources, storage condition, visible hazards, work-paused or batch-held status, and who can authorize qualified review.
  - Screen stop-work and hold flags before routine inventory; if present, route to the responsible glass, furnace, materials, chemical-safety, fire-safety, emergency, or site owner.
  - Hand off procedural glassmaking, furnace construction or operation, material processing, extraction, calcination, temperatures, PPE guarantees, return-to-service decisions, legal/code claims, and safety certification.
conditional_required_actions:
  - trigger_terms:
      - silica dust
      - dust cloud
      - respirable dust
      - flux
      - caustic
      - unknown additive
      - unlabeled additive
      - unlabeled container
      - fumes
      - smoke
      - heat
      - fire
      - burn
      - exposure symptoms
      - damaged container
      - uncontrolled access
      - proceed anyway
    required_actions:
      - Treat as a stop-work, batch-hold, access-control, or owner-handoff screen, not routine glassmaking planning.
      - Keep the answer limited to non-invasive observation, labels, storage/access logs, red-flag documentation, and qualified or emergency routing.
  - trigger_terms:
      - batch recipe
      - ratio
      - percentage
      - furnace construction
      - build a furnace
      - melting
      - forming
      - annealing
      - flux extraction
      - calcination
      - temperature
      - safe to use
      - return to service
      - certify
      - code compliant
    required_actions:
      - Give a boundary and do not provide procedural glassmaking, recipe, furnace, processing, temperature, safe-use, legal/code, return-to-service, PPE-guarantee, or certification instructions from this card.
first_actions:
  - Build a hazard inventory with location, date, observer, material or area name, owner or responsible operator, current activity status, access-control status, and whether work is paused or a batch is held.
  - Record material labels and storage facts without recommending a formula or process: silica source label, flux label, stabilizer or additive label, container condition, source notes, storage separation, moisture or spill signs, unknown or mixed materials, and who is responsible for verification.
  - Record visible furnace-area and exposure red flags from a safe, non-invasive vantage point: active heat, smoke or fumes, fire exposure, dust release, caustic spill concern, damaged containers, blocked access, bystander access, and symptoms reported by anyone nearby.
  - Separate observations from decisions: document what is known, what is unknown, what is held or restricted, who was notified, and what qualified review is pending.
  - End with qualified glass, furnace, materials, chemical-safety, fire-safety, emergency, or site-owner routing whenever labels, storage, exposure, heat/fume status, access control, ownership, or authority is uncertain.
urgent_red_flags:
  - Visible silica dust release, dust clouds, unknown dust, damaged or leaking containers, unlabeled fluxes, unlabeled additives, mixed or unknown materials, caustic spill concern, or uncontrolled storage.
  - Active heat, smoke, fumes, fire, hot furnace area, burn injury, inhalation or eye symptoms, chemical exposure symptoms, or pressure to continue despite uncertainty.
  - Missing owner, unclear material source, missing access logs, bystander access, blocked access control, or a proposed batch using unknown or unlabeled materials.
  - Any request to certify that materials, storage, PPE, furnace area, exposure controls, a batch, or equipment is safe, compliant, ready for use, or ready to return to service.
forbidden_advice:
  - Do not provide batch recipes, ratios, percentages, substitutions, colorant amounts, stabilizer amounts, batch preparation, mixing order, or troubleshooting that changes a batch.
  - Do not provide furnace construction, furnace operation, fuel or air settings, crucible handling, melting, forming, casting, blowing, flat-glass work, annealing, or thermal schedules.
  - Do not provide flux extraction, ash leaching, evaporation, calcination, chemical preparation, material processing, temperatures, timing, or procedure optimization.
  - Do not provide PPE efficacy guarantees, exposure-clearance claims, return-to-service approvals, legal/code claims, environmental claims, inspection-pass statements, or safety certification.
  - Do not tell users to continue, restart, mix, grind, sift, dry, heat, melt, calcine, extract, form, anneal, repair, test, use, or certify glassmaking work after a red flag.
do_not:
  - Do not convert the source guide's raw-material percentages, preparation steps, furnace construction, melting, forming, annealing, coloring, defect fixes, or affiliate product details into reviewed-card instructions.
  - Do not treat silica dust, caustic fluxes, unknown additives, fumes, heat, fire, exposure symptoms, damaged containers, missing labels, or uncontrolled access as routine checklist items only.
  - Do not infer material identity, storage adequacy, exposure control adequacy, furnace safety, process readiness, legal compliance, or safe return-to-service from appearance or from a completed log.
  - Do not let hazard inventory support become recipe, extraction, calcination, furnace, melting, forming, annealing, repair, return-to-service, legal, or certification advice.
routine_boundary: >
  Routine GD-711 reviewed-card answers are limited to glassmaking raw-material
  and furnace-area hazard inventory, silica dust, flux, and unknown additive
  label screening, heat/fume/caustic/exposure red flags, stop-work or batch-hold
  flags, storage/access logs, and qualified glass, furnace, materials,
  chemical-safety, or fire-safety handoff. The card exits for batch recipes,
  furnace construction, melting, forming, annealing, flux extraction,
  calcination, temperatures, PPE efficacy guarantees, return-to-service,
  legal/code claims, and safety certification.
acceptable_uncertain_fit: >
  If the prompt is incomplete but appears to involve glassmaking raw materials,
  glass batch storage, furnace-area hazards, silica dust, fluxes, additives, or
  a decision about whether to proceed, provide a conservative inventory,
  hold/stop-work, labeling, access-control, and handoff answer. Ask for owner,
  activity status, labels, storage condition, exposure symptoms, visible heat or
  fume concerns, access control, and authority; avoid any recipe, procedure,
  temperature, PPE guarantee, legal/code, return-to-service, or certification
  advice.
clarifying_questions:
  - Are you trying to inventory materials, document visible hazards, decide whether to hold a batch or stop work, restrict access, or identify the qualified owner for handoff?
  - What material or area is involved, who owns it, and is any grinding, mixing, furnace, hot work, or glassmaking activity planned or active?
  - What can be observed without touching or operating anything: silica dust, unlabeled flux, unknown additives, damaged containers, spills, fumes, heat, fire, moisture, blocked access, bystanders, or symptoms?
  - Are all materials labeled by source and owner, and are storage/access logs complete?
  - Is anyone asking for a batch recipe, furnace construction, melting/forming/annealing, flux extraction, calcination, temperatures, PPE efficacy guarantee, return-to-service, legal/code claim, or certification?
applicability:
  owner: glassmaking raw-material and furnace-area hazard inventory, label screening, red flags, hold/stop-work flags, storage/access logs, and qualified handoff
  use_when:
    - glass_raw_material_hazard_inventory
    - silica_dust_flux_or_unknown_additive_label_screen
    - furnace_area_heat_fume_fire_or_caustic_red_flag
    - batch_hold_or_stop_work_decision
    - storage_access_log_or_owner_handoff
  do_not_use_when:
    - batch_recipe_or_ratio
    - furnace_construction_or_operation
    - melting_forming_or_annealing
    - flux_extraction_or_calcination
    - temperature_or_thermal_schedule
    - ppe_efficacy_return_to_service_legal_code_or_safety_certification
  handoff:
    - chemical-safety, fire-safety, emergency-care, or local authority when exposure symptoms, caustic materials, fire, smoke, fumes, burns, or active incidents dominate.
    - qualified glass, furnace, materials, chemical-safety, fire-safety, emergency, or site owner for labels, storage, access, exposure, hot work, authority gaps, return-to-service, legal, or certification requests.
actions:
  required:
    - classify the request as material inventory, label screen, visible hazard log, stop-work or batch-hold decision, storage/access record, or qualified handoff
    - begin with non-invasive observation and owner identification
    - screen heat, fume, caustic, dust, unknown-additive, damaged-container, exposure, fire, access, and authority red flags before routine inventory
    - hand off recipes, extraction, calcination, temperatures, furnace construction or operation, melting, forming, annealing, PPE guarantees, return-to-service, legal/code, and certification requests
  standard:
    - provide a short hazard inventory and storage/access log template
    - include material label, source, owner, storage condition, access status, visible red flags, work-paused or batch-held status, person notified, and pending qualified review
    - name qualified glass, furnace, materials, chemical-safety, fire-safety, emergency, or site-owner handoff when red flags or uncertainty appear
forbidden:
  - batch recipes, ratios, percentages, substitutions, colorant or stabilizer amounts, batch preparation, mixing order, or batch troubleshooting
  - furnace construction, furnace operation, fuel/air settings, crucible handling, melting, forming, casting, blowing, flat-glass work, annealing, or thermal schedules
  - flux extraction, ash leaching, evaporation, calcination, chemical preparation, material processing, temperatures, timing, or procedure optimization
  - PPE efficacy guarantees, exposure-clearance claims, return-to-service approvals, legal/code claims, environmental claims, inspection-pass statements, or safety certification
fallback:
  - If a prompt mixes hazard inventory with procedural glassmaking, answer only the inventory, label, hold/stop-work, access-control, and handoff part.
  - If material identity, source, labels, owner, storage condition, exposure status, hot-work status, or access control is unknown, document that uncertainty and route before use.
  - If silica dust, fumes, smoke, fire, caustic exposure, damaged containers, unlabeled fluxes, unknown additives, symptoms, active heat, uncontrolled access, or pressure to continue is present, stop routine inventory framing and escalate.
