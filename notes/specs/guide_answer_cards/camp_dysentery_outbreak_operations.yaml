source_invariants:
  - name: camp diarrhea outbreak operations core
    guide: GD-902
    must_include:
      - Stop sick people from food, water, and childcare duties immediately.
      - Create sick, care, and clean zones before moving anyone around.
      - Do not leave handwashing as a suggestion during a diarrhea outbreak.
      - Track at minimum
    must_not_match:
      - "(azithromycin|ciprofloxacin|metronidazole|ceftriaxone|doxycycline)[^\\n]{0,80}(dose|dosing|mg)"
      - "chlorin(e|ation)[^\\n]{0,80}[0-9]+\\s*(mg|ppm|drops)"
  - name: outbreak red flags and diagnosis boundary
    guide: GD-902
    must_include:
      - do not wait for stool testing, perfect diagnosis, or a completed investigation if these are present
      - blood in stool plus weakness
      - little or no urine
      - confusion or lethargy
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  Reviewed bounded answer card for GD-902 camp diarrhea/dysentery outbreak
  operations only. It preserves first-hour containment, sick/care/clean zone
  separation, removal of sick people from food/water/childcare duties,
  mandatory handwashing, water/latrine/kitchen checks, case tracking, and
  dehydration/shock/blood/confusion escalation. It intentionally excludes
  antibiotic selection or dosing, lab diagnosis, disease-specific treatment
  protocols, detailed chlorination calculations beyond routing to
  water-purification, public-health authority/legal quarantine detail, and near
  misses such as one-person diarrhea, routine kitchen cleanup, ordinary
  hygiene, generalized pandemic planning, or medication questions.
