source_invariants:
  - name: surgery_is_last_resort
    guide: GD-039
    must_include:
      - Only attempt in genuine life-or-death emergencies where no professional care exists.
      - The risk of death from attempted surgery by untrained persons may exceed the risk of the underlying condition.
      - Only attempt surgery when patient will certainly die without intervention.
  - name: assessment_before_operation
    guide: GD-039
    must_include:
      - DO NOT operate unless you have correctly identified the problem.
      - The diagnostic decision
      - Will this patient die in the next 24-48 hours without surgery?
      - defer surgery and manage medically if possible.
  - name: stop_criteria_and_limits
    guide: GD-039
    must_include:
      - Know your limits.
      - STOP OPERATING.
      - Close what you can safely close and get patient to professional care or manage supportively.
      - Proceeding blindly causes death.
  - name: evisceration_and_postop_red_flags
    guide: GD-039
    must_include:
      - Try to push organs back in
      - Keep organs moist and covered
      - Urgent transport to surgeon is only appropriate treatment
      - Any fever >101
      - Any spreading redness warrants antibiotics immediately.
