card_id: menstrual_hygiene_product_safety_boundary
guide_id: GD-063
slug: feminine-hygiene-production
title: Feminine Hygiene Manufacturing
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - User asks about menstrual hygiene product inventory, routine use-safety, clean/dry storage, discard decisions, supply logs, product irritation, infection warning signs, toxic-shock-like red flags, vulnerable users, or clinician/public-health handoff.
  - The prompt is about pads, reusable menstrual products, improvised menstrual supplies, shared stock, school/shelter/community distribution, storage contamination, wash/dry failures, or whether a product should be discarded or escalated.
  - The answer can stay at inventory, hygiene, red-flag screening, discard-or-handoff, and non-diagnostic support level.
required_first_actions:
  - Start with product and user-context intake: product type, source or batch, reusable or single-use status, current condition, cleanliness, drying, storage, contamination, owner labeling, and whether the user is pregnant, postpartum, immunocompromised, dependent on a caregiver, or otherwise vulnerable.
  - Screen for irritation, infection, and toxic-shock-like red flags before routine product advice.
  - Keep clean, used, wet, damaged, moldy, unlabeled, unknown-history, and discarded products separate.
  - Do not call any product sterile, infection-proof, medically safe, absorbency-rated, leakproof, insertion-safe, or certified.
  - Hand off to a clinician, midwife, emergency service, infection-control owner, facility owner, school/shelter lead, or public-health contact when red flags, vulnerable-user concerns, contamination uncertainty, or shared-stock problems are present.
first_actions:
  - Make a dated inventory and use-safety log with product type, quantity, source or batch if known, owner label, clean/used/wet/damaged/discard status, storage location, wash/dry failure, product changes, irritation reports, and handoff owner.
  - Store only fully dry reusable products in breathable clean storage, away from damp laundry, waste, pests, chemicals, and unlabeled unknown-history supplies.
  - Discard or isolate products that are moldy, persistently foul-smelling after washing and drying, visibly contaminated with unknown material, wet-stored, damaged, shedding fibers, chemically exposed, unlabeled in shared stock, or linked to repeated irritation.
  - Protect privacy, dignity, nonjudgmental access, safe water access, hand hygiene, and enough clean dry supplies for changes and washing/drying rotation.
  - Prepare a factual handoff summary when symptoms, contamination uncertainty, stock failures, or vulnerable-user needs exceed routine support.
urgent_red_flags:
  - Fever, chills, dizziness, fainting, confusion, widespread rash, vomiting, or diarrhea during or after tampon or internal menstrual product use.
  - Severe pelvic or abdominal pain, rapidly worsening pain, foul-smelling discharge, pus, sores, spreading swelling, or severe vulvar irritation.
  - Heavy bleeding with weakness, pallor, repeated large clots, fainting, or shock-like symptoms.
  - Possible pregnancy, postpartum bleeding or pain, immunocompromised status, infant/young adolescent vulnerability, disability, dependence on a caregiver, or inability to maintain clean/dry product access.
  - Symptoms that are new, severe, recurrent, not improving, or substantially different from the person's baseline.
  - Shared stock with wet storage, mold, pest contact, chemical exposure, unknown history, mixed clean/used items, missing labels, or repeated reports of irritation.
forbidden_advice:
  - Do not provide production patterns, sewing dimensions, material recipes, absorbency ratings, leakproof claims, waterproof claims, manufacturing quality claims, or product certification.
  - Do not provide sterilization recipes, process parameters, times, temperatures, pressures, chemical concentrations, boiling instructions, validation tests, pathogen-elimination guarantees, or sterile-status claims.
  - Do not provide menstrual cup or disc insertion instructions, removal troubleshooting, internal-device fitting, device selection for anatomy, or internal exam guidance.
  - Do not diagnose or treat irritation, infection, toxic shock syndrome, STI, pregnancy complications, heavy bleeding causes, anemia, allergy, or any gynecologic condition.
  - Do not provide medication names, dosing, antifungal, antibiotic, pain-medication, hormone, contraception, fertility, abortion, or pregnancy-management guidance.
  - Do not provide legal claims, return-to-school or work clearance, public-health certification, or safety certification.
do_not:
  - Do not reassure fever, rash, fainting, vomiting/diarrhea, severe pain, foul discharge, heavy bleeding, postpartum symptoms, pregnancy concern, or immunocompromised symptoms as routine period problems.
  - Do not treat scarcity or embarrassment as a reason to keep using wet, moldy, damaged, contaminated, chemically exposed, unlabeled, or irritating products.
  - Do not convert the source guide's production, cup, disc, sanitization, or absorbency content into reviewed-card instructions.
routine_boundary: >
  This card owns only menstrual hygiene product inventory and use-safety
  boundaries: supply and condition logs, clean/used/wet/discard separation,
  complete drying and storage checks, irritation/infection/toxic-shock-like
  red-flag screening, vulnerable-user flags, privacy/dignity support, and
  clinician, facility, school, shelter, infection-control, or public-health
  handoff. It does not own production methods, sterilization procedures,
  absorbency claims, insertion/device instructions, diagnosis, treatment,
  medication/dosing, legal claims, or safety certification.
acceptable_uncertain_fit: >
  If product status, storage history, symptoms, pregnancy/postpartum status,
  immunocompromised status, caregiver support, or shared-stock labeling is
  unclear, lead with conservative separation, discard-or-handoff language, and
  a red-flag screen. Give only non-diagnostic inventory, hygiene, drying,
  storage, privacy, and handoff-preparation steps.
clarifying_questions:
  - What product type is involved, and is it clean, used, wet, damaged, moldy, unlabeled, chemically exposed, or unknown-history?
  - Is there fever, chills, rash, vomiting, diarrhea, fainting, severe pelvic or abdominal pain, foul-smelling discharge, sores, swelling, heavy bleeding, pregnancy, postpartum status, or immunocompromised status?
  - Is this a personal supply, shared household stock, school/shelter/community stock, or caregiver-managed supply?
  - Are there enough clean, fully dry products, safe water, soap, privacy, and breathable storage for the next cycle or distribution period?
