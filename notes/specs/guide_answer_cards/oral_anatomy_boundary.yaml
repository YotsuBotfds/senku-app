  area naming, symptom-location logs, non-diagnostic education, red-flag
  routing, and dentist or clinician handoff. It excludes diagnosis,
  extraction, drilling, filling, orthodontic and prosthetic procedures,
  incision or drainage, medication and anesthetic dosing, treatment decisions,
  return-to-use or chewing clearance, legal claims, and safety certification.
