source_invariants:
  - name: oral anatomy guide routes practical dental care to sibling owners
    guide: GD-221
    must_include:
      - "Use this guide for structure, terminology, and context."
      - "This guide explains what the parts are; the linked guides handle the practical cleaning, prosthetic, and urgent-care steps."
      - "If you are trying to decide whether to escalate, swelling, pus, fever, trouble swallowing, trouble breathing, or worsening night pain are the main triggers to leave routine care."
  - name: tooth and jaw terminology is source backed
    guide: GD-221
    must_include:
      - "Teeth are complex organs with multiple layers, each serving distinct functions."
      - "Quadrants: 1=upper right, 2=upper left, 3=lower left, 4=lower right."
      - "Only movable bone of skull."
      - "Allows three motions: opening/closing (hinge), protrusion/retrusion (forward/backward), and lateral movement."
  - name: red flags require emergency owner not anatomy answer
    guide: GD-221
    must_include:
      - "Facial swelling with airway compromise"
      - "difficulty swallowing"
      - "Swelling of eyelid"
      - "Any of the following requires patient repositioning, airway clearance, and consideration of emergency tracheostomy"
  - name: anatomy card does not authorize procedures or dosing
    guide: GD-221
    must_not_match:
      - "(extract|drill|fill|drain|incision|antibiotic|ibuprofen|lidocaine|benzocaine)[^\\n]{0,160}(from this card|boundary card|answer card)"
