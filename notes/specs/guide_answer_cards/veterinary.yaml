review_status: pilot_reviewed
notes: >
  Source-backed reviewed card for GD-037 metadata/card audit closure. It is
  intentionally triage-, isolation-, monitoring-, and referral-first, and avoids
  reproducing or expanding GD-037 medication dosing and invasive procedure
  detail. Parasite-only, obstetric-specialty, routine husbandry, and everyday
  companion-animal prompts should route to their more specific guides when those
  are the better owner.
