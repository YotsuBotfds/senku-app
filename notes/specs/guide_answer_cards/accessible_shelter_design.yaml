source_invariants:
  - name: reviewed answer-card scope and exclusions
    guide: GD-444
    must_include:
      - This is the reviewed answer-card surface for GD-444.
      - Start with an access walk-through from arrival to the main activity, toilet or wash area, and exit path.
      - Do not use this card for structural engineering, ramp load calculations, electrical, plumbing, HVAC, permit/code compliance, legal determinations, medical care, restraints, security holds, evacuation or rescue tactics, or claims that a space is legally compliant.
  - name: route and entry dimensions
    guide: GD-444
    must_include:
      - "Maximum slope: 1:12"
      - "Minimum: 75 cm"
      - "Better: 80-85 cm"
      - "Passage width:"
  - name: communication and wayfinding alternatives
    guide: GD-444
    must_include:
      - Text + tactile labels
      - Written information accompanying any audio announcement
      - Flashing lights
      - Posted in multiple formats
  - name: school and community route ownership
    guide: GD-444
    must_include:
      - solve entrance and circulation first
      - one obvious accessible entrance and clear interior circulation
      - Include disabled people in planning
