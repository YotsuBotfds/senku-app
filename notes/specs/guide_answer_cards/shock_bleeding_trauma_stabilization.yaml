source_invariants:
  - name: immediate hemorrhage control and direct pressure
    guide: GD-584
    must_include:
      - Do not delay hemorrhage control to gather materials
      - Use direct pressure immediately
      - If bleeding soaks through cloth, do not remove the cloth
      - Do not remove embedded objects
    must_not_match:
      - "major arterial wound[^\\n]{0,160}(wait|observe|routine)"
  - name: tourniquet criteria and time marking
    guide: GD-584
    must_include:
      - Only apply if direct pressure fails after 3 minutes and bleeding is Class 3+
      - Mark the time
      - Uncontrolled bleeding in a limb that threatens life
    must_not_match:
      - "tourniquet[^\\n]{0,120}(minor|routine|first-line for all)"
  - name: shock and crush boundaries
    guide: GD-584
    must_include:
      - Do NOT give fluids if patient is unconscious or vomiting
      - Remove constricting shoes, jewelry, tight wraps, or splints
      - do not elevate it above the heart when compartment syndrome is possible
review_status: pilot_reviewed
notes: >
  Pilot-reviewed GD-584 card for field trauma stabilization. The card preserves
  the guide's emergency-first sequence for visible hemorrhage, shock,
  tourniquet/packing decisions, crush-compartment red flags, and suspected
  tension pneumothorax. It deliberately avoids expanding medication dosing,
  IV/blood-product care, suturing, analgesia, or procedural detail beyond the
  cited guide. Abdominal/internal bleeding remains owned by the separate
  abdominal_internal_bleeding card when prompts center GI bleeding, hard belly,
  guarding, possible pregnancy, or internal abdominal trauma.
