source_invariants:
  - name: observation_intake_boundary_only
    guide: GD-734
    must_include:
      - "Use it for recording observed or already-measured vital signs"
      - "oxygen saturation if a pulse oximeter reading is available"
      - "do not invent a diagnosis from one number"
      - "Do not diagnose the condition, choose treatment, give medication or dosing advice"
    must_not_match:
      - "use it[^\\n]{0,120}(diagnose|treat|dose)"
      - "oxygen saturation[^\\n]{0,120}(start oxygen|oxygen flow|liters per minute)"
  - name: trending_and_handoff_dominate
    guide: GD-734
    must_include:
      - "trends matter more than single measurements"
      - "Record each measurement with time"
      - "Any vital sign trending toward danger values"
      - "Sample Vital Signs Log"
    must_not_match:
      - "worsening vital signs[^\\n]{0,120}(watchful waiting|routine monitoring)"
  - name: emergency_owner_boundary
    guide: GD-734
    must_include:
      - "For condition-specific danger prompts, prefer the specific emergency owner guide"
      - "do not use as the sole owner for condition-specific emergency treatment"
      - "Do not diagnose the condition, choose treatment"
    must_not_match:
      - "condition-specific emergency[^\\n]{0,120}(use this guide only|sole owner)"
review_status: pilot_reviewed
notes: >
  Reviewed boundary-only support card for GD-734. It owns vital-sign
  observation, intake logging, trend/status documentation, measurement
  uncertainty, red-flag recognition, and clinician/emergency handoff. It
  deliberately excludes diagnosis, treatment decisions, medication/dosing,
  resuscitation protocols, oxygen therapy instructions, device calibration or
  repair, lab/imaging interpretation, clearance for work/transport/activity,
  legal claims, and safety certification. Condition-specific emergency prompts
  should route to their specific owner cards or guides, with GD-734 used only
  as handoff-support evidence.
