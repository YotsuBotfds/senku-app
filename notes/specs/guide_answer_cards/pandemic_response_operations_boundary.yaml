card_id: pandemic_response_operations_boundary
guide_id: GD-565
slug: pandemic-response-operations
title: "Pandemic Response & Large-Scale Quarantine Operations"
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - A community, shelter, clinic, school, workplace, or incident team needs pandemic operations intake, symptom/event count logs, or a concise status handoff.
  - The prompt asks how to track staffing, supply burn rate, space pressure, sanitation concerns, communication needs, or voluntary risk-reduction steps during a contagious-disease surge.
  - The user needs privacy-aware reporting prompts or a public-health/sanitation handoff without asking for diagnosis, treatment, enforcement, lab work, or outbreak declaration.
required_first_actions:
  - Keep the answer at boundary-level pandemic response operations, not diagnosis, treatment, enforcement, coercive isolation, legal/regulatory action, or certification.
  - Start by collecting operational facts already known: setting, symptom or event count, dates or trend, staffing status, supply burn rate or shortage, space constraints, sanitation concern, communication need, and handoff owner.
  - Protect privacy by using aggregate or need-to-know records and avoiding unnecessary disclosure of names, household details, private contact networks, or personally identifying health details.
  - Treat severe illness, fast growth, sanitation failure, supply exhaustion, staffing collapse, or unclear authority as prompts for urgent handoff to public-health, medical, sanitation, water, infection-control, logistics, or incident-command owners.
first_actions:
  - Make a dated operations log with consistent symptom or event definitions, counts, dates, coarse location or unit, trend, severity count if known, and confirmed-versus-rumor status.
  - Maintain a staffing, supply, and space status board that records available staff, essential gaps, PPE or key-supply burn rate, projected shortage date, usable rooms/areas, and communication needs.
  - Use voluntary risk-reduction planning such as clear public messaging, spacing, hygiene reminders, reduced unnecessary contacts, and support for food, rest, communication, and morale.
  - Prepare concise handoffs for public-health, sanitation, water, infection-control, logistics, or incident-command owners when counts rise, supplies run low, staffing fails, or sanitation concerns appear.
  - Keep community-facing reporting prompts privacy-aware: ask for counts, dates, symptom pattern, coarse place or event, and urgent needs, not public names or private contact networks.
urgent_red_flags:
  - Severe illness, death cluster, rapidly rising symptom or event counts, or a pattern that overwhelms routine staffing or space.
  - PPE or critical supply duration is short, burn rate is rising, or projected exhaustion is approaching.
  - Sanitation, laundry, waste, ventilation, food delivery, water, or crowded-space problems may increase spread or basic-care failure.
  - The prompt asks for diagnosis, treatment, medication, vaccine, enforcement, quarantine order, coercive isolation, identifiable contact tracing, lab sampling, outbreak declaration, legal/regulatory claim, or safety certification.
forbidden_advice:
  - Do not diagnose the disease, identify a definitive cause, or provide treatment, medication, vaccine, antibiotic, antiviral, prophylaxis, or clinical triage guidance from this card.
  - Do not issue enforcement orders, quarantine orders, coercive isolation instructions, legal/regulatory determinations, or safety certifications.
  - Do not ask for, publish, or operationalize private contact lists, names, household details, identifiable exposure networks, or public-shaming tactics.
  - Do not provide lab sampling, specimen handling, test interpretation, outbreak declaration, or safety-clearance instructions from this card.
  - Do not present voluntary risk-reduction planning as mandatory detention, policing, or punishment.
do_not:
  - Do not turn symptom/event counts or reporting thresholds into an outbreak declaration.
  - Do not replace public-health authorities, clinicians, sanitation leads, water leads, infection-control owners, logistics leads, legal authorities, or incident command.
  - Do not expose patient names, household identities, private contacts, or personally identifying health details in community-facing communication.
  - Do not reassure that a space, event, workplace, or group is safe when counts, authority, disease status, sanitation, staffing, or supplies are uncertain.
routine_boundary: >
  Routine pandemic operations support is appropriate only for intake, aggregate
  symptom/event count logging, staffing/supply/space communication records,
  voluntary risk-reduction planning, privacy-aware reporting prompts,
  sanitation handoff, and public-health handoff. It stops before diagnosis,
  treatment, vaccines, medications, enforcement, coercive isolation, private-data
  tracing, lab sampling, outbreak declarations, legal/regulatory claims, or
  safety certification.
acceptable_uncertain_fit: >
  If the prompt is plausibly about pandemic operations but details are
  incomplete, preserve uncertainty, ask for counts, dates, trend, staffing,
  supply, space, sanitation, and communication facts, recommend a minimal dated
  operations log, and hand off to the relevant owner instead of declaring a
  cause, ordering restrictions, or certifying safety.
clarifying_questions:
  - What setting is this for, how many people or events are being counted, and when did the reports start?
  - Are counts rising, stable, or uncertain, and are there severe illnesses, deaths, or urgent care needs?
  - What is the current staffing, supply burn rate or shortage, usable space, sanitation concern, and communication gap?
  - Who is the responsible public-health, sanitation, infection-control, logistics, or incident-command owner for handoff?
