source_invariants:
  - name: clinic_scope_not_treatment
    guide: GD-965
    must_include:
      - "This guide is about clinic layout and daily operations in a low-resource setting."
      - "It is not a substitute for medical training, diagnosis, or treatment guidance."
      - "It is not a hospital, and it should not try to behave like one."
    must_not_match:
      - "(diagnose|treat|prescribe|dose)[^\\n]{0,120}(from|using) (this|the) (clinic )?(layout|facility) guide"
  - name: limited_space_first_actions
    guide: GD-965
    must_include:
      - "Handwashing point at the entrance"
      - "Triage table or chair near the entrance"
      - "Waiting area that is separate from the exam space"
      - "Clean supply shelf"
      - "Dirty waste bin or bag"
      - "Simple records table"
      - "Isolation corner or separate room if any infectious patient is expected"
  - name: clean_dirty_and_waste_flow
    guide: GD-965
    must_include:
      - "Dirty items should not move back through clean areas."
      - "Keep the waiting area separate from triage, exam, and storage areas."
      - "Never store contaminated items with clean dressings or paperwork."
      - "Waste should move one direction only: from patient area to disposal area."
      - "Never let contaminated waste sit in the waiting area or on the exam table after use."
review_status: pilot_reviewed
notes: >
  Reviewed bounded answer card for GD-965. This card owns small clinic,
  medical-tent, health-post, and one-room facility layout/operations hygiene:
  handwashing at the entrance, front triage/intake, separated waiting/exam/
  storage, clean and dirty zones, waste flow, records, privacy, and an
  isolation corner. It deliberately excludes diagnosis, treatment protocols,
  emergency stabilization, staffing authority beyond records/flow roles, and
  outbreak quarantine policy beyond routing potentially infectious patients
  away from the main waiting line.
