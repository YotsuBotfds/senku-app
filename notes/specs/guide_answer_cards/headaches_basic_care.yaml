source_invariants:
  - name: routine headache self-care stays mild and bounded
    guide: GD-949
    must_include:
      - This guide is for common headaches from tension, dehydration, heat, missed meals, sleep loss, mild illness, and eye strain.
      - A headache is more likely to be simple if it is familiar, gradual, and improves with rest, fluids, food, or a quieter environment.
      - Do not assume a headache is harmless just because headaches are common.
    must_not_match:
      - "(sudden|worst|severe|confusion|stiff neck|neurologic|head injury)[^\\n]{0,140}(routine self-care|harmless|simple headache)"
  - name: red flags require urgent handoff
    guide: GD-949
    must_include:
      - If the headache comes with a high fever, stiff neck, confusion, or rash, treat it as a red flag
      - "Get urgent help if the headache comes with:"
      - a headache that starts suddenly and is very severe
      - severe eye pain or sudden vision loss
      - headache during pregnancy with swelling, high blood pressure, or vision changes
  - name: medication boundary avoids dosing expansion
    guide: GD-949
    must_include:
      - Use only as directed on the package or by a clinician.
      - Do not keep taking pain medicine day after day for frequent headaches without getting checked.
      - If you are dehydrated, vomiting, have kidney disease, stomach ulcers, are on blood thinners, or are pregnant, be cautious and seek guidance before using pain medicine.
    must_not_match:
      - "(ibuprofen|acetaminophen|aspirin|naproxen)[^\\n]{0,120}(mg|milligram|every [0-9]|dose)"
