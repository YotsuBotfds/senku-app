source_invariants:
  - name: hazardous plant card remains boundary only
    guide: GD-960
    must_include:
      - Use this reviewed card only for boundary-level hazardous plant avoidance and exposure intake
      - Do not use this reviewed card for plant identification certainty
      - chemical herbicide control
      - burn or disposal procedures
      - legal land-use claims
      - safety certification
  - name: uncertainty means avoid and hand off
    guide: GD-960
    must_include:
      - if you cannot confidently name the plant from multiple features and a reliable regional source, treat it as hazardous
      - Do not taste it.
      - Do not rub it on skin to test it.
      - Do not let children, pets, or livestock browse it.
      - Do not burn it.
  - name: immediate exposure actions and escalation
    guide: GD-960
    must_include:
      - Remove contaminated items. Clothing, gloves, shoes, and harnesses may keep spreading sap or residue.
      - do not make the person or animal vomit
      - Poison control, EMS, a clinician, or a veterinarian can help sooner than guesswork can.
      - a child or animal may have swallowed berries, seeds, bulbs, leaves, or unknown plant material
