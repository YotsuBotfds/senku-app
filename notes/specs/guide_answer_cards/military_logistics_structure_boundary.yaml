source_invariants:
  - name: reviewed answer-card scope and exclusions
    guide: GD-472
    must_include:
      - This is the reviewed answer-card surface for GD-472.
      - Use it for non-tactical logistics and administration support
      - Do not provide combat logistics, weapons or ammunition planning
    must_not_match:
      - (?i)certifies lawful ownership
      - (?i)hide missing supplies
      - (?i)evade enemy observation
  - name: handoff log contents
    guide: GD-472
    must_include:
      - Routine answers should create a simple logistics handoff log
      - accountable role
      - communication contact or channel owner
      - medical or evacuation support need
      - person or office receiving the handoff
  - name: urgent handoff triggers
    guide: GD-472
    must_include:
      - Immediate handoff is required for missing or unaccounted people
      - injury or urgent medical transport needs
      - failed communications affecting safety
      - suspected theft or diversion
      - unclear authority over people, records, property, or care responsibilities
