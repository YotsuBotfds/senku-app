source_invariants:
  - name: epidemic coordination activates above baseline
    guide: GD-667
    must_include:
      - "cases exceed what is normal"
      - "Activate your command structure"
      - "Two or more suspected cases"
      - "Daily briefing"
  - name: contact records stay private
    guide: GD-667
    must_include:
      - "Create a contact list"
      - "Assign one person to manage the register"
      - "Do not allow contact information to spread"
      - "Keep contact lists confidential"
    must_not_match:
      - "(post|publish|announce|share)[^\\n]{0,100}(contact names|contact list|household names|exposure details)"
  - name: isolation and quarantine remain distinct
    guide: GD-667
    must_include:
      - "isolation is for people who are sick or suspected to be infectious"
      - "quarantine or monitoring is for people exposed but not currently sick"
      - "Person is well but potentially infected"
      - "Person is sick and infectious"
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  Boundary-only reviewed card for GD-667. It covers epidemic/pandemic
  coordination first steps and deliberately excludes disease-specific isolation
  durations, bleach percentages or dilutions, PPE construction, medication/PEP,
  enforced quarantine tactics, mass-casualty triage, and decontamination.
  GD-902 is cited only as the first-owner handoff for camp diarrhea or
  dysentery operations.
