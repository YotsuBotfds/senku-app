source_invariants:
  - name: application_and_property_selection_first
    guide: GD-636
    must_include:
      - Narrow to the 3 most critical for your application.
      - Reality check
      - blending what you have
  - name: carbon_steel_requires_tempering_and_testing
    guide: GD-636
    must_include:
      - You must quench (rapid cool) and temper (reheat to specific temperature) to avoid brittleness.
      - Over-hardening (too-fast quench) makes tools shatter.
      - Test on scrap first.
  - name: zinc_lead_cadmium_hazard_boundaries
    guide: GD-636
    must_include:
      - Add zinc in small chunks, one at a time.
      - Do not melt lead indoors.
      - Identify and avoid cadmium alloys.
  - name: verification_before_reliance
    guide: GD-636
    must_include:
      - Test every batch
      - Never assume.
      - No visible cracks, pits, or large voids
review_status: pilot_reviewed
notes: >
  Primary owner is GD-636 only. This card deliberately preserves the guide's
  decision-tree shape and avoids inventing recipes, ratings, or performance
  guarantees. It is suitable for answer planning around alloy choice and
  pre-work safety/verification boundaries, not for certifying structural,
  pressure, food-contact, or tool-service suitability.
