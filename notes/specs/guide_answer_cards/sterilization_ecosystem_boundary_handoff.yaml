applicability:
  owner: sterilization ecosystem boundary and qualified owner handoff
  use_when:
    - source_or_use_case_intake_before_method_selection
    - uncertainty_log_for_unknown_source_prior_use_or_exposure
    - clean_dirty_separation_and_labeling
    - escalation_flags_for_medical_lab_food_water_or_public_use
    - qualified_owner_handoff
  do_not_use_when:
    - treatment_guarantee_or_pathogen_kill_claim
    - sterilization_parameters_or_chemical_recipe
    - medical_instrument_processing_or_autoclave_operation
    - water_potability_certification
    - lab_testing_protocol_or_specimen_handling
    - surgical_or_dental_readiness
    - legal_code_or_safety_certification
  handoff:
    - water-testing-quality-assessment or water-purification for water owner review after source-risk classification.
    - hygiene-disease-prevention-basics or infection-control for general hygiene and infection-control boundaries.
    - food-safety owner or responsible facility manager for food-contact use.
    - licensed clinical infection-control or sterile-processing owner for medical, dental, wound, patient-contact, or reusable-instrument use.
    - laboratory safety, biosafety, chemical-safety, or waste owner for lab material, cultures, sharps, chemicals, solvents, fuels, pesticides, or unknown residues.
actions:
  required:
    - classify intended use before method discussion
    - build uncertainty log
    - preserve clean_dirty separation
    - screen escalation flags
    - hand off to qualified owner
  standard:
    - label dirty_clean_unknown_do_not_use_or_owner_review_pending
    - keep high-consequence uses stopped until owner decision
    - avoid procedural parameters and certification language
forbidden:
  - treatment guarantees
  - sterilization parameters
  - chemical recipes or concentrations
  - medical instrument processing
  - autoclave operation
  - water-potability certification
  - lab testing protocols
  - surgical or dental readiness
  - pathogen kill claims
  - legal or code claims
  - safety certification
fallback:
  - If the intended use is unknown, keep the answer in intake mode and do not provide a method.
  - If contamination or prior use is unknown, keep the item or source out of medical, dental, food, drinking-water, lab, public, and vulnerable-person use pending owner review.
  - If an escalation flag is present, stop at separation, uncertainty log, and qualified owner handoff.
output:
  required:
    - intended use classification
    - known and unknown source facts
    - clean_dirty separation status
    - escalation flags present or absent
    - qualified owner handoff
    - explicit no-certification/no-procedure boundary
  prohibited:
    - procedural sterilization or disinfection instructions
    - chemical concentrations, dosing, or contact-time values
    - medical, dental, lab, food, or water safety clearance
    - pathogen kill or legal compliance claims
runtime_citation_policy: reviewed_source_family
source_invariants:
  - name: boundary_surface
    guide: GD-646
    must_include:
      - "boundary-level source and use-case intake"
      - "uncertainty logs"
      - "qualified owner handoff"
  - name: clean_dirty_and_uncertainty
    guide: GD-646
    must_include:
      - "If intended use or contamination is unknown, keep the answer in intake mode"
      - "If clean and dirty paths have crossed, log the crossover"
      - "Uncertainty is a stop-and-sort condition"
  - name: escalation_and_handoff
    guide: GD-646
    must_include:
      - "Escalate instead of giving routine cleaning advice"
      - "Choose the owner by intended use"
      - "The handoff should preserve the uncertainty log"
  - name: procedure_exclusions
    guide: GD-646
    must_not_match:
      - "\\b\\d+\\s*(minutes?|hours?|psi|ppm|mg|ml|%|degrees?|c|f)\\b"
      - "rolling boil"
      - "autoclave cycle"
      - "kills? all pathogens"
