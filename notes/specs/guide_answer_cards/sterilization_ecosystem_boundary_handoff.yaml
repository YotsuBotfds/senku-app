card_id: sterilization_ecosystem_boundary_handoff
guide_id: GD-646
slug: sterilization-ecosystem
title: "Sterilization Ecosystem - Water Testing to Medical Application"
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - User asks a sterilization, disinfection, cleaning, water, food-contact, lab, or medical-adjacent question before the correct owner is clear.
  - User needs source/use-case intake, uncertainty logging, clean/dirty separation, escalation flags, or qualified owner handoff.
  - User asks whether an item, surface, container, water source, batch, tool, or space can move from dirty or unknown status into clean, food, medical, lab, or shared use.
  - User asks for safety certification, potability, sterility, surgical or dental readiness, medical instrument reuse, lab clearance, or pathogen kill and needs a boundary refusal plus handoff.
required_first_actions:
  - Classify the intended use before discussing any method: water, routine cleaning, food-contact, medical-adjacent, clinical, dental, laboratory, shared facility, or unknown.
  - Capture uncertainty explicitly: source, prior use, contamination clues, exposed people, clean/dirty crossover, and missing owner decision.
  - Preserve clean/dirty separation immediately by labeling unknown or dirty items and keeping them out of clean storage, food-contact, drinking-water, wound-care, clinical, dental, and lab areas.
  - Screen for escalation flags involving medical, dental, wound, patient-contact, food, drinking water, lab, sewage, chemical, body-fluid, floodwater, public-use, or vulnerable-person exposure.
  - Hand off to the qualified owner for the intended use instead of giving procedural sterilization, disinfection, treatment, lab, medical, food-safety, or certification advice.
first_actions:
  - State that this card is boundary-only and does not certify safety or provide sterilization parameters.
  - Identify the source or item, intended use, exposure group, contamination type, and current clean/dirty status.
  - If details are unknown, keep the item or source out of use and build a short uncertainty log.
  - Separate dirty, unknown, splashed, wet, reused, or exposed items from clean paths and label their status.
  - Name the likely owner: water-quality/public-health, food-safety/facility manager, clinical infection-control/sterile-processing, lab safety/biosafety/chemical-safety/waste, or site/public-health/sanitation owner.
  - Provide only handoff facts and stop-use boundaries when an escalation flag is present.
urgent_red_flags:
  - Medical care, dental care, wound contact, injections, invasive procedures, patient-contact equipment, or reusable instruments.
  - Drinking water, cooking water, food-contact surfaces, shared meals, shelters, clinics, schools, elder care, or public distribution.
  - Laboratory samples, cultures, unknown biological material, sharps, chemicals, solvents, fuels, pesticides, or unlabeled residues.
  - Sewage, floodwater, body fluids, animal waste, clinical waste, rotten odor, unknown storage history, or mixed clean/dirty batches.
  - Any request to certify safety, prove sterility, declare potability, clear a surgical or dental setup, or guarantee pathogen kill.
forbidden_advice:
  - Do not provide treatment guarantees, sterility guarantees, pathogen kill claims, or safe-to-use certification.
  - Do not provide sterilization parameters, temperatures, times, pressure settings, contact times, concentration targets, dosing tables, or chemical recipes.
  - Do not provide medical instrument processing, reusable instrument clearance, autoclave operation, sterile-field procedure, surgical readiness, or dental readiness.
  - Do not provide water-potability certification, lab testing protocols, culture handling, specimen collection, or chemical test procedures.
  - Do not provide legal, code, compliance, inspection-pass, public-distribution, or safety-certification claims.
do_not:
  - Do not convert an unknown source or unknown prior use into a routine treatment plan.
  - Do not let clean and dirty paths cross without logging the crossover and downgrading the status to uncertain.
  - Do not tell the user that a surface, item, batch, tool, instrument, water source, or facility is safe for medical, dental, food, lab, public, or drinking use.
  - Do not answer a procedural request from this card when the safe action is owner handoff.
routine_boundary: >
  This card owns only boundary-level sterilization ecosystem triage: source and
  use-case intake across water, cleaning, food, laboratory, and
  medical-adjacent contexts; uncertainty logs; clean/dirty separation;
  escalation flags; and qualified owner handoff. It does not own treatment,
  sterilization, disinfection, laboratory, medical, dental, food-safety,
  water-potability, legal, or certification decisions.
acceptable_uncertain_fit: >
  If the prompt partially fits but details are missing, give a conservative
  boundary answer: keep the source or item out of high-consequence use, separate
  clean and dirty paths, log what is known and unknown, name the escalation
  flags, and hand off to the likely qualified owner. Ask at most one clarifying
  question after those safeguards.
clarifying_questions:
  - What is the intended use: drinking/cooking water, routine cleaning, food-contact, medical or dental care, laboratory work, public/shared use, or something else?
  - What is the source or item, and what contamination or prior-use history is known?
  - Has anything dirty, unknown, wet, splashed, or exposed crossed into the clean area or clean storage?
  - Are patients, wounds, vulnerable people, food recipients, lab workers, or the public involved?
citation_ids:
