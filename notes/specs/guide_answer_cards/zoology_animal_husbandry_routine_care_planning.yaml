applicability:
  owner: routine zoology and animal husbandry planning
  use_when:
    - routine_observation_logs
    - feed_water_shelter_checklists
    - cleaning_schedule_planning
    - ordinary_husbandry_records
    - veterinary_handoff_notes
  do_not_use_when:
    - veterinary_diagnosis_or_treatment
    - medication_dosing_or_vaccine_advice
    - breeding_procedures_or_castration
    - slaughter_butchering_or_carcass_processing
    - dangerous_animal_handling_or_restraint
    - emergency_animal_procedures
  handoff:
    - veterinary for sick, injured, abnormal, urgent, or treatment-oriented animal prompts.
    - zoonotic-disease for human exposure risk, suspicious animal disease patterns, or handler protection beyond routine hygiene.
    - animal-behavior-ethology for behavior interpretation and low-stress management boundaries.
    - species-specific livestock or companion-animal guides for detailed routine care of a particular animal type.
actions:
  required:
    - classify the prompt as routine planning or specialist handoff before giving advice
    - keep the output to checklists, schedules, observation logs, and factual handoff notes
    - ask what changed from baseline when the user reports a concern
    - route diagnosis, treatment, medication, vaccines, breeding, slaughter, dangerous handling, restraint, and emergencies away from this card
  standard:
    - recommend dated observation records
    - recommend clean water and uncontaminated feed checks
    - recommend dry, ventilated shelter and bedding checks
    - recommend manure removal and trough or feed-area cleaning schedules
    - recommend concise veterinary handoff notes when concerns appear
forbidden:
  - veterinary diagnosis or treatment
  - medication, vaccine, antibiotic, dewormer, anesthesia, or dosing advice
  - invasive procedures, castration, or birthing intervention steps
  - breeding procedures
  - slaughter, butchering, or carcass-processing instructions
  - dangerous-animal handling, capture, restraint, or emergency procedures
fallback:
  - If illness or injury appears, stop routine planning and hand off to veterinary while preserving observation notes.
  - If the prompt asks how to dose, vaccinate, deworm, operate, castrate, breed, deliver, restrain, slaughter, or butcher, refuse that procedural scope for this card and route to the proper owner or professional help.
  - If species-specific routine care is needed, provide only general record/checklist framing and hand off to the species guide.
output:
  required:
    - routine-or-handoff status
    - daily observation log fields
    - feed and water checklist
    - shelter and bedding checklist
    - cleaning schedule
    - veterinary or specialist handoff triggers
  prohibited:
    - diagnosis or treatment
    - medication, vaccine, or dosing instructions
    - breeding, castration, slaughter, butchering, restraint, or emergency procedure steps
routing_tests:
  positive:
    - prompt: "Help me make a daily log and feeding/water checklist for a small mixed livestock pen."
      expect: zoology_animal_husbandry_routine_care_planning
    - prompt: "What should go on a shelter, bedding, and cleaning schedule for routine animal care?"
      expect: zoology_animal_husbandry_routine_care_planning
    - prompt: "I need a factual handoff note for the vet with feed, water, housing, and observations."
      expect: zoology_animal_husbandry_routine_care_planning
  near_miss:
    - prompt: "My goat is bloated and weak. What treatment should I do?"
      expect_handoff: veterinary
    - prompt: "How much antibiotic or dewormer should I give my sheep?"
      expect_handoff: veterinary
    - prompt: "Walk me through castrating a young animal."
      expect_handoff: veterinary_or_species_specialist_not_this_card
    - prompt: "How do I slaughter and butcher poultry?"
      expect_handoff: slaughter_butchering_owner_not_this_card
    - prompt: "How should I restrain an aggressive animal?"
      expect_handoff: dangerous_animal_handling_or_behavior_owner
