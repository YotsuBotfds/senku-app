card_id: zoology_animal_husbandry_routine_care_planning
guide_id: GD-536
slug: zoology-animal-husbandry
title: Zoology and Animal Husbandry
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A stable livestock, poultry, fish, insect, or other managed-animal group needs routine husbandry planning rather than diagnosis, treatment, breeding, slaughter, or emergency handling.
  - The question is about observation logs, feed and water checks, shelter and bedding readiness, cleaning schedules, ordinary records, seasonal routine planning, or a factual veterinary handoff note.
  - A user needs help organizing what to observe and document before involving a veterinarian or experienced stock keeper.
required_first_actions:
  - Confirm this is routine planning for stable animals; if illness, injury, abnormal behavior, birth trouble, zoonotic concern, dangerous handling, or rapid deterioration is present, hand off before routine advice.
  - Start with species, animal count, age or production group when known, normal routine, current feed and water access, shelter condition, bedding or waste buildup, and recent cleaning.
  - Keep the answer at observation, checklist, schedule, record, and handoff-note level.
  - Preserve clean water, dry shelter, ventilation, bedding replacement, manure removal, gradual feed-transition planning, and consistent records as the core routine husbandry controls.
first_actions:
  - Set up a daily observation log for appetite, water availability, behavior, manure or litter condition, body condition trend, production notes, weather stress, and anything different from baseline.
  - Build a feed and water checklist that verifies clean water access, uncontaminated feed, forage or ration availability, storage condition, and whether any feed change should be gradual.
  - Review shelter for wind, rain, heat, ventilation, dry bedding, ammonia or odor buildup, crowding, and safe access to water points.
  - Assign a cleaning schedule for manure removal, bedding replacement, trough cleaning, feed-storage checks, and end-of-shift notes.
  - Prepare veterinary handoff notes that report observed changes, dates, affected animals, feed or housing changes, water access, cleaning history, and exposure concerns without diagnosing or treating.
urgent_red_flags:
  - Any animal is sick, injured, feverish, dehydrated, collapsed, lame, bloated, choking, wounded, prolapsed, unable to rise, not eating or drinking, or behaving abnormally.
  - Multiple animals show the same abnormal signs, sudden death occurs, or zoonotic exposure to handlers is plausible.
  - The prompt asks for medication, dosing, antibiotics, vaccines, dewormers, anesthesia, surgery, castration, invasive procedures, emergency birthing help, or treatment decisions.
  - The prompt involves dangerous animal handling, restraint, transport of aggressive animals, or emergency animal procedures.
  - The prompt asks for breeding procedures, slaughter, butchering, carcass handling after suspicious death, or meat-processing instructions.
forbidden_advice:
  - Do not provide veterinary diagnosis, treatment plans, medication choices, dosing, vaccine schedules, deworming regimens, anesthesia, surgery, or invasive procedure steps.
  - Do not provide breeding procedures, estrus-timing instructions, castration methods, artificial insemination steps, birthing intervention steps, slaughter, butchering, or carcass-processing guidance.
  - Do not provide dangerous-animal handling, restraint, capture, or emergency animal procedure instructions.
  - Do not frame illness, injury, abnormal behavior, reproductive trouble, zoonotic concern, or rapid deterioration as routine husbandry planning.
  - Do not use this card to override species-specific guides when a cattle, poultry, goat, pig, sheep, companion-animal, aquaculture, behavior, zoonotic disease, or veterinary owner is the better fit.
do_not:
  - Do not diagnose the cause of poor appetite, lameness, diarrhea, discharge, bloat, fever, low production, infertility, or behavior change.
  - Do not recommend drugs, supplements as treatment, vaccines, herbs as antiparasitic treatment, or home procedures.
  - Do not instruct users to restrain or handle an animal that may injure handlers.
  - Do not turn production records into culling, breeding, slaughter, or butchering instructions.
routine_boundary: >
  This card owns routine husbandry planning for stable animals only: observation
  logs, feed and water availability checks, shelter and bedding readiness,
  cleaning schedules, ordinary records, and veterinary handoff notes. It stops
  when the animal is abnormal, the task becomes veterinary, breeding,
  slaughter/butchering, dangerous handling, restraint, medication, vaccine, or
  emergency procedure advice.
acceptable_uncertain_fit: >
  If the prompt is incomplete but sounds like ordinary husbandry, ask for
  species, count, age or production group, normal routine, feed and water
  access, shelter condition, cleaning interval, and what changed from baseline.
  If any red flag appears, keep only the factual observation checklist and hand
  off to the appropriate veterinary or specialist guide.
clarifying_questions:
  - What species and how many animals are involved, and are they currently stable or showing any abnormal signs?
  - What is their normal feed, water, shelter, bedding, and cleaning routine?
  - What changed from baseline: appetite, drinking, behavior, manure or litter, body condition, production, housing, weather, or feed source?
  - Is the question about routine records and checklists, or does it involve illness, injury, medication, vaccines, breeding, slaughter, dangerous handling, restraint, or an emergency?
