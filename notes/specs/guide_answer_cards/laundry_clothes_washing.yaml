fallback_handoff_language:
  - For blood, vomit, stool, sewage, sick-room contamination, or spreading skin infection, treat this as a hygiene or sick-care question before ordinary laundry.
  - For lice, scabies, bed bugs, or fleas, route to the parasite guide before ordinary laundry steps.
  - For fuel, solvent, pesticide, cleaner, or unknown chemical residue, isolate the item and route to chemical safety before washing with ordinary laundry.
  - For musty smells that return after rewashing and full drying, route to mold or moisture-source assessment.
