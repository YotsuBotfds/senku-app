card_id: dairy_processing_food_safety_boundary
guide_id: GD-071
slug: dairy-processing
title: Dairy Processing
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - A user asks whether milk, cream, butter, yogurt, cheese, or other dairy is safe after raw-milk exposure, poor cooling, abnormal odor or appearance, uncertain storage, or sanitation failure.
  - A user needs a planning answer for dairy sanitation logs, cold-chain observation, batch labeling, hold/discard decisions, vulnerable-person warnings, or routing to the right owner.
  - A user asks about pasteurization, culturing, aging, or processing in a way that could become a food-safety claim.
required_first_actions:
  - Keep suspect dairy out of service while safety is uncertain; label, separate, and prevent mixing with fresh or known-good batches.
  - Treat raw milk and raw-milk dairy as high-risk, especially for pregnant people, infants, older adults, and immunocompromised people.
  - Review collection time, cooling continuity, container sanitation, animal health notes, batch identity, storage conditions, and who consumed the product.
  - Discard rather than trying to rescue dairy when contamination, temperature abuse, abnormal odor or appearance, illness linkage, or missing records make safety uncertain.
  - Refer pasteurization to tested procedures and current food-safety authorities; do not invent or restate process parameters from memory.
first_actions:
  - Ask what product is involved, whether it was raw or pasteurized, how it was stored, whether the cold chain was continuous, and whether anyone vulnerable or ill is involved.
  - Separate food-safety triage from production advice; answer hold/discard, observation, and handoff before any routine dairy-processing discussion.
  - Check sanitation logs for milking container cleaning, equipment cleaning, batch code, storage location, and any mixing of old and fresh milk.
  - If the product may have been served, identify the batch and stop further service while food-safety or public-health review happens.
urgent_red_flags:
  - Pregnant person, infant, older adult, or immunocompromised person consumed raw or suspect dairy.
  - Vomiting, diarrhea, fever, severe weakness, dehydration signs, neurological symptoms, pregnancy concern, or several people ill after the same dairy batch.
  - Raw milk, soft cheese, or cultured dairy with uncertain source, uncertain cooling, abnormal odor or appearance, visible contamination, swelling package, mold outside expected product design, or missing sanitation records.
  - Possible mastitis, blood, clots, pus, sick animal, antibiotic-treated animal, or herd disease concern.
  - Product intended for public distribution, sale, school, shelter, clinic, or other vulnerable group service.
forbidden_advice:
  - Recipes for cheese, yogurt, butter, kefir, cultured cream, or other dairy products.
  - Processing times, temperatures, holding periods, aging schedules, or starter-culture instructions.
  - Equipment build steps for pasteurizers, separators, cheese caves, aging rooms, or improvised dairy-processing systems.
  - Medical diagnosis, treatment, antibiotic advice, rehydration protocols, or reassurance after symptoms.
  - Claims that smell, taste, culturing, aging, salting, skimming, boiling, or visual inspection guarantees pathogen safety.
  - Certification that a batch is safe to serve, sell, donate, or feed to a vulnerable person.
  - Advice to mix suspect milk with fresh milk, process suspect milk into cheese/yogurt/butter to make it safe, or serve dairy while records are missing.
do_not:
  - Do not convert a food-safety question into a dairy recipe.
  - Do not provide pasteurization parameters; name the need for a tested procedure and route to the proper food-safety owner.
  - Do not reassure vulnerable people that raw or suspect dairy is acceptable.
  - Do not use aging, culturing, salting, skimming, or cold storage as a pathogen guarantee.
  - Do not treat public sale, outbreak, medical symptoms, veterinary disease, or refrigeration failure as routine dairy-processing troubleshooting.
routine_boundary: >
  This card owns dairy food-safety planning boundaries: raw-milk risk,
  batch hold/discard logic, sanitation logs, cold-chain observation,
  vulnerable-person warnings, pasteurization referral, and owner routing. It
  does not own recipes, process schedules, equipment design, medical treatment,
  pathogen guarantees, public-sale compliance, or safety certification.
acceptable_uncertain_fit: >
  If the user may be asking a recipe question but mentions safety, raw milk,
  poor cooling, illness, vulnerable people, sanitation failure, or uncertain
  storage, apply this card first: hold or discard the suspect batch, avoid
  service, ask only essential triage questions, and route before giving any
  production advice.
clarifying_questions:
  - Is the dairy raw or pasteurized, and what product is it?
  - Was the batch kept continuously cold, and are collection/storage times and locations logged?
  - Are there abnormal odors, visible contamination, clots, swelling, unexpected mold, or container sanitation gaps?
  - Has anyone consumed it, especially a pregnant person, infant, older adult, or immunocompromised person?
  - Is this for household use, public service, sale, donation, school, shelter, or clinic food?
citation_ids:
  - gd-071-raw-milk-warning
  - gd-071-food-safety-disclaimer
  - gd-071-reviewed-dairy-boundary
  - gd-071-milking-hygiene-handling
