notes: >
  Reviewed closure for GD-071 metadata/card audit gap. This is a boundary card
  for dairy food-safety planning and routing, not a dairy-processing recipe
  card. It intentionally excludes times, temperatures, starter cultures, aging
  schedules, equipment builds, medical treatment, pathogen guarantees, and
  safety certification while preserving raw-milk risk, hold/discard, sanitation
  logs, cold-chain observation, vulnerable-person warnings, pasteurization
  referral, and handoffs.
