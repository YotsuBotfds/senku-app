  - gd-071-milk-quality-assessment
  - gd-071-batch-accountability
applicability:
  owner: dairy food-safety planning and routing boundary
  use_when:
    - raw milk or raw-milk dairy risk triage
    - suspect dairy hold or discard decisions
    - sanitation log and batch-accountability planning
    - cold-chain observation and service-stop decisions
    - vulnerable-person warnings for raw or suspect dairy
    - pasteurization-as-tested-procedure referral
  do_not_use_when:
    - dairy recipes or production schedules are requested without a safety boundary
    - exact pasteurization, culturing, aging, or storage parameters are requested
    - medical treatment, foodborne illness management, or outbreak response is needed
    - regulatory approval, public-sale compliance, or safety certification is requested
    - equipment design, construction, or process validation is requested
  handoff:
    - food-safety-contamination-prevention for general food contamination control and serving decisions.
    - food-spoilage-assessment for broader questionable-food spoilage triage.
    - refrigeration-cooling for cold-chain equipment diagnosis and storage-system failure.
    - veterinary or goat-care-dairy owners for mastitis, herd disease, medication, or animal-health issues.
    - public-health or medical emergency owners for illness clusters, severe symptoms, pregnancy exposure, or vulnerable-person exposure.
    - regulatory or local food authority for public sale, donation, school, clinic, shelter, or compliance questions.
output_contract:
  requires_contract_items:
    - required_first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_output_handoff: true
  avoid_medical_recipes_process_parameters: true
fallback_handoff_language:
  - Hold the dairy out of service, label and separate the batch, and do not mix it with other milk or products while safety is uncertain.
  - If vulnerable people consumed raw or suspect dairy, or if anyone has vomiting, diarrhea, fever, weakness, dehydration signs, pregnancy concern, or neurological symptoms, route to medical or public-health help before food-use advice.
  - For pasteurization, use a current tested procedure from a food-safety authority; this card does not provide process parameters or certify safety.
  - If sanitation logs, cold-chain records, source identity, or animal-health status are missing, use the conservative hold/discard path and route to food-safety, refrigeration, or veterinary owners as appropriate.
