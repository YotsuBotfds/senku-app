card_id: temporary_toilet_solutions
guide_id: GD-926
slug: temporary-toilet-solutions
title: Temporary Toilet Solutions
risk_tier: medium
evidence_owner: guide-corpus
applies_when:
  - A user needs an immediate temporary toilet during a water outage, sewer or septic repair, construction site, camp, off-grid build, flood disruption, or winter access problem.
  - The user asks how to set up or operate a covered bucket toilet, bag-lined toilet, privacy area, handwashing station, or short-term waste handling routine.
  - The user asks about smell, flies, spills, leaks, freezing, people avoiding the toilet, or how to transition from temporary use back to permanent sanitation.
required_first_actions:
  - State the containment goal first; keep feces and urine away from hands, drinking water, food, insects, children, animals, and living space.
  - Set up a stable covered container with a tight lid, seat or stable top, dry absorbent cover material, and a nearby handwashing station with soap.
  - Keep the toilet private, reachable, level, sheltered from flooding, and away from food preparation and drinking-water sources.
  - Put on gloves before moving or emptying waste, keep the lid closed during transport, and empty only into an approved disposal or treatment system.
  - For spills or leaks, stop use, replace or double-contain the container, clean visible contamination with soap and safe water, and wash hands immediately.
first_actions:
  - Choose a sturdy bucket or similar container, add dry absorbent material, fit a seat or stable top, and keep the lid closed after every use.
  - Keep extra cover material beside the toilet and cover solid waste after each use to reduce odor, flies, and later handling problems.
  - Add a privacy screen, light, and clear route so users do not avoid the toilet or improvise in unsafe places.
  - Set a scheduled emptying routine before the container becomes full, heavy, smelly, frozen, or likely to spill.
  - Keep cleaning supplies, gloves, and waste tools dedicated to toilet work and separate from food, water, and household cleaning items.
  - Keep the temporary toilet operating only until permanent sanitation or serviced portable sanitation is restored.
urgent_red_flags:
  - Waste is leaking, spilled, overflowing, freezing solid in the container, or being carried uncovered through shared living or food areas.
  - Waste is near wells, springs, surface water, flood paths, drainage channels, kitchens, food storage, children, or animals.
  - Users cannot wash hands after toilet use or after handling the waste container.
  - The user is asking for permanent latrine siting, pit design, sewage repair, compost processing, chemical treatment, or medical care instead of stopgap operations.
forbidden_advice:
  - Provide permanent latrine siting, setback, pit design, or build instructions.
  - Claim bucket toilet contents are composted, treated, pathogen-safe, or safe for soil or food use because cover material was added.
  - Provide composting-toilet processing timelines, pathogen-kill claims, compost use advice, or decontamination guarantees.
  - Provide chemical treatment formulas, mixing instructions, dosing, or improvised disinfectant treatment for human waste.
  - Provide sewage-system repair instructions or tell the user to pour waste into storm drains, open ground, waterways, or unapproved locations.
  - Provide medical diagnosis, medication, rehydration, or disease treatment advice.
do_not:
  - Do not leave an open bucket uncovered indoors.
  - Do not let the bucket overflow or wait until smell, flies, freezing, or weight makes handling unsafe.
  - Do not carry uncovered waste or store it where children or animals can reach it.
  - Do not mix toilet equipment with food, water, or general cleaning supplies.
  - Do not turn an immediate stopgap answer into long-term sanitation design.
routine_boundary: >
  This card owns short-term temporary toilet setup and operations during an
  outage or repair. It does not own permanent sanitation design, composting
  processing, sewage-system repair, chemical treatment, clinical care, or
  guarantees that contaminated surfaces or waste are decontaminated.
acceptable_uncertain_fit: >
  If the user likely needs immediate toilet access but details are incomplete,
  give the covered-container, handwashing, containment, and approved-disposal
  steps first. Ask one clarifying question about location, users, water access,
  or disposal access only after the immediate containment routine is clear.
clarifying_questions:
  - Is this for a household, camp, worksite, or repair site, and how many people will use it?
  - Do you have a sturdy container with a tight lid, dry cover material, soap, gloves, and an approved disposal option?
  - Is the proposed location away from food areas, drinking-water sources, flood paths, children, and animals?
  - Is the problem setup, odor, flies, leaking, freezing, handwashing, or disposal?
