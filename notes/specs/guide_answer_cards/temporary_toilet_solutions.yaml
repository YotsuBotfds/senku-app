  use_when:
    - immediate toilet access during outage, repair, camp, worksite, or off-grid temporary use
    - covered bucket or bag-lined toilet setup, privacy, lighting, and placement
    - handwashing station setup and waste handling with approved disposal
    - odor, flies, spills, leaks, freezing, and user-avoidance troubleshooting
  do_not_use_when:
    - permanent latrine siting, setbacks, pit design, or build instructions
    - composting-toilet processing, compost use, or pathogen-kill claims
    - chemical waste treatment formulas, sewage-system repair, medical treatment, or decontamination guarantees
  handoff:
    - latrine-sanitation-design for permanent latrine siting, setbacks, pit design, and build planning.
    - composting-toilets for long-term composting toilet system selection and maintenance boundaries.
    - sanitation-waste-management or community-waste-disposal for larger group disposal logistics and approved systems.
    - hygiene-disease-prevention-basics or water-purification when disease prevention or drinking-water contamination dominates.
output_contract:
  requires_contract_items:
    - required_first_actions
    - first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_output_handoff: true
  disposal_only_into_approved_systems: true
  avoid_medical_chemical_and_decontamination_claims: true
fallback_handoff_language:
  - If the user asks where to build a permanent latrine, how far from a well, or how to size/design a pit, stop temporary-toilet instructions and route to latrine-sanitation-design.
  - If the user asks whether bucket contents are composted, pathogen-safe, or usable on soil or food crops, state that this card does not make composting or treatment claims and route to composting-toilets or sanitation-waste-management.
  - If sewage repair, chemical treatment, illness treatment, or decontamination guarantees are requested, state that GD-926 only covers containment, handwashing, spill control, and approved disposal during temporary use.
