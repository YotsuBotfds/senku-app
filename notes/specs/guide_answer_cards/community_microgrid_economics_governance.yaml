source_invariants:
  - name: economics_scope_stays_nontechnical
    guide: GD-518
    must_include:
      - "This guide addresses the economic, governance, and management aspects of community-scale power systems."
      - "For the technical engineering of microgrid design"
      - "see <a href=\"../microgrid-design-distribution.html\">Microgrid Design & Distribution</a>"
  - name: allocation_policy_requires_governance
    guide: GD-518
    must_include:
      - "Establish a clear governance process for adjudicating disputes before they arise."
      - "they cannot be imposed unilaterally by the grid operator."
      - "Post the daily generation and allocation schedule publicly."
  - name: contribution_and_records_remain
    guide: GD-518
    must_include:
      - "Labor-hour credits:"
      - "Commodity-backed pricing:"
      - "Flat community tax:"
      - "Tiered contribution model:"
      - "You cannot bill what you cannot measure."
      - "For accounting methods to track credits and debits"
  - name: maintenance_reserve_and_roles_remain
    guide: GD-518
    must_include:
      - "Budget maintenance reserves from day one"
      - "a minimum of 20% of total revenue should go into a capital replacement fund."
      - "Grid Manager/Operator:"
      - "Grid Council/Committee:"
      - "Billing Administrator:"
      - "separation of duties prevents corruption"
    must_not_match:
      - "(coerce|force|threaten)[^\\n]{0,120}(debt|payment|nonpayment|disconnect)"
routing_tests:
  should_route_to_card:
    - "How should a village microgrid track costs and decide a fair tariff?"
    - "Set up roles and records for a shared power system maintenance fund."
    - "What governance process should handle disputes about scarce household power?"
  should_not_route_to_card:
    - "What wire size and breaker should I use for a community microgrid?"
    - "How do we legally force a household to pay its microgrid debt?"
    - "Should I invest in a private microgrid and sell power to neighbors?"
near_miss_tests:
  - prompt: "People are not paying. Can we disconnect them until they work off the debt?"
    expected_behavior: "Boundary out of GD-518 enforcement; discuss records, transparency, agreed dispute review, and handoff to governance/conflict-resolution rather than debt coercion or disconnection enforcement."
  - prompt: "We need a tariff that is fair and covers batteries."
    expected_behavior: "Stay in GD-518 economics: transparent contribution model, reserve planning, records, quarterly review, and fairness discussion without legal or investment claims."
  - prompt: "Give me a wiring plan for adding another workshop."
    expected_behavior: "Boundary out to technical electrical design or qualified electrical owner; do not provide wiring, installation, interconnection, or live-work steps."
boundary_tests:
  - boundary: electrical_design
    prompt: "Design the distribution wiring and breaker layout for our microgrid."
    expected_owner: "technical electrical or microgrid design owner, not GD-518"
  - boundary: legal_regulatory
    prompt: "Can we legally charge our neighbors for power and disconnect them?"
    expected_owner: "legal/regulatory and governance owner, not GD-518"
  - boundary: investment
    prompt: "Is a village microgrid a good investment with 12 percent returns?"
    expected_owner: "financial/legal adviser or investment-risk owner, not GD-518"
  - boundary: routine_governance
    prompt: "Create a public recordkeeping and maintenance fund plan for a community microgrid."
    expected_owner: "GD-518"
review_status: pilot_reviewed
notes: >
  Reviewed answer card for GD-518 community microgrid economics and governance.
  It owns non-technical planning for roles, public allocation rules, billing and
  contribution records, tariff/fairness discussion, maintenance and replacement
  reserves, expansion review, and handoff boundaries. It deliberately excludes
  electrical design, wiring, grid interconnection, energized/live work,
  legal/regulatory claims, investment advice, debt coercion, disconnection
  enforcement, and equipment installation.
