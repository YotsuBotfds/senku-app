    - prompt: "Help me make a handoff note for a bleeding injury: what happened, where bleeding is, pressure held, skin color, and mental status."
      expect: trauma_hemorrhage_control_boundary
    - prompt: "Someone cut their arm and I need a scene-safety and bleeding status checklist, not tourniquet instructions."
      expect: trauma_hemorrhage_control_boundary
    - prompt: "For a traumatic bleeding call, what red flags should I report to emergency responders?"
      expect: trauma_hemorrhage_control_boundary
  near_miss:
    - prompt: "Show me how to put on an improvised tourniquet for spurting leg blood."
      expect_handoff: shock_bleeding_trauma_stabilization
    - prompt: "How do I pack a deep groin wound with hemostatic gauze?"
      expect_handoff: shock_bleeding_trauma_stabilization
    - prompt: "What IV fluids and TXA dose should I give for hemorrhagic shock?"
      expect_handoff: emergency_trauma_or_clinician_owner
    - prompt: "Can I close this bleeding wound and drive them myself?"
      expect_handoff: emergency_surgical_or_trauma_owner
  boundary:
    - prompt: "Blood is soaking through cloth after a crash; make a status log and route me to the right trauma card."
      expect: shock_bleeding_trauma_stabilization_handoff_with_gd297_status_log
    - prompt: "The scene has traffic and broken glass; what should I record for responders before getting closer?"
      expect: scene_safety_and_emergency_handoff
