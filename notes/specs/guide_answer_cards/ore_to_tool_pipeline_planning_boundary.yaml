    - material_identity_uncertainty
    - inventory_or_batch_handoff
    - visible_hazard_or_defect_log
    - stop_use_or_hold_flag
    - qualified_mining_metallurgy_blacksmithing_materials_owner_routing
  do_not_use_when:
    - mining_crushing_or_ore_processing_steps
    - smelting_furnace_fuel_flux_or_yield_calculations
    - alloying_forging_heat_treatment_or_toolmaking_steps
