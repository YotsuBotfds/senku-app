      - Use it for observation planning, ethogram and behavior-log design, stress-behavior recognition, enrichment and supervision planning, and handoffs.
      - Do not use this card for wildlife capture or handling, dangerous-animal approach, veterinary diagnosis or treatment, coercive training, restraint, sedation, breeding decisions, or legal wildlife control.
  - name: baseline ethogram log requirements
