source_invariants:
  - name: historical_warning_no_synthesis
    guide: GD-058
    must_include:
      - This guide is provided as historical reference only. DO NOT ATTEMPT synthesis.
      - This section is educational reference—synthesis of these agents is outside the scope of this guide and illegal in most jurisdictions.
      - Do not attempt open-drop anesthesia.
  - name: trained_airway_general_anesthesia_boundary
    guide: GD-058
    must_include:
      - Only trained anesthesiologists, nurse anesthetists, and physicians with formal anesthesia training should administer general anesthetics.
      - In true field conditions without trained personnel, do not attempt general anesthesia.
      - Provider is trained in airway management and has equipment
  - name: respiratory_airway_shock_core_risks
    guide: GD-058
    must_include:
      - All general anesthetics suppress breathing.
      - Loss of protective airway reflexes allows aspiration of saliva, blood, vomit, or stomach contents.
      - Patients with trauma, blood loss, or shock are at extreme risk of cardiac arrest.
  - name: continuous_monitoring_and_stop_escalate
    guide: GD-058
    must_include:
      - Continuous monitoring is non-negotiable for any sedated patient
      - One provider should be dedicated to monitoring and should do nothing else during procedure.
      - Continuous Assessment
      - EMERGENCY—manage airway, increase oxygen.
  - name: overdose_aspiration_anaphylaxis_red_flags
    guide: GD-058
    must_include:
      - The margin between effective anesthesia and toxic overdose is narrow.
      - If aspiration occurs
      - Anaphylaxis during anesthesia is catastrophic
      - death can occur within minutes.
