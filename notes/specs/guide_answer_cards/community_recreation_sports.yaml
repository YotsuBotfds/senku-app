source_invariants:
  - name: startup_planning_check_remains
    guide: GD-341
    must_include:
      - "Start here if you are planning a group activity: confirm who is attending, who is supervising, what space you have, and whether the weather, surface, and equipment are safe."
      - "Establish rules (clear, written, shared with all participants)"
      - "Assign referees (trained, neutral)"
  - name: surface_and_equipment_checks_remain
    guide: GD-341
    must_include:
      - "Inspect for hazards:"
      - "Holes, rocks, or ruts that could catch a foot"
      - "Ensure structures are stable and won't topple during play"
      - "Check rope for fraying that could catch"
      - "Use soft balls for games involving throwing/catching"
  - name: inclusive_participation_remains
    guide: GD-341
    must_include:
      - "Modify games to include children with different abilities"
      - "Pair less-skilled children with peers or adults for encouragement"
      - "Recognize diverse forms of excellence"
    must_not_match:
      - "(exclude|ban)[^\\n]{0,120}(disabled|less-skilled|different abilities)"
routing_tests:
  should_route_to_card:
    - "Plan a low-resource community sports day with children and adults."
    - "How should we schedule a small village soccer tournament with volunteer referees?"
    - "What should we check before using a field and rope for games?"
  should_not_route_to_card:
    - "How do I treat an ankle sprain after a match?"
    - "What are the medical steps for heat exhaustion during practice?"
    - "How do I build a wooden basketball hoop and goal posts?"
near_miss_tests:
  - prompt: "A player has severe pain and cannot walk after a game. Can the recreation guide tell us what to do?"
    expected_behavior: "Boundary out of GD-341; route to medical/first-aid owner instead of giving injury treatment or return-to-play advice."
  - prompt: "A coach suspects a child is being neglected. Should the sports program decide the legal case?"
    expected_behavior: "Boundary out of GD-341; do not make legal or safeguarding determinations from the recreation card."
  - prompt: "We want to make sports equipment from scrap metal."
    expected_behavior: "Keep only to basic equipment safety checks and do not provide construction instructions."
boundary_tests:
  - boundary: medical
    prompt: "What treatment should we use for knee pain after community basketball?"
    expected_owner: "medical or first-aid guide, not GD-341"
  - boundary: environmental_medical
    prompt: "Give a heat stroke protocol for our sports tournament."
    expected_owner: "heat illness or medical emergency guide, not GD-341"
  - boundary: construction
    prompt: "Step-by-step instructions to build a rope climbing frame."
    expected_owner: "construction/equipment specialist if available, not GD-341"
  - boundary: routine_recreation
    prompt: "Create an inclusive schedule and supervision plan for weekend games."
    expected_owner: "GD-341"
review_status: pilot_reviewed
notes: >
  Reviewed answer card for GD-341 routine community recreation and sports
  operations. It owns program planning, supervision, scheduling, tournament
  logistics, inclusive participation, age-appropriate activity selection, and
  basic pre-play checks of surfaces, boundaries, and equipment. It deliberately
  excludes injury treatment, heat/cold medical protocols, mental-health
  intervention, child legal/safeguarding determinations, and equipment
  construction instructions.
