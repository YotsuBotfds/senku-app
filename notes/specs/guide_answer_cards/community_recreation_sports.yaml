card_id: community_recreation_sports
guide_id: GD-341
slug: community-recreation-sports
title: Community Recreation and Sports Programs
risk_tier: low
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A community wants to organize recreation, sports days, children's games, evening games, friendly matches, or a simple tournament.
  - The prompt asks for program planning, supervision, scheduling, clear rules, inclusive participation, volunteer roles, or simple pre-play checks.
  - The setting has limited equipment and needs safe, low-resource activities without medical, legal, or construction instructions.
required_first_actions:
  - Confirm who is attending, who is supervising, what space is available, and whether the weather, surface, boundaries, and equipment are suitable before play starts.
  - Keep rules clear, written or announced, shared with all participants, and enforced by neutral or respected referees or supervisors.
  - Match activity length, contact level, and competition level to participant age, ability, fatigue, and available supervision.
  - Use inclusive roles and modifications so people with different skills and abilities can participate without being forced into unsafe activity.
conditional_required_actions:
  - trigger_terms:
      - tournament
      - bracket
      - round robin
      - schedule
      - match day
      - sports day
    required_actions:
      - Publish or announce the schedule and rules, assign neutral referees, post or update brackets publicly, call matches clearly, and keep start and finish times predictable.
  - trigger_terms:
      - children
      - child
      - kids
      - youth
      - ages
      - school
    required_actions:
      - Choose age-appropriate games, keep young-child play non-competitive and all-inclusive, use shorter sessions, reduce contact, and maintain adult supervision.
  - trigger_terms:
      - equipment
      - ball
      - rope
      - goal
      - net
      - post
      - field
      - court
      - surface
    required_actions:
      - Inspect the play area for holes, rocks, debris, water pooling, steep slopes, unsafe edges, unstable posts, frayed ropes, hard projectiles, and loose or failing materials before use.
first_actions:
  - Pick a simple activity that fits the group size, age range, abilities, space, daylight, and available volunteers.
  - Set a regular schedule for recurring programs and communicate times plainly so participants and supervisors know when to arrive.
  - For walking or running groups, use flexible pace groups and gradual progression rather than forcing one speed or maximum intensity.
  - For tournaments, choose a format that fits the available time: single elimination for quick events, round robin for small groups, Swiss format for larger mixed groups, or consolation brackets when continued play matters.
  - Before play, clear large debris, mark boundaries and hazardous edges, check that ropes and posts will not catch or topple, and prefer soft balls for throwing or catching games.
  - Use rules that reduce contact risk, such as gentle-touch tag and no tackling, and build in time-outs or breaks when fatigue is likely.
  - Recognize different forms of contribution, including speed, strategy, cooperation, persistence, refereeing, setup, scorekeeping, coaching, and encouragement.
urgent_red_flags:
  - A prompt asks how to treat a sports injury, diagnose symptoms, decide return-to-play after injury, or manage heat/cold illness.
  - A prompt describes severe pain, head injury, loss of consciousness, breathing trouble, confusion, collapse, severe dehydration signs, or other acute medical concern during recreation.
  - A prompt asks for mental-health crisis intervention, coercive discipline, abuse/neglect determinations, legal child-safeguarding decisions, or emergency custody decisions.
  - Equipment or space is unstable, sharp, hard, frayed, slippery, too steep, near deep water or unsafe edges, or likely to topple during play.
forbidden_advice:
  - Do not provide injury treatment, return-to-play decisions, medical diagnosis, medication, clinical heat/cold protocols, or emergency care steps from this card.
  - Do not provide mental-health intervention, coercive behavior management, legal child-safeguarding determinations, or abuse/neglect investigation guidance.
  - Do not give instructions for constructing balls, hoops, posts, nets, protective gear, ropes, climbing structures, or projectiles.
  - Do not recommend hard wooden, metal, stone, or solid projectiles for games involving throwing, catching, or kicking.
  - Do not treat competition, winning, punishment, or elimination as more important than supervision, clear rules, safe space, fatigue limits, and inclusive participation.
do_not:
  - Do not start a group activity before checking attendance, supervision, space, weather, surface, boundaries, and equipment.
  - Do not use high-contact rules for young children or mixed-ability groups when a lower-contact version would work.
  - Do not let unstable goals, posts, ropes, nets, hard improvised protection, or loose materials stay in play.
  - Do not use this card as a medical, legal, construction, or crisis-intervention authority.
routine_boundary: >
  This card is routine recreation operations only. When the prompt is about
  injury treatment, medical symptoms, heat or cold illness management,
  mental-health crisis response, legal/safeguarding determinations, or building
  equipment, give a brief boundary and route to the appropriate specialist
  owner instead of answering from GD-341.
acceptable_uncertain_fit: >
  If the prompt is incomplete but sounds like ordinary sports-day or recreation
  planning, answer with a conservative planning checklist: participants,
  supervision, rules, schedule, space, surface and equipment checks, inclusive
  modifications, fatigue breaks, and handoff boundaries for medical, legal,
  crisis, or construction requests.
clarifying_questions:
  - Who will participate, including age range, group size, abilities, and experience levels?
  - What space, weather, daylight, surface, boundaries, and equipment are available?
  - Who will supervise, referee, keep time, communicate rules, and handle setup or cleanup?
  - Is this a recurring program, one-day sports event, children's game, evening activity, friendly match, or tournament?
