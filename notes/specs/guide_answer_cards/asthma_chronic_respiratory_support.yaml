source_invariants:
  - name: asthma chronic respiratory support boundaries
    guide: GD-936
    must_include:
      - Can speak in full sentences
      - Is not turning blue or gray
      - confused or unusually sleepy
      - If breathing is getting worse instead of stable, or if there is any doubt, treat it as urgent.
      - use it exactly as directed while help is arranged
      - treat it as **anaphylaxis first**
      - Do not replace prescribed inhalers with random herbs or chemicals
      - Do not use smoke, strong smells, or irritants as a "remedy"
      - Do not force exercise during a flare
      - Do not rely on steam as a rescue treatment for a serious asthma flare.
    must_not_match:
      - "use\\s+(smoke|strong smells|irritants)[^\\n]{0,80}as\\s+a\\s+remedy"
      - "rely\\s+on\\s+steam[^\\n]{0,80}before\\s+(calling|emergency|urgent)"
      - "exercise\\s+to\\s+(work it out|open the airways)"
