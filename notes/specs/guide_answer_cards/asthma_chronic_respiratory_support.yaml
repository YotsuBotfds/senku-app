notes: >
  Reviewed GD-936 card for conservative chronic/asthma home support and early
  escalation. It intentionally avoids diagnosis, medication dosing, and
  medication substitution, and routes allergen-triggered airway symptoms to the
  anaphylaxis-first owner before asthma-only support.
