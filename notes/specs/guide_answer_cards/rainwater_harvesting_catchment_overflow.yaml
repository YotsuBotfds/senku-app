card_id: rainwater_harvesting_catchment_overflow
guide_id: GD-721
slug: rainwater-harvesting-systems
title: "Rainwater Harvesting Systems Design and Implementation"
risk_tier: medium
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - User asks how to collect roof runoff, route a downspout, connect gutters to a rain barrel or cistern, or estimate catchment from roof area and rainfall.
  - User asks why a rain barrel or tank is overflowing, splashing near the house, flooding a foundation, or sending runoff toward an unsafe or inconvenient place.
  - User asks whether a roof, gutter, downspout, first-flush device, strainer screen, or source path is suitable for non-potable rainwater collection.
  - User asks for maintenance scheduling for gutters, downspouts, first-flush parts, screens, overflow outlets, visible leaks, corrosion, sediment, or routine tank checks.
required_first_actions:
  - Keep the answer in non-potable catchment and overflow planning unless the user explicitly asks for drinking-water safety, which must be handed to purification/testing guidance.
  - Assess the source path before storage advice: roof material, obvious contamination, gutter debris, downspout blockage, screen condition, and first-flush or pre-storage debris control.
  - Check overflow routing before routine use: excess water needs a pipe or channel away from foundations, walkways, septic areas, indoor pooling, and erosion-prone paths.
  - Include a maintenance cadence for catchment parts: monthly overflow/leak/water-level checks, quarterly gutter/downspout/sediment/filter checks, and annual gutter/seal/fitting repair planning.
  - Use handoff language for potable treatment, sanitizer formulas, tank construction engineering, pressure plumbing, code/legal approval, confined-space entry, and medical or illness claims.
first_actions:
  - Identify whether the question is about catchment yield, roof/gutter suitability, downspout routing, overflow routing, first-flush/debris control, or routine maintenance.
  - For roof/gutter collection, check roof material, debris load, gutter size/slope, downspout count, downspout discharge, and whether screens or first-flush diversion are present.
  - For overflow, route extra water away from the foundation through a pipe or channel toward a garden, another tank, or a greywater owner when appropriate.
  - For repeated overflow, consider clogged gutters/downspouts/screens, insufficient overflow path, poorly placed barrel/tank, heavy storm intensity, or storage too small for the capture area.
  - For maintenance, give monthly, quarterly, and annual checks from the source guide and hand off stored-water condition problems such as algae, slime, stale taste, or sediment cleanup.
urgent_red_flags:
  - Overflow or splashback is moving toward a building foundation, indoor area, main walkway, septic system, well, spring, or erosion-prone slope.
  - Gutters, downspouts, screens, or overflow outlets are blocked enough that water backs up, spills over edges, or drains where it can damage structures.
  - The user wants to drink harvested rainwater without separate testing, treatment, and storage hygiene guidance.
  - The user is asking someone to enter a cistern or enclosed tank, climb unstable supports, or repair pressure/plumbing systems beyond simple routing checks.
  - Collected water has algae, slime, stale odor/taste, visible contamination, animal access, or illness concerns.
forbidden_advice:
  - Do not promise harvested rainwater is potable or safe to drink based on roof catchment, first flush, filtration, or clear appearance.
  - Do not provide sanitizer, chlorine, bleach, iodine, or chemical treatment formulas, contact-time tables, or emergency drinking-water claims.
  - Do not provide structural tank construction, platform engineering, pressure-system design, permanent plumbing design, or legal/code compliance claims.
  - Do not advise confined-space entry into a tank or cistern for inspection, cleaning, or repair.
  - Do not treat overflow toward foundations, septic areas, wells, springs, walkways, or indoor pooling as acceptable routine operation.
do_not:
  - Do not merge catchment planning with water rationing, potable treatment, stored-water condition troubleshooting, or graywater system engineering unless handing off to the proper owner.
  - Do not skip roof/gutter/source assessment when the user asks how much water they can collect or why a barrel is overflowing.
  - Do not let a larger tank be the only answer when the overflow path itself is unsafe or blocked.
  - Do not give drinking-water, medical, plumbing-code, or construction-engineering guarantees from this card.
routine_boundary: >
  This card owns non-potable rainwater catchment and overflow planning: roof,
  gutter, downspout, source-path, first-flush/debris-control, overflow routing,
  and maintenance scheduling. It does not own potable treatment guarantees,
  sanitizer formulas, tank construction engineering, plumbing/code approval,
  confined-space entry, emergency drinking-water promises, or illness care.
acceptable_uncertain_fit: >
  If the prompt is plausibly about rain capture or overflow but details are
  incomplete, give conservative source-path and overflow checks first, assume
  non-potable use, and ask only the clarifying question needed to route away
  from foundation/septic/well/walkway hazards or drinking-water claims.
clarifying_questions:
  - Is the water for irrigation/utility use, or are you trying to make it drinking water?
  - Where does the overflow go now: away from the foundation, toward a garden/second tank, or toward a foundation, walkway, septic area, well, or indoor space?
  - What roof material, gutter size/condition, downspout setup, screen, and first-flush or debris control are in place?
  - Are there algae, slime, stale odor/taste, animal access, visible contamination, or illness concerns with stored water?
