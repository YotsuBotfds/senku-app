applicability:
  owner: non-potable rainwater catchment and overflow planning
  use_when:
    - roof_gutter_downspout_catchment_setup
    - rain_barrel_or_tank_overflow_routing
    - catchment_yield_or_source_path_assessment
    - first_flush_screen_or_debris_control
    - gutter_downspout_overflow_maintenance_schedule
  do_not_use_when:
    - potable_water_treatment_or_testing
    - sanitizer_chlorine_or_disinfection_formula
    - tank_construction_or_platform_engineering
    - plumbing_code_legal_or_pressure_system_design
    - confined_space_entry_or_tank_internal_work
    - stored_water_algae_slime_stale_taste_or_illness
  handoff:
    - water-purification for making questionable harvested water drinkable.
    - water-testing-quality-assessment for source acceptability and testing decisions.
    - water-storage-tank-maintenance for algae, slime, stale taste, sediment cleanup, leaks, or tank-condition troubleshooting.
    - water-storage-rationing for days-of-supply, reserve duration, and water-use rationing.
    - greywater-recycling-systems for designed overflow reuse or graywater diversion beyond simple routing.
actions:
  required:
    - classify the prompt as catchment yield, source assessment, downspout routing, overflow routing, first-flush/debris control, or maintenance
    - state non-potable scope unless handing off to water purification or testing
    - check roof/gutter/downspout/source path before storage advice
    - check overflow destination before routine collection advice
    - include monthly, quarterly, or annual maintenance cadence when maintenance is relevant
  standard:
    - route overflow away from foundations through a pipe or channel toward a garden, another tank, or graywater-owner handoff
    - recommend clearing leaves/debris, confirming downspouts drain fully, checking gutter slope, and inspecting rust or damage before rainy season
    - separate stored-water condition problems and drinking-water questions from catchment planning
forbidden:
  - potable-safety guarantees or emergency drinking-water promises
  - sanitizer, chlorine, bleach, iodine, or treatment formulas
  - tank construction engineering, platform design, pressure plumbing, or legal/code claims
  - confined-space entry into tanks or cisterns
  - routine acceptance of overflow toward foundations, septic areas, wells, springs, walkways, or indoor pooling
fallback:
  - If overflow is reaching a foundation, walkway, septic area, well, spring, indoor space, or erosion-prone path, treat overflow rerouting as the priority before normal collection advice.
  - If the user wants drinking water, state that this card only covers catchment/overflow planning and hand off to water purification/testing.
  - If stored water has algae, slime, stale odor/taste, sediment, animal access, or illness concerns, hand off to tank maintenance, testing, or purification instead of improvising from this card.
output:
  required:
    - non-potable scope statement or potable-water handoff
    - source-path assessment
    - overflow destination assessment
    - first action for routing or maintenance
    - maintenance cadence or relevant handoff
  prohibited:
    - potable treatment guarantees
    - sanitizer formulas or dosing
    - construction engineering or code/legal claims
    - confined-space entry instructions
routing_tests:
  positive:
    - query: "My rain barrel keeps overflowing and splashing next to the house. What should I check first?"
      expected: rainwater_harvesting_catchment_overflow
    - query: "Can I route a downspout from my shed roof into a garden tank for irrigation?"
      expected: rainwater_harvesting_catchment_overflow
    - query: "How often should I clean gutters and check the overflow pipe on a rainwater tank?"
      expected: rainwater_harvesting_catchment_overflow
  near_miss:
    - query: "How much bleach do I add to rainwater so my family can drink it?"
      expected_handoff: water-purification
    - query: "My stored rainwater tastes stale and has green slime in the tank."
      expected_handoff: water-storage-tank-maintenance
    - query: "How many days will our stored rainwater last if we ration it?"
      expected_handoff: water-storage-rationing
boundary_tests:
  - query: "The barrel overflow runs toward my foundation. Can I just ignore it if the tank is full?"
    required_boundary: "Do not treat overflow toward foundations as routine; reroute overflow away before normal collection advice."
  - query: "Can this roof catchment make emergency drinking water safe?"
    required_boundary: "No potable promise; hand off to water purification/testing."
  - query: "Should I climb inside the cistern to clean the outlet?"
    required_boundary: "No confined-space entry instructions; hand off to safer inspection/maintenance planning."
runtime_citation_policy: reviewed_source_family
source_invariants:
  - name: GD-721 owns catchment and overflow routing
    guide: GD-721
    must_include:
      - This guide covers roof catchment, intake sizing, collection yield, conveyance, overflow path planning, filtration, treatment for potability, and system sizing.
      - It is the right guide when the question starts with collecting rain, catching runoff, routing gutters, or preventing collection overflow.
      - Daily-use budgets, reserve duration, and per-person rationing belong in the rationing guide.
      - Tank cleaning, stale taste, algae, slime, and container-condition troubleshooting belong in the tank-maintenance guide.
  - name: gutter and downspout overflow checks
    guide: GD-721
    must_include:
      - Undersized gutters overflow; oversized ones collect debris
      - Downspout must deliver water without splashing or overflow
      - Remove leaves and debris quarterly
      - Ensure downspouts drain fully
  - name: overflow routing source language
    guide: GD-721
    must_include:
      - Pipe or channel directing excess water away from foundation
      - Directs to garden, other tank, or greywater system
      - Prevents tank rupture and foundation water damage
      - Reroute overflow away from building
  - name: maintenance schedule source language
    guide: GD-721
    must_include:
      - Inspect tank for leaks or corrosion
      - Check overflow function
      - Clean gutters and downspouts
      - Repair gutters, seals, or fittings as needed
