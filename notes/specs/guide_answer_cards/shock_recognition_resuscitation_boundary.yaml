source_invariants:
  - name: shock recognition danger signs
    guide: GD-580
    must_include:
      - "Cold extremities + weak pulse + altered mental status = YES"
      - "Prepare for evacuation/advanced care"
      - "Monitor response: Is skin perfusion improving? Is mental status improving? Is pulse stronger?"
    must_not_match:
      - "cold extremities[^\\n]{0,160}(routine|watchful waiting)"
  - name: obvious bleeding gets pressure but trauma details remain specific
    guide: GD-580
    must_include:
      - "Direct pressure"
      - "If blood soaks through, ADD more gauze on top"
      - "Do NOT remove tourniquet in field"
    must_not_match:
      - "tourniquet[^\\n]{0,160}(routine first|all bleeding)"
  - name: status log source fields
    guide: GD-580
    must_include:
      - "Time of IV placement"
      - "Fluid amounts given"
      - "Vital signs"
      - "Clinical response to treatment"
review_status: pilot_reviewed
notes: >
  Pilot-reviewed boundary card for GD-580. It closes the metadata/card audit
  gap for broad shock-recognition intake while deliberately avoiding GD-580's
  advanced treatment protocols. The card owns non-invasive shock concern
  recognition, call-for-help, still/warm positioning, obvious-bleeding direct
  pressure, time/status logs, red flags, and emergency or clinician handoff.
  It routes life-threatening traumatic bleeding, tourniquets, packing, crush,
  amputation, chest-trauma deterioration, and tension-pneumothorax prompts to
  the existing reviewed shock_bleeding_trauma_stabilization card, and routes
  internal bleeding, sepsis/antibiotic, cardiac, anaphylaxis, airway,
  obstetric, pediatric, toxicology, and procedure-specific prompts to their
  more specific owners.
