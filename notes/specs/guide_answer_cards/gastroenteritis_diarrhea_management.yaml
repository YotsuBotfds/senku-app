notes: >
  Reviewed bounded answer card for GD-379 only. It covers dehydration triage,
  red-flag escalation, and supportive fluids/rest monitoring for mild diarrhea.
  It intentionally excludes full treatment: antibiotic selection, IV protocols,
  zinc or medication dosing, diagnostic certainty, pathogen differentiation,
  and food-service or outbreak operations.
