card_id: greywater_recycling_systems
guide_id: GD-673
slug: greywater-recycling-systems
title: "Greywater Recycling & Treatment Systems"
risk_tier: medium
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - User asks how to separate, route, observe, maintain, or troubleshoot household greywater or graywater from showers, baths, sinks, laundry, or washing areas.
  - The question is about keeping greywater separate from toilet waste, choosing a low-contact non-potable route, avoiding storage, preventing pooling, or watching for odors, cloudiness, slow drainage, overflow, sludge, mosquitoes, or plant stress.
  - The user needs safe boundaries and handoffs for blackwater, sewage, potable treatment, food-crop reuse, plumbing engineering, legal/code approval, pump or electrical work, or illness concerns.
required_first_actions:
  - First separate the source: confirm the water is from bath, shower, sink, or laundry sources only, and not toilet waste, feces, urine, sewage, chemicals, illness cleanup, or unknown contamination.
  - Keep blackwater and greywater completely separate from collection through treatment; if they mix, stop treating it as routine greywater and hand off to sanitation or sewage guidance.
  - Keep routine advice low-contact and non-potable: use greywater only where people, children, animals, food-contact surfaces, and drinking-water sources will not contact untreated water.
  - Avoid storage as a normal step; do not store greywater for more than 24 hours, and prevent standing water, pooling, and mosquito breeding.
  - Use handoff language for plumbing engineering, treatment or disinfection formulas, pathogen safety guarantees, food-crop application guarantees, legal/code claims, pump or electrical work, and illness treatment.
first_actions:
  - Classify the question as source separation, blackwater boundary, low-risk routing, storage or pooling avoidance, observation, maintenance, or handoff.
  - For low-risk routing, keep the path simple, separate, and non-potable, with visible checks for overflow, drainage, odor, cloudiness, dark water, and contact hazards.
  - For observation, use appearance and smell checks: clear to slightly cloudy and neutral or earthy is lower concern; cloudy, dark gray or brown, sour, musty, sulfurous, or putrid water needs correction or handoff.
  - For maintenance, check flow, screens, lint or solids, sludge, top filter layers, outlet blockages, basin mulch, plant health, and mosquito/standing-water conditions on the guide's routine cadence.
  - For uncertain reuse questions, favor non-food ornamental plants, trees, shrubs, lawns, or other low-contact non-potable uses, and hand off before any food-crop, potable, or human-contact assurance.
urgent_red_flags:
  - Toilet waste, feces, urine, sewage, illness cleanup, chemicals, or unknown contamination is present or may have mixed with greywater.
  - Greywater pools, backs up, overflows, runs toward a well, spring, surface water, foundation, walkway, child or animal area, or food-contact area.
  - Water smells sulfurous, putrid, sewer-like, sour after correction, or is dark gray, brown, cloudy after settling, or visibly contaminated.
  - Mosquitoes are breeding, water is standing, children or animals can contact untreated water, or untreated water is being proposed for food crops.
  - The user asks for engineered plumbing, tank/filter sizing as a construction design, disinfection or treatment formulas, pathogen guarantees, legal approval, pump/electrical work, or illness treatment.
forbidden_advice:
  - Do not provide plumbing engineering, pipe sizing, permanent wastewater construction, pump design, electrical work, or code-compliant design claims.
  - Do not provide treatment or disinfection formulas, chemical dosing, pathogen-reduction calculations, or guarantees that greywater is pathogen-safe.
  - Do not guarantee food-crop application safety, potable quality, direct human-contact safety, or safety based only on clear appearance or basic filtration.
  - Do not provide legal/code compliance claims or tell the user a system is approved for their location.
  - Do not provide medical or illness treatment for suspected waterborne, sewage, chemical, skin, gastrointestinal, or respiratory exposure.
do_not:
  - Do not merge greywater with blackwater in routine advice.
  - Do not normalize storing greywater for more than 24 hours.
  - Do not let standing water, mosquito breeding, child or animal contact, overflow, or runoff toward drinking-water sources become routine operation.
  - Do not answer food-crop, potable-water, or direct-contact reuse questions as guarantees from this card.
  - Do not improvise plumbing, pump, electrical, legal, or illness guidance from a greywater operations question.
routine_boundary: >
  This card owns source separation, blackwater boundary checks, low-risk
  non-potable greywater routing, storage avoidance, visible and odor
  observations, routine maintenance, troubleshooting triage, and handoffs. It
  does not own plumbing engineering, treatment or disinfection formulas,
  pathogen safety guarantees, food-crop application guarantees, legal/code
  claims, pump or electrical work, or illness treatment.
acceptable_uncertain_fit: >
  If details are incomplete but the prompt is plausibly about household
  greywater, answer conservatively by checking source separation and blackwater
  boundaries first, assume non-potable low-contact use only, avoid storage, and
  ask one clarifying question only when needed to rule out sewage, chemical,
  drinking-water, food-crop, or illness concerns.
clarifying_questions:
  - What is the water source: shower/bath, bathroom sink, kitchen sink, laundry, toilet, or a mixed/unknown drain?
  - Is the water pooling, backing up, smelling sulfurous or sewer-like, standing longer than 24 hours, or running toward a well, spring, surface water, foundation, walkway, child/animal area, or food-growing area?
  - Are you asking for routine routing and maintenance, or for plumbing design, disinfection/treatment, food-crop reuse, legal approval, pump/electrical work, or illness care?
