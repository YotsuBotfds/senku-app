actions:
  required:
    - classify source and exclude blackwater or unknown contamination before routine advice
    - state non-potable low-contact scope for routine greywater answers
    - avoid storage beyond 24 hours and prevent standing water or mosquito breeding
    - include observation or maintenance checks when the user reports smell, cloudiness, slow drainage, overflow, plant stress, or sludge
    - hand off engineering, disinfection, food-crop guarantee, legal, pump/electrical, and illness questions
  standard:
    - recommend visible routing checks for overflow, pooling, contact hazards, and direction away from drinking-water sources
    - recommend appearance, odor, flow, sludge, screen, filter-layer, mulch, plant-health, and mosquito checks
    - keep reuse advice conservative and favor non-food, low-contact applications unless a specialist owner is involved
forbidden:
  - plumbing engineering, pipe sizing, pump design, electrical work, or code-compliant construction claims
  - treatment or disinfection formulas, chemical dosing, or pathogen safety guarantees
  - food-crop application guarantees, potable-quality claims, or direct human-contact safety claims
  - legal approval or local-code claims
  - illness, sewage, chemical, skin, gastrointestinal, or respiratory treatment
fallback:
  - If any blackwater, sewage, toilet waste, illness cleanup, chemical contamination, or unknown source may be involved, stop routine greywater framing and hand off.
  - If water is standing, pooling, breeding mosquitoes, or stored longer than 24 hours, prioritize diversion, drainage correction, and contact prevention before routine reuse.
  - If the user wants food-crop, potable, legal, plumbing, pump/electrical, pathogen, or illness guarantees, state the card's boundary and route to the proper owner.
