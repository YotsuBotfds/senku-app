source_invariants:
  - name: severe airway emergency indicators
    guide: GD-579
    must_include:
      - Respiratory rate >40/min OR <10/min
      - Inability to speak (stridor or silent); cyanosis
      - Begin rescue breaths or BVM ventilation
      - Call for help; prepare for evacuation
    must_not_match:
      - "severe respiratory distress[^\\n]{0,120}(routine|home care|watch and wait)"
      - "(cyanosis|agonal respirations|apnea)[^\\n]{0,120}(routine|home care)"
  - name: advanced airway backup boundaries
    guide: GD-579
    must_include:
      - Can you ventilate by bag-valve-mask? (If NO
      - do NOT induce
      - If >2 failed attempts, move to cricothyrotomy
      - do NOT do blind finger sweeps
    must_not_match:
      - "perform blind finger sweeps"
      - "paralyze[^\\n]{0,120}no backup"
  - name: tension pneumothorax no imaging delay
    guide: GD-579
    must_include:
      - Do NOT wait for tracheal deviation or imaging
      - decompress immediately
      - Needle decompression FIRST
