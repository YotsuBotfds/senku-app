source_invariants:
  - name: close and transfer handoff
    guide: GD-196
    must_include:
      - Keep drafts, working notes, and scratch copies separate from the final record.
      - Record the transfer date, box number, and retention class in the master catalog.
      - preserve the record and route the judgment elsewhere
  - name: cataloging stays descriptive
    guide: GD-196
    must_include:
      - "Create a catalog that lists: record type, subject, date range, location in storage."
      - Catalog entries should describe the record, not decide the underlying claim.
      - the catalog should not announce that a disputed boundary is legally settled
  - name: storage and access protect originals
    guide: GD-196
    must_include:
      - Store in a location with stable humidity (ideally 30-50%).
      - Keep records away from cooking fires and store some copies in a separate secure location as backup against total loss.
      - Original documents should rarely if ever leave the archive.
