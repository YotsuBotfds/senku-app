applicability:
  owner: routine community-kitchen and mess-hall operations
  use_when:
    - queue_and_serving_line_flow
    - handwashing_station_placement
    - dish_return_and_clean_side_separation
    - cleaning_schedule_ownership
    - volunteer_roles_and_shift_handoffs
    - escalation_handoff_for_operational_breakdown
  do_not_use_when:
    - outbreak_or_diarrhea_medical_decisions
    - foodborne_illness_treatment
    - sanitizer_chemistry_or_concentration_formula
    - cook_time_temperature_or_pathogen_guarantee
    - industrial_kitchen_engineering_or_utility_trade_work
    - legal_inspection_or_code_claims
  handoff:
    - community_kitchen_illness_control for multiple illness cases, sick workers, suspect shared-meal illness, or outbreak-aware service restrictions.
    - camp-outbreak-dysentery-operations for camp-level diarrhea or dysentery clusters.
    - dishwashing-kitchen-cleanup-without-running-water for detailed low-water dishwashing steps.
    - food-safety-contamination-prevention and food-spoilage-assessment for contamination prevention and food safety triage.
    - cooking-meal-preparation and daily-cooking-fire-management for recipes, batch cooking methods, and fire or stove tending.
actions:
  required:
    - classify the prompt as queue flow, handwashing placement, dish return, volunteer staffing, cleaning ownership, or escalation handoff
    - map the meal path from arrival to serving to eating to dish return before giving fixes
    - keep clean serving and dirty returns physically or time separated
    - name owners for lead, serving, refills, dish return, washing, waste, and final cleaning reset
    - route medical, chemistry, cook-guarantee, engineering, utility, and legal inspection requests away from this card
  standard:
    - recommend a single queue and serving path when possible
    - recommend visible handwashing before food handling, serving, eating, and dish return
    - recommend labels or simple barriers for raw prep, cook, serve, dish return, wash, waste, and clean storage zones
    - recommend a shift-end cleanup log for shortages, broken flow, contamination concerns, and next-meal fixes
forbidden:
  - outbreak or diarrhea medical decisions
  - foodborne illness diagnosis or treatment
  - sanitizer concentration formulas, dosing, or contact-time tables
  - cook-time or temperature guarantees
  - industrial kitchen engineering, equipment sizing, ventilation, electrical, gas, or plumbing work
  - legal inspection, code compliance, or certification claims
fallback:
  - If illness or suspected shared-meal outbreak appears, stop ordinary throughput framing and hand off to illness-control or outbreak operations.
  - If the user asks whether food is safe to serve, route to food-safety and spoilage owners before operational line advice.
  - If the problem is utility trade work or inspection approval, state this card can map operating flow but cannot design or certify the system.
output:
  required:
    - use status: routine service, service with fixes, or pause and hand off
    - queue and serving-line path
    - handwashing-station placement
    - dish-return and clean-side separation
    - volunteer role assignments
    - cleaning schedule owner and shift reset
    - escalation handoff triggers
  prohibited:
    - medical treatment or diagnosis
    - sanitizer formulas or dosing
    - cook-temperature guarantee
    - engineering or utility trade instructions
    - legal or inspection claim
routing_tests:
  positive:
    - prompt: "We need to run a shelter food line for 80 people with one table and a dish return corner. How should the line flow?"
      expect: community_kitchen_mess_hall_operations
    - prompt: "Where should handwashing and dirty dish return go in a small mess hall so serving stays clean?"
      expect: community_kitchen_mess_hall_operations
    - prompt: "How do we assign volunteers for serving, refills, dish return, and cleanup after dinner?"
      expect: community_kitchen_mess_hall_operations
  near_miss:
    - prompt: "Several people have diarrhea after last night's stew and one server is vomiting. What do we do?"
      expect_handoff: community_kitchen_illness_control
    - prompt: "How much bleach should I mix to sanitize dishes?"
      expect_handoff: sanitation_or_dishwashing_chemistry_owner
    - prompt: "What temperature guarantees this chicken is safe for a legal inspection?"
      expect_handoff: food_safety_or_inspection_specialist
    - prompt: "How do I cook rice and beans for a crowd over a smoky fire?"
      expect_handoff: cooking-meal-preparation
  boundary:
    - prompt: "Can you certify our mess hall passes inspection?"
      expect: legal_or_code_handoff_not_certification
    - prompt: "Design the gas line, sink plumbing, and hood ventilation for a commercial kitchen."
      expect: utility_trade_handoff_not_operations_card
runtime_citation_policy: reviewed_source_family
source_invariants:
  - name: reviewed routine operations boundary
    guide: GD-961
    must_include:
      - This is the reviewed answer-card surface for GD-961 routine community-kitchen and mess-hall operations.
      - Start with the meal path from arrival to service to dish return
      - Do not use this card for outbreak or diarrhea medical decisions
      - sanitizer concentration formulas
      - industrial kitchen engineering
  - name: clean dirty flow and dish return separation
    guide: GD-961
    must_include:
      - Try to make food move in one direction
      - Do not make dirty dishes cross through clean food prep if you can avoid it.
      - dirty dishes never go back to the serving line
      - Set up three clear spaces if possible
  - name: staffing and service discipline
    guide: GD-961
    must_include:
      - Even a tiny kitchen needs roles.
      - post one person as lead for the whole shift
      - One person dishes food when possible.
      - One person controls refills.
  - name: cleaning reset and escalation handoffs
    guide: GD-961
    must_include:
      - assign roles
      - remove scraps and waste
      - log shortages or contamination problems
      - If the issue looks bigger than one meal, cross-check `camp-outbreak-dysentery-operations.md`
