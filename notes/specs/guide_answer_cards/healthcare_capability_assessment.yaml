source_invariants:
  - name: assessment_not_training_program
    guide: GD-635
    must_include:
      - "not a training program, but a diagnostic tool"
      - "knowing what you *can* handle and what you cannot"
  - name: emergency_first_screen
    guide: GD-635
    must_include:
      - "Unconscious? No response to pain? Call emergency."
      - "Not breathing or severe difficulty? Call emergency."
      - "Severe bleeding you can't stop? Call emergency."
      - "Chest pain radiating to arm? Call emergency."
  - name: diagnostic_imaging_limit
    guide: GD-635
    must_include:
      - "Even Tier 3 cannot replace imaging"
      - "you'll suspect but not definitively confirm"
  - name: offline_treatment_limits
    guide: GD-635
    must_include:
      - "Conditions most communities *cannot* treat offline (or only barely)"
      - "Most offline communities will handle minor-to-moderate issues and provide comfort care for serious conditions they cannot cure."
      - "serious bacterial infections you cannot treat with available antibiotics may be fatal"
  - name: surgical_limit_and_consent
    guide: GD-635
    must_include:
      - "Cannot handle internal surgery safely."
      - "Still high mortality."
      - "informed consent is critical"
    must_not_match:
      - "routine[^\\n]{0,80}(appendectomy|c-section|internal surgery)"
review_status: pilot_reviewed
notes: >
  This card is intentionally GD-635-only and frames the guide as a community
  capability assessment. It preserves the source's emergency-first screen,
  explicit diagnostic and treatment limits, surgical caution, chronic disease
  gap emphasis, and worksheet prioritization without adding triage protocols,
  medical procedures, evacuation claims, or medication dosing.
