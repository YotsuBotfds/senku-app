card_id: healthcare_capability_assessment
guide_id: GD-635
slug: healthcare-capability-assessment
title: Healthcare Capability Assessment
risk_tier: critical
evidence_owner: guide-corpus
applies_when:
  - A shelter, clinic, camp, or local team with limited supplies and few trained people needs to decide what it can safely diagnose, treat, isolate, or escalate.
  - A community medical lead is assessing diagnostic tools, treatment capacity, supply sufficiency, surgical readiness, infection control, or chronic-disease medication gaps.
  - The prompt asks what the local team can handle offline versus what is beyond its current capability.
required_first_actions:
  - Check whether the situation is life-threatening right now before using the capability worksheet or routine planning frame.
  - If someone is unconscious, not breathing or severely struggling to breathe, has severe bleeding that cannot be stopped, or has chest pain radiating to the arm, call emergency services when available.
  - Treat the guide as an honest capability assessment, not as permission to improvise diagnostics, surgery, evacuation, or medication protocols beyond current training and supplies.
first_actions:
  - Inventory trained first-aiders, EMTs, medical supplies, hardcopy references, and current diagnostic tools before deciding what the team can handle.
  - Assess capability in layers: diagnostic capability, treatment capacity, supply sufficiency, surgical readiness, infection control and quarantine, then mental health and chronic disease management.
  - Separate conditions most communities can treat offline from conditions the guide says most communities cannot treat offline or can only barely treat.
  - Score the worksheet layers from 0 to 3, calculate layer percentages, identify the lowest-scoring layer, and prioritize gaps by likely mortality impact for this specific community.
urgent_red_flags:
  - Unconsciousness, no response to pain, not breathing, severe breathing difficulty, severe bleeding that cannot be stopped, or chest pain radiating to the arm.
  - System-wide infection or sepsis signs such as confusion, extreme chills, or organ dysfunction.
  - Serious conditions the guide lists as beyond most offline communities, including severe internal bleeding, bacterial pneumonia needing IV antibiotics or oxygen support, sepsis, acute appendicitis, compound fracture, anaphylaxis, heart attack, diabetic ketoacidosis, uncontrolled hemorrhage, or severe infection beyond a surface wound.
  - Chronic disease gaps involving insulin-dependent diabetes, severe asthma/COPD without inhalers, critical cardiovascular medications, epilepsy medication loss, or psychiatric crisis with suicide risk.
forbidden_advice:
  - Do not present the card or guide as a substitute for emergency care, clinical diagnosis, surgical training, imaging, transfusion, IV therapy, or physician-directed medication management.
  - Do not invent triage, evacuation, medication dosing, antibiotic, oxygen, anesthesia, or surgical protocols beyond what the source guide states.
  - Do not claim that Tier 3 diagnostic capability can confirm problems that require imaging, such as broken bones, internal bleeding, or pneumonia.
  - Do not reassure a serious offline condition as routinely treatable when the guide lists it as not treatable offline or only barely treatable.
  - Do not turn surgical readiness tiers into instructions to attempt internal surgery without actual surgical training, sterility, anesthesia, blood supply, and informed consent limits.
do_not:
  - Do not delay emergency action while completing the worksheet or gathering inventory.
  - Do not blur honest treatment limits into promises that a community can cure sepsis, heart attack, diabetic ketoacidosis, severe internal bleeding, or uncontrolled hemorrhage offline.
  - Do not recommend relying on internet-only references when the guide calls for hardcopy references not dependent on connectivity.
  - Do not treat expired or degraded critical medications as reliable when the guide warns that failed antibiotics or epinephrine can be worse than none.
routine_boundary: >
  Routine planning language is unsuitable when a current patient has emergency
  red flags, when the team lacks the training or supplies required for the
  proposed action, or when the condition falls in the source guide's list of
  conditions most communities cannot treat offline or can only barely treat.
acceptable_uncertain_fit: >
  If the prompt could be either a current emergency or a planning assessment,
  lead with the emergency screen, then answer as a capability gap assessment
  using only the guide's layers, tier limits, and worksheet priorities.
clarifying_questions:
  - Is anyone currently unconscious, not breathing normally, bleeding severely, or having chest pain radiating to the arm?
  - What trained first-aider, EMT, nursing, mental-health, surgical, or chronic-disease support is actually present?
  - Which diagnostic tools, medications, wound-care supplies, ORS, infection-control supplies, and hardcopy references are currently available?
  - Are there community members with Type 1 diabetes, severe asthma/COPD, epilepsy, cardiovascular disease, psychiatric medications, or other critical medication dependencies?
