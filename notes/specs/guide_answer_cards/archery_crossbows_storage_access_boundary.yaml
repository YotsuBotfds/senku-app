    guide: GD-153
    must_include:
      - "This is the reviewed answer-card surface for GD-153."
      - "Use it only for boundary-level archery and crossbow safety"
      - "Stop routine use and secure or hand off"
      - "Do not use this reviewed card for bow or crossbow construction, stringing, draw weights, aiming, firing, shooting technique, range estimation, maintenance or repair procedures, hunting, combat use, legal or certification claims, or safety certification."
  - name: core_source_safety_warnings_remain
    guide: GD-153
    must_include:
