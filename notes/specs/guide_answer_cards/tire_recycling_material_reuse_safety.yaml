source_invariants:
  - name: reviewed card scope and exclusions
    guide: GD-213
    must_include:
      - This is the reviewed answer-card surface for GD-213.
      - Start by identifying the intended project and whether it is non-structural
      - Do not use this card for cutting procedures, tool choice or tool instructions, heating, hot-wire work, burning, pyrolysis, chemical processing, vulcanized patch recipes, structural retaining-wall design, load-bearing claims, playground safety certification, food-contact or potable-water safety claims, or certification that a reuse project is safe.
  - name: source_and_contamination_screening
    guide: GD-213
    must_include:
      - Avoid tires with unknown history or obvious contamination.
      - Avoid tires with interior rust, mold, or chemical residue.
      - Source from tire shops rather than junkyards.
  - name: wire_dust_fire_hazards
    guide: GD-213
    must_include:
      - "Steel Belts: The Primary Hazard"
      - Carbon black particles released during cutting or grinding tires are extremely fine
      - Tires are highly flammable and burn intensely.
  - name: pyrolysis_not_instructional
    guide: GD-213
    must_include:
      - This section is for educational understanding, not instruction to construct DIY pyrolysis units.
      - practical small-scale tire pyrolysis is difficult and dangerous
