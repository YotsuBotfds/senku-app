source_invariants:
  - name: dangerous activation is crisis not routine anxiety
    guide: GD-859
    must_include:
      - treat it as an acute mental health crisis and seek urgent evaluation
      - This is not routine anxiety, motivation, or just "a lot of energy."
      - Seek urgent medical evaluation.
    must_not_match:
      - "little or no sleep[^\\n]{0,120}(routine anxiety|motivation|just a lot of energy)"
      - "grandiose[^\\n]{0,120}(grounding|breathing exercise)[^\\n]{0,80}alone"
  - name: pfa hands off dangerous activation first
    guide: GD-858
    must_include:
      - If the complaint is "they have barely slept for days,"
      - move to the acute crisis/medical lane first
      - PFA can support after handoff
  - name: anxiety self-care excludes manic activation
    guide: GD-918
    must_include:
      - mania or acute activation with days of little or no sleep
      - little or no sleep for days with extreme energy, nonstop talking, grandiosity, feeling invincible, or reckless agitation
      - treat that as a crisis rather than everyday anxiety
