source_invariants:
  - name: field methods have explicit limits
    guide: GD-035
    must_include:
      - No single field water purification method is 100% reliable.
      - Chemical treatment does NOT remove chemical contaminants
      - Boiling kills pathogens but does not remove chemical contamination.
      - UV treatment requires clear water to be effective.
  - name: cloudy floodwater sequence
    guide: GD-035
    must_include:
      - let heavy sediment settle
      - strain or filter the clearer water
      - store treated water in a clean sealed container
      - without mixing dirty and clean handling
  - name: clear appearance is not safety proof
    guide: GD-035
    must_include:
      - Clear-looking water can contain invisible pathogens
      - Never assume water is safe based on appearance or taste.
      - Water clarity is not a safety indicator.
  - name: treatment matching by contaminant
    guide: GD-035
    must_include:
      - Boiling does NOT remove heavy metals, nitrates, pesticides, or other chemical pollutants.
      - Chlorine/iodine
      - Does NOT remove chemical contaminants.
      - Best for chemical contamination concerns
