review_status: pilot_reviewed
notes: >
  Reviewed answer card for GD-403 as diabetic glucose emergency safety only.
  It preserves low-glucose recognition when a person is awake enough to swallow,
  DKA danger-sign escalation, and the no-oral-intake airway boundary. It
  explicitly excludes insulin dose changes, insulin extraction or manufacture,
  insulin infusion or bolus dosing, glucagon dosing, insulin viability or
  potency percentages, and rationing percentages.
