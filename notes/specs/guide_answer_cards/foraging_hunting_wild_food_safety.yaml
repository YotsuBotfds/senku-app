source_invariants:
  - name: universal edibility is a starvation last resort only
    guide: GD-025
    must_include:
      - The Universal Edibility Test is a LAST RESORT only when starvation is immediate.
      - Always prefer known, positively identified food sources.
      - Never taste unknown mushrooms or fungi
      - Nightshade family and Carrot family plants are especially dangerous due to deadly lookalikes.
  - name: mushroom identification is absolute
    guide: GD-025
    must_include:
      - There is NO universal test for mushroom edibility.
      - Only eat mushrooms you have 100% positively identified.
      - Never eat mushrooms you cannot identify with 100% certainty.
      - Cook wild mushrooms thoroughly. Never eat raw
  - name: poisonous plant and mushroom warning signs remain visible
    guide: GD-025
    must_include:
      - Umbrella-shaped flower clusters
      - Milky sap or unusual discharge when stem is broken
      - Water Hemlock
      - Destroying Angel
      - If you see a cup-like structure, do not eat it.
  - name: game and fish handling require cooling cleanliness and preservation
    guide: GD-025
    must_include:
      - Meat spoils rapidly.
      - Immediate cooling is essential.
      - Do not wrap the carcass while it is warm
      - Clean fish, remove guts thoroughly.
      - Cold-smoke for 1-2 weeks or hot-smoke for 6-8 hours.
  - name: insect and preserved-food safety boundaries
    guide: GD-025
    must_include:
      - Kills all parasites and pathogens.
      - Ensure no pesticide exposure
      - Risk of pathogenic bacteria (cook well)
      - Always inspect for mold or off-odors before eating
review_status: pilot_reviewed
notes: >
  Primary owner is GD-025. This card closes the foraging/hunting/fishing
  high-liability safety surface for wild-food identification, poisonous
  plant and mushroom boundaries, game/fish handling and preservation, and
  insect preparation. It intentionally excludes hunting weapon, snare, trap,
  spear, hook, or deadfall construction detail except to say that those prompts
  should not be answered from this safety card.
