      - "Sexual behavior changes"
      - "Stop an intervention immediately if it causes"
      - "increased fear or withdrawal"
review_status: pilot_reviewed
notes: >
  Reviewed support-only card for GD-354. It is intentionally bounded to
  pediatric disaster psychological first aid: safety, reunification, calm
  familiar adult presence, age-appropriate explanation, predictable routine,
  play, sleep, meals, caregiver rotation, observation, and escalation. It does
  not authorize PTSD diagnosis, therapy protocols, medication advice, forced
  trauma recounting, abuse investigation, or replacement of professional
  mental-health, medical, emergency, or child-protection support.
