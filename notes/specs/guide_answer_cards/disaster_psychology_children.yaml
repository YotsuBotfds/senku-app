    guide: GD-354
    must_include:
      - "Ensure physical safety of the child and caregiver"
      - "Do not separate child from attachment figure unless medically necessary"
      - "Reunite separated children with caregivers immediately"
  - name: no_forced_recounting
    guide: GD-354
    must_include:
      - "Don't force details or ask directly about trauma"
      - "Do not force narrative; let child initiate when ready"
      - "Let them initiate trauma narrative."
  - name: routine_play_sleep_meals_support
    guide: GD-354
    must_include:
      - "Establish only sleep routine and basic meals"
      - "Provide access to play materials and safe space for free play"
      - "Eating together signals normalcy and safety."
  - name: escalation_and_stop_worsening_interventions
    guide: GD-354
    must_include:
