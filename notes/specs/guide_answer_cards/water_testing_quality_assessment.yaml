source_invariants:
  - name: assessment-first ownership
    guide: GD-406
    must_include:
      - Use this guide when the user needs an assessment, not a treatment recipe.
      - clear signs of sewage
      - Do NOT use water with clear signs of sewage
      - source assessment
  - name: high-risk branching
    guide: GD-406
    must_include:
      - Coliform positive
      - Boil water if for drinking
      - hand off to [Water Purification]
      - do not use for leafy greens
  - name: source family assessment
    guide: GD-406
    must_include:
      - testing frequency
      - Well Water
      - Surface Water (Rivers, Ponds, Ditches)
  - name: test-first and retest order
    guide: GD-406
    must_include:
      - test again
      - hand off
      - settle
applicability:
  - Primary use: source-risk triage for water acceptability and testing sequence.
  - Secondary use: uncertainty branch for drinking/cooking decisions.
  - Exclude: treatment dose guidance and direct purification sequencing.
actions:
  required:
    - classify source and contamination concern
    - identify whether drinking/cooking is safe now
    - issue safe-source or restriction boundary
  standard:
    - route to purification cards once contamination type is identified
    - request missing context only when it blocks a safe answer
forbidden:
  - chemical formulas or treatment dosing schedules
  - claiming clear water is safe without tests
  - guaranteeing safety with boiling for chemical contamination
  - procurement or kit-purchase guidance
  - medical treatment instructions
fallback:
  - If contamination class is uncertain, default to no-drinking/cooking recommendation and safer source/use reduction.
  - Escalate to GD-035 for treatment protocol choices.
  - Escalate to GD-931 when source clarification and pre-treatment sequencing are the immediate blocker.
output:
  required:
    - source risk class
    - immediate use boundary (safe now / retest / avoid)
    - concise next test or source change path
  prohibited:
    - dosing tables
    - formula-based treatment steps
    - deterministic medical treatment
review_status: pilot_reviewed
notes: >
  This reviewed card anchors GD-406 as assessment-first, conservative ownership for deciding source acceptability.
  It separates test-first source-risk closure from treatment protocol owners (GD-035) and clarification flow
  (GD-931), and blocks treatment promises or dosing language at generation time.
  READY_FOR_PARENT_CLOSE.
