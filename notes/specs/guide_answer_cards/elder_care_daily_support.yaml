card_id: elder_care_daily_support
guide_id: GD-355
slug: elder-care
title: "Elder Care & Geriatric Medicine"
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - Caregiver asks how to support an older adult day to day with bathing, dressing, toileting, meals, fluids, walking, transfers, supervision, routines, or backup coverage.
  - Prompt describes caregiver burden, "I can't keep up," burnout, missed care tasks, or need for a safer daily elder-care plan.
  - Older adult needs routine mobility/fall-prevention basics, nutrition/hydration support, hygiene/skin checks, or supervision support without a request for diagnosis or medication changes.
required_first_actions:
  - First screen for sudden decline, chest pain or stroke signs, severe shortness of breath, dehydration with confusion, serious fall or head injury, infected wound signs, overdose or medication error, and unsafe dementia wandering.
  - If any danger sign is present, arrange urgent help, urgent transport, or the fastest available clinician before routine care planning.
  - State that the answer is daily support, not a diagnosis, medication plan, insulin plan, herbal dosing plan, antimicrobial-herb protocol, or medication-substitution protocol.
first_actions:
  - Compare today with the person's usual baseline for alertness, walking, eating, drinking, toileting, skin condition, pain, wounds, falls, and supervision needs.
  - Set a simple daily routine for wake time, meals, fluids, bathroom help, hygiene, movement, rest, supervision checks, and bedtime.
  - Reduce fall hazards by clearing walkways, improving lighting, securing loose rugs and cords, placing needed items at waist height, checking footwear, and inspecting canes, walkers, rails, and grab bars.
  - Offer fluids on a schedule, serve soft nutrient-dense foods when chewing is hard, track intake, and watch for dry mouth, dark urine, weakness, dizziness, constipation, or reduced urination.
  - Inspect skin and feet daily, especially heels, tailbone, elbows, hips, and any pressure points; keep skin clean and dry and change position regularly if bedbound or chair-bound.
  - Create caregiver rotation and backup coverage so no single caregiver owns all essential tasks.
urgent_red_flags:
  - Sudden decline, sudden confusion, collapse, fainting, hard-to-wake state, or major change from baseline.
  - Chest pain, pressure, arm/jaw/back pain, sweating with chest discomfort, or stroke signs such as face droop, one-sided weakness/numbness, speech trouble, or new vision loss.
  - Severe shortness of breath, blue or gray color, gasping, or rapidly worsening breathing.
  - Dehydration with confusion, very little urine, repeated vomiting, severe diarrhea, extreme thirst, or severe weakness.
  - Serious fall, head injury, loss of consciousness, severe pain, hip/back/neck pain, inability to stand or walk after a fall, or possible fracture.
  - Infected wound signs such as spreading redness, red streaking, pus, foul odor, fever, worsening pain, or darkening tissue.
  - Suspected overdose, double dose with symptoms, medication error, poisoning concern, hard to wake after medicine, slow breathing, pinpoint pupils, collapse, or recurrent sleepiness after naloxone.
  - Unsafe dementia wandering, getting lost, entering traffic, leaving home unsafely, or inability to keep the person safe with supervision.
forbidden_advice:
  - Do not diagnose the cause of decline, confusion, weakness, falls, poor intake, shortness of breath, chest pain, or behavior change.
  - Do not recommend medication changes, insulin changes, skipped insulin, antihypertensive protocols, sedatives, antidotes, or rescue dosing.
  - Do not provide herbal dosing, medication substitutions, insulin substitutions, antimicrobial-herb protocols, hawthorn advice, or St. John's wort advice.
  - Do not treat chest pain, stroke signs, severe shortness of breath, dehydration with confusion, serious fall or head injury, infected wound signs, overdose or medication error, or unsafe dementia wandering as routine home care.
do_not:
  - Do not reassure sudden confusion, sudden weakness, or sudden decline as normal aging.
  - Do not rely on a single caregiver for hydration, toileting, mobility help, supervision, medication logging, or skin checks.
  - Do not continue using damaged canes, walkers, handrails, grab bars, or unsafe footwear.
  - Do not force food or fluids if the person cannot swallow safely or is severely short of breath, hard to wake, vomiting repeatedly, or showing stroke signs.
routine_boundary: >
  Routine daily elder-care support applies when the person is at or near their
  baseline and needs help with mobility, fall prevention, meals, fluids,
  hygiene, skin checks, supervision, routines, caregiver workload, or backup
  coverage. Sudden decline, chest pain or stroke signs, severe shortness of
  breath, dehydration with confusion, serious fall or head injury, infected
  wound signs, overdose or medication error, or unsafe dementia wandering
  override routine daily-care advice.
acceptable_uncertain_fit: >
  If the prompt is incomplete but sounds like routine elder-care burden, answer
  with practical low-risk support and ask focused questions about baseline,
  intake, falls, wounds, breathing, chest pain, confusion, medication errors,
  and wandering. If any danger sign may be present, preserve urgent handoff
  language before routine planning.
clarifying_questions:
  - What changed from their usual baseline, and when did it start?
  - Is there chest pain, stroke signs, severe shortness of breath, sudden confusion, dehydration, a serious fall, a wound infection concern, or a medication/poisoning error?
  - Which daily tasks are hardest right now: walking/transfers, toileting, bathing, meals, fluids, supervision, skin checks, or caregiver coverage?
  - Who is the backup caregiver if the primary caregiver becomes unavailable today?
