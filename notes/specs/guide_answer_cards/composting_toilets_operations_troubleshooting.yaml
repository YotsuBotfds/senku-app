card_id: composting_toilets_operations_troubleshooting
guide_id: GD-853
slug: composting-toilets
title: "Composting Toilets: Design, Construction & Safe Operation"
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - User asks why a composting toilet smells like ammonia, sulfur, rotten material, urine, or feces.
  - User asks about wet, slimy, dry, slow, insect-prone, or poorly decomposing composting-toilet contents as an operations or maintenance problem.
  - User asks how to keep urine and feces flows separated, how to check a urine diverter, or why a urine-diversion toilet smells or clogs.
  - User asks about routine cover material, ventilation checks, chamber observations, emptying/switching schedules, or maintenance cadence for an existing composting toilet.
  - User needs a handoff from composting-toilet operations to temporary toilet, latrine, sanitation, water, medical, legal/code, or professional engineering guidance.
required_first_actions:
  - Keep the answer in observation and operations troubleshooting unless the prompt explicitly belongs to another owner.
  - Identify the current dominant symptom first: odor type, wet/slimy material, exposed feces, flies/insects, slow decomposition, urine-diverter leak/clog, blocked vent, or missed cover routine.
  - Separate urine-flow checks from feces-chamber checks when urine diversion is present; verify the diverter is positioned correctly, urine is reaching the separate container, and urine is not leaking into the feces chamber.
  - Check ventilation and cover material early: blocked vent, missing screen, poor draft, insufficient dry carbon cover, excess moisture, or exposed feces are first-order causes of odor and insects.
  - Include a routine maintenance cadence when maintenance is relevant: cover after each use, weekly odor/moisture/insect checks, monthly access/door/urine-container checks, and longer-cycle vault switching or mature-material assessment.
  - Use handoff language for pathogen kill-time guarantees, food-crop application, legal/code claims, chemical disinfectant formulas, medical illness treatment, confined-space entry, excavation, or structural engineering.
first_actions:
  - For ammonia odor, look for too much nitrogen or urine in the feces chamber, then add extra dry carbon cover and verify the urine diverter is not leaking or mispositioned.
  - For sulfur, rotten, or fecal odor, treat it as an aeration/moisture/cover problem: add dry carbon, check for wet material, confirm the vent pipe is unobstructed, and inspect seals or access doors for odor escape.
  - For wet or slimy compost, check whether urine is entering the feces chamber, rain is entering the vault, standing liquid is present, or cover material is insufficient; add dry bulking material and improve airflow.
  - For flies or insects, cover exposed feces promptly, inspect the vent screen, seal cracks or openings, and clean residue around the seat or access area.
  - For slow decomposition, check season, moisture balance, carbon routine, compaction, and whether the system is passive; avoid promising completion dates or pathogen safety.
  - For routine operation, keep dry carbon beside the toilet, cover feces after every use, keep the seat clean and dry, check vent flow and screens, and schedule chamber or urine-container maintenance before overflow or odor forces the issue.
urgent_red_flags:
  - Waste, liquid, leachate, or urine is leaking into living areas, kitchens, food storage, drinking-water areas, wells, springs, surface water, drainage paths, or child-accessible areas.
  - Users cannot wash hands after toilet use or after handling toilet tools, containers, access doors, or composting material.
  - The user reports illness symptoms, multiple people sick after sanitation exposure, or asks how to treat disease from toilet contact.
  - The user wants to enter a vault, tank, pit, crawlspace, or other enclosed area for inspection, cleaning, repair, or waste removal.
  - The user asks for food-crop use, pathogen-kill guarantees, chemical disinfection formulas, legal/code approval, excavation plans, structural design, or sewage repair.
forbidden_advice:
  - Do not provide pathogen kill-time guarantees, temperature/time assurances, or claims that material is pathogen-safe.
  - Do not advise applying humanure or composting-toilet output to food crops, edible gardens, or crop irrigation.
  - Do not provide legal/code compliance claims, permitting advice, or assertions that a design is approved for a jurisdiction.
  - Do not provide bleach, chlorine, lime, disinfectant, enzyme, or other chemical treatment formulas for human waste or toilet surfaces.
  - Do not provide medical diagnosis, illness treatment, medication, or outbreak-management instructions.
  - Do not advise confined-space entry into vaults, tanks, pits, or enclosed chambers.
  - Do not provide excavation, foundation, structural vault, or construction-engineering instructions from this card.
do_not:
  - Do not turn an odor or fly question into compost-use advice.
  - Do not skip urine-diversion checks when the symptom is ammonia, urine smell, wet compost, or repeated odor.
  - Do not skip ventilation checks when odor persists after cover material is added.
  - Do not suggest that adding cover material, heat, time, or storage makes contents safe for food crops.
  - Do not merge temporary bucket toilets, latrine siting, sewage systems, or greywater design into the composting-toilet operations answer except as handoffs.
routine_boundary: >
  This card owns existing composting-toilet operations and troubleshooting:
  odor observations, urine/feces flow separation, ventilation and screen checks,
  dry cover-material routine, wet/slow/fly observations, maintenance scheduling,
  and handoffs. It does not own pathogen kill-time guarantees, humanure food-crop
  application, legal/code approval, chemical disinfectant formulas, illness
  treatment, confined-space entry, excavation, or construction engineering.
acceptable_uncertain_fit: >
  If the prompt is plausibly about a composting toilet but details are missing,
  give conservative observation-first steps: cover exposed feces with dry carbon,
  check urine diversion if present, verify vent/screen airflow, prevent leaks and
  hand contact, and ask one clarifying question about odor type, moisture,
  insects, or system type. Hand off immediately when the prompt crosses the
  forbidden boundaries.
clarifying_questions:
  - Is the main problem ammonia/urine smell, rotten or sulfur odor, fecal odor, wet material, flies, slow decomposition, or a maintenance schedule?
  - Does the toilet have urine diversion, and is urine reaching a separate sealed container instead of the feces chamber?
  - Is the vent pipe unobstructed, screened, and drafting outside, or is odor escaping through the seat or access door?
  - What cover material is used after each feces deposit, and is it dry enough to cover the surface fully?
  - Are there leaks, standing liquid, drinking-water concerns, illness symptoms, or requests about using the material on food crops?
