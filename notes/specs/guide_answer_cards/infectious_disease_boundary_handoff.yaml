notes: >
  Reviewed closure for GD-053 as a boundary-only infectious-disease intake,
  spread-reduction, red-flag, and handoff card. It owns symptom/exposure/
  timeline logs, isolation and support logs, hydration/rest/sanitation
  reminders, household/community spread-reduction prompts, severe fever/
  respiratory distress/confusion/dehydration/rash/infant/pregnancy/
  immunocompromised red flags, and clinician or public-health handoff. It
  deliberately excludes diagnosis, antibiotic/antiviral/antiparasitic
  treatment, dosing, vaccine guidance, lab testing or sampling instructions,
  quarantine or enforcement orders, return-to-work or school clearance, legal
  claims, and safety certification. READY_FOR_PARENT_CLOSE.
