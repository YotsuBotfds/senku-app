source_invariants:
  - name: immediate evacuation and lahar anchors remain present
    guide: GD-697
    must_include:
      - "Sheltering in place is not effective against pyroclastic flows"
      - "The ONLY effective response is immediate evacuation."
      - "Evacuate river valleys and low-lying areas"
      - "Do not drive to high ground if a lahar is approaching."
      - "If you hear the roar, run uphill on foot immediately rather than waiting for traffic."
    must_not_match:
      - "certified safe[^\\n]{0,120}(route|road|clearance)"
      - "safe to drive[^\\n]{0,120}after ash"
  - name: ashfall shelter and exposure anchors remain present
    guide: GD-697
    must_include:
      - "Shelter indoors."
      - "Close all windows and doors"
      - "Turn off air conditioning"
      - "Avoid strenuous exertion outdoors"
      - "Boiling does not remove ash particles"
    must_not_match:
      - "guarantee[^\\n]{0,120}(mask|respirator|filter|purifier)"
      - "certified safe[^\\n]{0,120}(mask|respirator|filter|purifier)"
  - name: gas and vulnerable population anchors remain present
    guide: GD-697
    must_include:
      - "Shelter indoors to limit gas inhalation."
      - "Never descend into valleys or enclosed spaces where CO"
      - "Mixture of gases and particles causing respiratory and eye irritation."
      - "Vulnerable populations"
      - "should relocate temporarily during intense volcanic gas events."
  - name: infrastructure and official warning anchors remain present
    guide: GD-697
    must_include:
      - "Monitor radio warnings."
      - "warnings broadcast via local radio or sirens"
      - "Large ash accumulation is heavy and can damage structures."
      - "Municipal water supplies may be unavailable or contaminated for extended periods."
      - "Develop a plan of when to evacuate based on observable signs or official warnings."
    must_not_match:
      - "ash load[^\\n]{0,120}(calculate|calculation|formula)"
      - "re-?enter[^\\n]{0,120}(?:is safe|safe to enter|clearance)"
