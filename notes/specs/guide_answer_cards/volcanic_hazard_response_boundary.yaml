notes: >
  Reviewed boundary card for GD-697. It closes the metadata/card audit gap for
  volcanic hazard response as natural-hazard safety intake only: evacuation or
  shelter status, ash/vog exposure reduction, respiratory and eye red flags,
  lahar/river-valley danger, road/roof/utility observations, official alert
  follow-up, concise handoff, and clarifying questions. It deliberately
  excludes eruption prediction, geologic certainty, ash-load calculations,
  roof-clearing procedures, rescue entry, vehicle or road clearance,
  respiratory-device efficacy claims, legal claims, and safety certification.
  READY_FOR_PARENT_CLOSE.
