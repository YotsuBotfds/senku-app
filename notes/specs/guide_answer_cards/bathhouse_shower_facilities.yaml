  - sanitizer dosing, chemical formulas, or cleaner mixing recipes
  - medical treatment for burns, falls, infection, mold exposure, or waterborne illness
  - decontamination guarantees for sewage, chemical, or body-fluid contamination
  - continued use through sewer smell, backflow, well-directed runoff, chronic pooling, scald hazard, or slip hazard
fallback:
  - If sewer smell, backflow, runoff toward wells/springs/foundations/walkways, chronic pooling, painful hot water, or repeated slips are present, stop use and hand off before routine bathhouse operation.
  - If the user asks for plumbing, heater, or treatment-system construction, state this card covers safe operation only and route to the relevant specialist guide.
  - If contamination type is unknown or sewage/chemical/body-fluid exposure is present, do not promise cleanup success; isolate the area from routine use and route to sanitation, hygiene, or chemical-safety owners.
