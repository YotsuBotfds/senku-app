card_id: bathhouse_shower_facilities
guide_id: GD-945
slug: bathhouse-shower-facilities
title: "Bathhouse, Shower & Washing Facilities"
risk_tier: medium
evidence_owner: guide-corpus
applies_when:
  - User asks how to set up, operate, or troubleshoot a shared bathhouse, shower stall, bucket shower, gravity shower, wash corner, or community washing facility.
  - The question is about clean/dirty flow, privacy, towel and soap handling, wet/dry zones, drainage checks, slip prevention, scald prevention, or routine cleaning and maintenance.
  - User reports pooled water, sewer-like smell, backflow, runoff toward wells or walkways, slippery floors, overheated water, moldy surfaces, or shared-facility confusion.
required_first_actions:
  - Keep the answer operational and safety-focused: separate clean and dirty areas, define dry and wet zones, and keep toilet waste separate from bathhouse graywater.
  - Check drainage before routine use; stop use if graywater backs up, smells sewer-like, pools repeatedly, freezes into indoor pooling, or runs toward wells, springs, foundations, or main walkways.
  - Address privacy, clean clothes/towel placement, soap drainage, shared touch points, slip hazards, and hot-water testing before giving layout or use steps.
  - Use handoff language for plumbing design, hot-water construction, sanitizer chemistry, medical treatment, or decontamination guarantees.
first_actions:
  - Set a one-way flow: entry and dirty clothing, wash/rinse area, drying area, then clean clothing without crossing back through the wet zone.
  - Keep clean towels, clean clothing, dirty laundry, used washcloths, shoes, drains, and toilet areas separated.
  - Use a simple drainage path with a drain pan, floor drain, bucket, soak area, or graywater line that keeps standing water away from floors, walls, foot traffic, and drinking-water sources.
  - Keep soap on a draining tray, hang towels to dry fully, wipe shared handles/benches/curtain edges, and remove hair or solids from screens before clogs build.
  - Prevent slips with textured surfaces, clean walking paths, good lighting, no hoses or buckets in foot paths, and immediate cleanup of soap residue or spills.
  - Prevent scalds by testing warm water before use, keeping hot containers out of walking paths, warning children, and mixing water down before anyone enters.
urgent_red_flags:
  - Graywater backs up into the wash area or a frozen/clogged line forces water to pool indoors.
  - Sewer-like or rotten drain smell, recurring sour smell after cleaning, or visible backflow.
  - Runoff is moving toward a well, spring, foundation, food storage, or main walkway.
  - Chronic pooling under floors, along wall bases, or in walking paths.
  - Slippery floors, poor lighting, loose hoses/buckets, or repeated falls/near-falls.
  - Water feels painfully hot on the hand or forearm, or a child/elder/reduced-sensation user may be exposed to overheated water.
forbidden_advice:
  - Do not provide plumbing engineering, drain sizing, code-compliant piping design, pump design, or permanent wastewater construction instructions.
  - Do not provide hot-water heater construction, boiler design, pressure-system design, or fuel-burning appliance instructions.
  - Do not provide sanitizer chemistry, chemical concentration formulas, mixing ratios, contact-time tables, or bleach/cleaner dosing.
  - Do not provide medical treatment for burns, infections, falls, mold exposure, or waterborne illness.
  - Do not promise decontamination, sterilization, pathogen elimination, or guaranteed safety after unknown sewage, chemical, or body-fluid contamination.
  - Do not keep a shared facility operating through sewer smell, backflow, runoff toward wells, chronic pooling, scald risk, or slip/fall hazards.
do_not:
  - Do not merge toilet waste with bathhouse graywater in routine bathhouse advice.
  - Do not put clean towels or clean clothing in the wet or dirty zone.
  - Do not let standing graywater, damp towel piles, or wet porous mats become the normal operating condition.
  - Do not answer as a construction manual when the user is asking about engineering, plumbing, heaters, or treatment systems.
routine_boundary: >
  This card owns shared bathhouse and wash-station operations: layout flow,
  drainage stop-use checks, privacy, towel/soap handling, slip/scald prevention,
  cleaning, maintenance, and shared-use rules. It does not own plumbing
  engineering, hot-water system construction, sanitizer chemistry, medical care,
  or decontamination guarantees.
acceptable_uncertain_fit: >
  If details are incomplete but the prompt is about a bathhouse or washing
  facility, give conservative operational steps and ask one clarifying question
  only when needed. If any drainage, scald, slip, sewage, runoff, or chronic
  pooling red flag is plausible, default to stop-use and handoff before routine
  operating advice.
clarifying_questions:
  - Is water pooling, backing up, smelling sewer-like, or running toward a well, spring, foundation, or walkway?
  - Is this a one-person wash corner, household shower, or shared community bathhouse?
  - Are users reporting slips, painfully hot water, lack of privacy, or towels/clean clothes getting wet or dirty?
  - Is the user asking for operations and layout, or for plumbing/heater/treatment-system design?
