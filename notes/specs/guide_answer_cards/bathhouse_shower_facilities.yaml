actions:
  required:
    - classify the prompt as layout, routine operation, drainage concern, shared-use hygiene, cleaning, slip hazard, or scald hazard
    - check stop-use red flags before normal operating steps
    - preserve clean-to-dirty and wet-to-dry separation
    - give concise shared-facility rules and maintenance steps
  standard:
    - recommend privacy, reachable hooks, protected clean-clothes storage, towel drying, soap drainage, and touch-point cleaning
    - recommend traction, lighting, clear walking paths, water-temperature testing, and supervised child use around hot water
    - route engineering, chemistry, decontamination, and medical requests to the proper owner instead of improvising
forbidden:
