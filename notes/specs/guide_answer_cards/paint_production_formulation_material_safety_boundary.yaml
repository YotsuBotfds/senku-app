    guide: GD-465
    must_include:
      - "This is the reviewed answer-card surface for GD-465."
      - "Use it only for boundary-level paint and coating material inventory"
      - "lead and heavy-metal uncertainty, solvent, isocyanate, dust, fume, skin, eye, and respiratory red flags"
      - "child, food-contact, and indoor-use uncertainty"
      - "poison-control, public-health, emergency, hazmat, qualified coatings, materials, or site-owner handoff"
      - "Do not provide paint recipes, pigment or solvent processing steps, formulation ratios, application or removal instructions, sanding/scraping methods, compatibility testing, cleanup chemistry, disposal legality, legal or code claims, safe-to-use statements, indoor or food-contact clearance, return-to-service decisions, or safety certification from this reviewed card."
  - name: source_hazard_language_remains
    guide: GD-465
    must_include:
      - "Traditional pigments cause specific organ damage"
