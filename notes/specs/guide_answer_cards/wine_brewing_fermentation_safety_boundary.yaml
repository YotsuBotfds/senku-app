applicability:
  owner: fermentation and alcohol safety routing boundary
  use_when:
    - batch labeling and identity records
    - sanitation logs for fermentation equipment and containers
    - spoilage or contamination red flags
    - service-stop and hold-or-discard decisions for suspect alcohol
    - alcohol legal, public-health, medical, community-risk, or regulatory handoffs
    - distillation hazard routing without setup or operation advice
  do_not_use_when:
    - recipes, ratios, temperatures, fermentation schedules, or aging schedules are requested
    - distillation setup, operation, cuts, methanol separation, or still construction is requested
    - medical treatment, detox, intoxication management, or poisoning care is needed
    - legal compliance, licensing, sale approval, or safety certification is requested
    - equipment design, construction, process validation, or hazard-control engineering is requested
  handoff:
    - food-spoilage-assessment for broader questionable-food spoilage triage.
    - food-safety-contamination-prevention for general sanitation and contamination control.
    - toxicology or poisoning owners for suspected methanol, unknown alcohol exposure, poisoning symptoms, or severe illness after alcohol.
    - emergency, fire, or qualified technical owners for distillation fire, pressure, equipment, or still hazards.
    - public-health or medical owners for illness clusters, severe symptoms, vulnerable-person exposure, or shared-batch exposure.
    - legal, regulatory, or local authority for distillation legality, licensing, public sale, donation, barter, or compliance questions.
output_contract:
  requires_contract_items:
    - required_first_actions
    - urgent_red_flags
    - forbidden_advice
    - fallback_handoff_language
  must_include_applicability_boundary: true
  avoid_recipes_process_parameters_medical_legal_certification: true
fallback_handoff_language:
  - Hold the alcohol out of service, label and separate the batch, and do not mix it with other alcohol while safety is uncertain.
  - If symptoms, vulnerable-person exposure, several exposed people, unknown-source spirits, or methanol concern are involved, route to medical, poison, emergency, or public-health help before product-use advice.
  - Distillation questions require hazard and legal routing; this card does not provide still setup, operation, cuts, methanol separation, equipment build steps, or safety certification.
  - If sanitation logs, source identity, storage records, or batch labels are missing, use the conservative stop-service and handoff path.
