card_id: wine_brewing_fermentation_safety_boundary
guide_id: GD-072
slug: wine-brewing
title: Wine, Brewing & Distillation
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - A user asks whether a wine, beer, cider, wash, mash, or other alcohol batch may be spoiled, contaminated, unsafe, mislabeled, or unsuitable to serve.
  - A user needs a planning answer for batch labeling, sanitation logs, spoilage red flags, service-stop decisions, or alcohol/community-risk handoffs.
  - A prompt mentions distillation hazards, unknown spirits, methanol concern, pressure or fire hazards, shared-community alcohol, public service, sale, donation, barter, illness, or vulnerable-person exposure.
required_first_actions:
  - Keep suspect fermented alcohol out of service while safety is uncertain; label, separate, and prevent mixing with fresh or known-good batches.
  - Identify the batch, product type, container, date opened or started, storage location, sanitation records, visible condition, odor or appearance concerns, pressure or swelling, and who consumed it.
  - Screen for spoilage, contamination, illness linkage, vulnerable-person exposure, unknown-source alcohol, distillation hazards, and community distribution before routine fermentation discussion.
  - Route distillation hazards, methanol concern, severe symptoms, intoxication, illness clusters, public service, sale, donation, barter, and legal or regulatory questions to the appropriate owner.
  - Do not provide recipes, ratios, temperatures, fermentation schedules, distillation procedures, methanol separation advice, equipment build steps, medical treatment, legal compliance claims, or safety certification.
conditional_required_actions:
  - trigger_terms:
      - methanol
      - distill
      - still
      - cuts
      - heads
      - tails
      - spirit run
      - moonshine
    required_actions:
      - Treat as distillation hazard routing, not routine brewing; do not provide setup, operation, cut, methanol separation, still design, or safety-certification advice.
      - Route fire, pressure, unknown-spirit, methanol, legal, or community-distribution concerns to emergency, medical, legal, regulatory, or qualified technical owners as appropriate.
  - trigger_terms:
      - sick
      - vomiting
      - diarrhea
      - fever
      - blind
      - confusion
      - intoxicated
      - passed out
      - seizure
    required_actions:
      - Treat symptoms after alcohol or suspect fermentation as medical or public-health routing; do not provide medical treatment, detox, intoxication management, or reassurance from this card.
first_actions:
  - Ask only essential triage questions needed to identify the batch, consumer exposure, spoilage signs, distribution setting, and whether distillation or unknown spirits are involved.
  - Stop service of suspect alcohol, label and isolate the batch, and document who was notified while safety is uncertain.
  - Review sanitation logs for clean containers, tools, transfer points, closures, storage area, batch code, and any mixing of old, unknown, or fresh batches.
  - Check for red flags such as visible mold or contamination, abnormal odor or appearance, swelling or pressure, damaged container, unknown source, missing records, illness linkage, or vulnerable-person exposure.
  - Hand off distillation, legal, medical, public-health, emergency, regulatory, sale, donation, barter, or community-service issues before any routine fermentation topic.
urgent_red_flags:
  - Methanol concern, unknown-source spirits, home-distilled alcohol, distillation fire or pressure hazard, still malfunction, or request for distillation cuts or setup.
  - Vomiting, diarrhea, fever, confusion, severe weakness, vision changes, seizure, unconsciousness, breathing problems, severe intoxication, pregnancy concern, or several people ill after the same batch.
  - Suspect alcohol served to or intended for pregnant people, minors, older adults, immunocompromised people, a shelter, school, clinic, public event, sale, donation, barter, or other shared-community setting.
  - Visible mold or contamination, abnormal odor or appearance, swollen or pressurized container, damaged closure, missing sanitation records, unknown source, or mixing with old or unknown batches.
forbidden_advice:
  - Recipes, ingredient ratios, sugar or nutrient additions, yeast selection instructions, temperatures, fermentation schedules, aging schedules, bottling schedules, or hydrometer procedures.
  - Distillation setup, operation, still design, equipment build steps, heat-source advice, pressure-management tactics, cuts, heads/tails collection, or methanol separation advice.
  - Claims that smell, taste, freezing, discarding the first portion, boiling, filtering, aging, or visual inspection makes alcohol safe.
  - Medical diagnosis, treatment, detox, intoxication management, overdose management, poisoning treatment, or reassurance after symptoms.
  - Legal compliance claims, licensing advice, public-sale authorization, or certification that a batch, still, process, or product is safe or compliant.
do_not:
  - Do not convert a safety or spoilage question into a fermentation recipe.
  - Do not provide process parameters, ratios, temperatures, schedules, cuts, or still-operation steps.
  - Do not reassure users that unknown, suspect, home-distilled, or symptomatic-exposure alcohol is safe.
  - Do not treat public service, sale, donation, barter, vulnerable-person exposure, or illness clusters as routine batch troubleshooting.
  - Do not certify alcohol, distillation equipment, sanitation, or legal status as safe, compliant, or approved.
routine_boundary: >
  This card owns only fermentation and alcohol safety boundaries: batch
  labeling, sanitation logs, spoilage red flags, service-stop decisions,
  community-risk screening, legal or regulatory handoff triggers, and
  distillation hazard routing. It does not own recipes, ratios, temperatures,
  fermentation or aging schedules, hydrometer procedures, distillation setup or
  operation, methanol separation, equipment builds, medical or intoxication
  management, legal compliance, or safety certification.
acceptable_uncertain_fit: >
  If the prompt may be a production question but mentions spoilage, sanitation,
  labeling, missing records, symptoms, vulnerable people, public service, sale,
  donation, barter, unknown alcohol, or distillation, apply this boundary first:
  stop service, isolate the batch, ask essential triage questions, and route
  before giving any routine fermentation information.
clarifying_questions:
  - What product and batch is involved, and is it fermented only or distilled/unknown-source alcohol?
  - What labels, dates, storage location, container condition, and sanitation records are available?
  - Are there visible mold, contamination, abnormal odor or appearance, swelling, pressure, damaged closure, or missing records?
  - Has anyone consumed it, and are there symptoms, vulnerable people, or multiple people exposed to the same batch?
  - Is this for household use, public service, sale, donation, barter, school, shelter, clinic, or another shared-community setting?
