notes: >
  Reviewed answer card for GD-493 deficiency risk screening and food-first
  prevention. It covers early warning signs, single-food/no vitamin C/no
  iodine/no animal-product planning red flags, and community food-plan
  adjustment when multiple people show similar signs. It intentionally forbids
  diagnosis certainty, supplement or drug dosing, and routine handling of
  advanced signs such as edema, confusion, severe shortness of breath, severe
  weakness, pregnancy goiter, and child growth or bone deformity.
