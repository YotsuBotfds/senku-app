source_invariants:
  - name: puncture_wound_management
    guide: GD-622
    must_include:
      - Irrigate the visible opening thoroughly; do not probe or widen the tract in the field
      - Keep the wound open with dressing choice, not by cutting or probing it open
      - Delayed primary closure
      - observe for infection signs
  - name: hand_bite_monitoring
    guide: GD-622
    must_include:
      - delayed closure
      - inability to move fingers
  - name: rabies_time_critical
    guide: GD-622
    must_include:
      - Time to initiate PEP is critical
      - assume any bat contact = rabies exposure
review_status: pilot_reviewed
notes: >
  This card is scoped to bite-related wound infection support: irrigation quality,
  delayed closure, monitoring progression, and rabies-first response. It does not
  add general first-aid or newborn/sepsis guidance beyond bite context.
