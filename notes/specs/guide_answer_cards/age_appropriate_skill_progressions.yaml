card_id: age_appropriate_skill_progressions
guide_id: GD-639
slug: age-appropriate-skill-progressions
title: Age-Appropriate Skill Progressions
risk_tier: medium
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user asks what kinds of skills children or teens should learn at different ages.
  - A user asks how to structure supervised practice, apprenticeship entry, age-band curriculum, or progression pacing for youth.
  - A user asks whether a learner is ready for more autonomy, a harder task, or slower pacing.
  - A user asks for a curriculum map that keeps children observing, practicing, mentoring, and advancing without skipping foundations.
applicability:
  owner: age-banded curriculum, supervision, and progression planning
  use_when:
    - matching age bands to learning goals, teaching methods, and supervision level
    - planning prerequisite awareness, supervised practice, apprenticeship readiness, and journeyman transition
    - deciding whether to accelerate, slow down, or add more scaffolding
  do_not_use_when:
    - the user asks a child to perform independent survival, tool, fire, animal, rescue, tactical, medical, first-aid, or legal/child-protection tasks
    - the prompt is about diagnosing developmental delay, disability, trauma, or medical limitation
    - the prompt asks for a procedure from another specialist guide rather than curriculum and supervision planning
  handoff:
    - teacher-training-non-educators for instructor coaching, lesson delivery, feedback, and classroom management
    - pedagogy-curriculum or education-teaching-methods for broader curriculum design and teaching methods
    - child-protection-youth-rights for suspected abuse, exploitation, coercion, custody, legal, or safeguarding determinations
    - the relevant safety or specialist owner for actual tool, fire, water, animal, first-aid, medical, rescue, or survival procedures
required_first_actions:
  - Start by identifying the learner's age band, current demonstrated competency, supervision available, and the target learning goal.
  - Keep the answer in curriculum and supervision planning: observation, guided practice, readiness checks, pacing, documentation, and apprenticeship structure.
  - If the prompt asks for a child to perform a hazardous task independently, reframe to prerequisite awareness, adult-supervised practice, and handoff to the proper safety owner.
  - If the prompt includes injury, illness, medical care, legal/child-protection concerns, coercion, or active danger, route that concern first before routine progression planning.
conditional_required_actions:
  - trigger_terms:
      - first aid
      - medical
      - injury
      - wound
      - burn
      - dose
      - medicine
      - diagnose
    required_actions:
      - Do not provide first-aid, medical, dosing, diagnosis, or treatment instructions from this card; hand off to the appropriate medical or emergency owner.
      - Limit any GD-639 answer to age-appropriate learning readiness and supervised curriculum design.
  - trigger_terms:
      - fire
      - knife
      - axe
      - saw
      - tool
      - animal
      - hunting
      - survival
      - alone
      - independent
    required_actions:
      - Do not teach the hazardous procedure; state that children progress through awareness, observation, and supervised practice before any autonomy.
      - Route procedural tool, fire, animal, hunting, or independent survival instruction to the relevant specialist owner with supervision boundaries.
  - trigger_terms:
      - abuse
      - neglect
      - exploitation
      - child protection
      - custody
      - legal
      - forced
      - punishment
    required_actions:
      - Stop routine curriculum advice for that issue and hand off to child-protection, rights, legal, or safeguarding owners.
      - Do not decide abuse, neglect, custody, reporting, or legal determinations from this card.
first_actions:
  - For ages 5-7, plan brief concrete lessons around observation, imitation, stories, habit formation, and safety awareness rather than active hazardous skills.
  - For ages 8-10, plan adult-present supervised practice, guided steps, immediate feedback, and small responsibilities only after safety habits are reliable.
  - For ages 11-13, begin apprenticeship-style learning with observation, assisted practice, projects, specialization choices, and master review.
  - For ages 14-16, deepen one or two specializations, add near-peer mentorship, problem-solving, teaching younger learners, and clear advancement criteria.
  - For ages 17-18, plan journeyman transition, peer learning, cross-training, teaching mastery, documentation, and adult work roles.
  - Use readiness signs before acceleration: consistent current-level mastery, safety consciousness, problem-solving, seeking challenge, and ability to explain or teach others.
urgent_red_flags:
  - The child or teen is currently injured, ill, in danger, missing, exposed to a hazard, or being asked to continue after a safety breach.
  - The prompt asks for medical, first-aid, dosing, diagnosis, rescue, legal, custody, abuse, neglect, exploitation, or child-protection determinations.
  - The user wants a child to do tool, fire, animal, hunting, rescue, tactical, or survival procedures alone or without competent adult supervision.
  - The proposed progression ignores repeated safety breaches, anxiety, attention limits, repeated errors, or loss of motivation.
  - The user frames punishment, humiliation, deprivation, threats, or forced compliance as a teaching method.
forbidden_advice:
  - Do not provide independent survival, tool-use, fire-making, animal-handling, hunting, rescue, tactical, first-aid, medical, medication, dosing, or legal procedures.
  - Do not decide abuse, neglect, exploitation, custody, reporting, or child-protection outcomes.
  - Do not diagnose developmental delay, learning disability, trauma, mental health, or medical conditions.
  - Do not tell a caregiver to skip foundational stages or remove supervision before competency and safety judgment are demonstrated.
  - Do not use shame, threats, punishment, deprivation, or coercion as a progression or classroom-management tool.
do_not:
  - Do not convert age bands into permission for unsupervised hazardous tasks.
  - Do not present skill acceleration as appropriate when safety breaches, distress, or repeated uncorrected errors are present.
  - Do not answer procedural how-to requests from this guide; keep to curriculum map, supervision level, readiness, pacing, and handoff.
  - Do not blur this planning card into first aid, medical care, legal advice, child-protection workflow, or specialist safety content.
routine_boundary: >
  This card is routine only for stable curriculum and supervision planning. It
  owns age bands, teaching method, readiness checks, apprenticeship pacing, and
  progression documentation. It does not own active hazards, medical care, first
  aid, legal/child-protection determinations, or procedural training for tools,
  fire, animals, rescue, tactical tasks, or independent survival.
acceptable_uncertain_fit: >
  If the prompt is incomplete, ask for age, current demonstrated competency,
  target skill, available supervision, and known hazards, then provide a
  conservative age-band progression. If high-risk or specialist terms appear,
  lead with the boundary and handoff before any routine curriculum advice.
clarifying_questions:
  - What is the learner's age, current skill level, and target learning goal?
  - What adult supervision and safe practice setting are available?
  - Is this a curriculum-planning question, or is the child being asked to perform a hazardous task now?
  - Has the learner shown safety breaches, repeated mistakes, anxiety, attention difficulty, or readiness to teach others?
  - Is there any medical, legal, child-protection, coercion, or active-danger concern mixed into the request?
