notes: >
  Boundary-only reviewed card for GD-899. It covers exposure/location/timing
  intake, leave-source and fresh-air priorities, safe ventilation only when it
  does not delay escape, symptom logs, CO/smoke/fire-gas red flags,
  child/pregnancy/elder risk, and handoff to emergency services, poison
  control, clinicians, or fire service. It intentionally excludes diagnosis,
  oxygen or medical treatment protocols, medication/dosing, rescue entry, fire
  suppression, generator/heater repair, ventilation engineering, re-entry
  clearance, return-to-work clearance, legal claims, and safety certification.
