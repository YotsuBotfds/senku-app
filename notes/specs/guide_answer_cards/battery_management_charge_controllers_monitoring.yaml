    guide: GD-582
    must_include:
      - "This is the reviewed answer-card surface for GD-582."
      - "Use it only for non-invasive battery-bank condition inventory, red-flag recognition, monitoring logs, ventilation and location checks, and owner-routing handoffs."
      - "Do not use this reviewed card for charging setpoints, equalization, balancing, revival, desulfation, BMS wiring, cell configuration, chemistry-specific procedures, capacity or cable calculations, repair steps, opening packs, bypassing protection, live electrical work, or safety certification."
  - name: monitoring_log_fields_remain
    guide: GD-582
    must_include:
      - "record the battery bank identifier, date, observer, location, battery count as labeled"
      - "installed controller or monitor status, alarm messages"
      - "the owner or maintainer responsible for follow-up"
  - name: ventilation_and_red_flags_remain
    guide: GD-582
    must_include:
      - "Ensure battery enclosure has passive or active venting to outdoors"
      - "No smoking, sparks, or open flames near charging batteries"
      - "blocked ventilation, batteries in living space without safe venting"
review_status: pilot_reviewed
notes: >
  Reviewed closure for GD-582 as a monitoring/logging/owner-routing card only.
  It owns non-invasive condition inventory, red-flag recognition, log structure,
  ventilation and location checks, and handoff triggers. It deliberately
  excludes charging settings, balancing, revival, BMS wiring, cell
  configuration, chemistry-specific procedures, calculations, repair, bypassing
  protection, live electrical work, and safety certification.
