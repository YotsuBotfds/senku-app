runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  This card is strictly for prevention-only child-safe layout and supervision
  guidance on high-liability homestead hazards. It is not a medical dosing,
  trauma-treatment, legal process, weapon-security, or animal-handling card.
  Any active exposure, breathing danger, injury, severe bite, or near-drowning
  condition should route to urgent triage or emergency support with immediate
  transfer language.
