fallback_handoff_language:
  - This is outside routine teacher-coaching. Hand off to the correct safeguarding, medical, legal, trauma, or specialist education owner before continuing.
  - For suspected abuse, neglect, threats, coercion, or guardianship/legal concerns, route to child-protection and rights guidance instead of classroom-management advice.
  - For medical crisis, trauma treatment, severe injury, or clinical teaching protocols, route to medical or trauma owners and keep this card to teaching-process support only.
  - For possible disability or accommodation needs, describe observed learning barriers and safe teaching adjustments, then involve trained education or clinical specialists where available.
output_contract:
  requires:
    - context check before advice
    - a bounded lesson, pacing, assessment, feedback, or documentation action
    - explicit handoff when the prompt crosses diagnosis, legal, safeguarding, coercive discipline, medical, trauma, or credential-replacement boundaries
  forbid:
    - diagnosis of learning disabilities or medical/trauma conditions
    - child-protection/legal process instructions
    - coercive discipline or humiliation
    - replacing trained educators, safeguarding leads, clinicians, or specialists
  must_include_applicability_boundary: true
  must_include_urgent_handoff: true
