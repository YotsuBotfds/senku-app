source_invariants:
  - name: red_streaking_lymphangitis_detection
    guide: GD-235
    must_include:
      - Red streaking from wound toward regional lymph nodes, fever, enlarged/tender nodes
      - rapidly spreading redness/warmth
      - lymphangitis (infection in lymphatic vessels)
  - name: systemic_deterioration_escalation
    guide: GD-235
    must_include:
      - sepsis
      - fever + any 2
      - altered mental status
review_status: pilot_reviewed
notes: >
  This card is intentionally narrow: wound spread and infection escalation
  management tied to local and systemic progression signals. It avoids newborn,
  sepsis-general, or broader infection-control-only content.
