      - This is the reviewed answer-card surface for GD-860.
      - Use it only for non-diagnostic recovery-support intake
      - Do not use this reviewed card for diagnosis, therapy protocols, trauma processing, medication advice, forced treatment, restraint or coercion, risk clearance, legal, work, or parenting fitness claims, or safety certification.
  - name: aftercare monitoring supports routine trend checks
    guide: GD-860
    must_include:
      - "Use this regularly to assess recovery trajectory:"
      - "Improved? Stable? Nightmares reduced?"
      - "Eating regular meals? Weight stable?"
      - "Intervention needed. Do not assume person will self-report or reach out for help."
  - name: social connection and routine are core supports
    guide: GD-860
    must_include:
      - "Regular sleep/wake times, mealtimes, work, community participation."
      - "Increase time in group settings. Reduce isolation."
      - "Social isolation. Removing person from community or them withdrawing from community increases relapse risk."
