source_invariants:
  - name: visibility and closure boundary is explicit
    guide: GD-957
    must_include:
      - a play area is safe only when all four of these are true
      - if one of these fails, change the site or close the area
      - if you cannot supervise the area, it is not a play area
  - name: safe siting avoids roads, water, and work hazards
    guide: GD-957
    must_include:
      - put the play area where adults already spend time, not in a hidden corner
      - roads, driveways, cart paths, bicycle lanes, and vehicle loading spots
      - wells, tanks, ponds, ditches, irrigation channels
  - name: active emergency is not routine here
    guide: GD-957
    must_not_match:
      - (?i)no need to escalate
      - (?i)routine checklist.*serious
fallback_handoff_language:
  - This is no longer routine setup advice. Treat this as a safety escalation and route to child-safe urgent owners first.
  - For active water, drowning, severe injury, severe breathing issues, or major head-impact concerns, use the sibling drowning and trauma/medical urgent pathways first.
  - For suspected abuse or guardianship/safety-legal concerns, route to child-protection and rights guidance before continuing routine checklists.
  - For confirmed poison exposure or unknown ingestion concerns, route to the urgent ingestion/triage guidance lane immediately.
output_contract:
  requires_contract_items:
    - required_first_actions
    - urgent_red_flags
    - forbidden_advice
    - first_actions
  must_include_urgent_handoff: true
  forbid: true
runtime_citation_policy: reviewed_source_family
review_status: pilot_reviewed
notes: >
  This card is strict routine prevention for low-resource home and shared-yard play
  spaces: siting, surveillance, surfacing, low-cost equipment checks, daily inspection,
  and closure criteria. It intentionally avoids clinical treatment, rescue, legal
  reporting workflows, and construction engineering detail, and it hands off to the
  sibling urgent owners when active danger is present.
