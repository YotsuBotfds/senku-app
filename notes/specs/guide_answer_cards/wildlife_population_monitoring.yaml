card_id: wildlife_population_monitoring
guide_id: GD-663
slug: wildlife-population-management
title: Wildlife Population Management
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user asks how to observe wildlife numbers, signs, movement, habitat condition, or trends without handling animals.
  - A user wants a low-resource plan for track counts, game-trail monitoring, feeding-sign notes, scat surveys, or direct observation from a safe distance.
  - A user asks how to keep wildlife records, compare counts over time, or plan non-invasive livestock, garden, or settlement conflict prevention.
required_first_actions:
  - Keep the plan observational and non-invasive: choose safe viewpoints or routes, do not approach animals, dens, nests, young, carcasses, or conflict animals.
  - Record the same core fields every time: date, location or route, species or sign type, count, freshness or confidence, weather, habitat condition, and observer notes.
  - Repeat the same survey method on a predictable schedule so the answer reports trends instead of treating one count as a population fact.
  - Treat any hunting, trapping, poisoning, capture, relocation, lethal-control, legal-permit, disease-diagnosis, or dangerous-animal-approach request as outside this card and hand off.
conditional_required_actions:
  - trigger_terms:
      - tracks
      - track count
      - sign survey
      - trail
      - game trail
      - scat
      - feces
      - feeding sign
    required_actions:
      - Use a repeatable route or fixed plots, count only signs that can be identified with reasonable confidence, note freshness and weather effects, and compare against previous surveys rather than converting a single sign count into a precise population estimate.
  - trigger_terms:
      - livestock
      - goats
      - sheep
      - chickens
      - garden
      - crops
      - conflict
      - predator
    required_actions:
      - Keep prevention non-invasive: map where sign appears, improve nighttime corralling or barriers, use supervised routines or guard animals where already appropriate, remove attractants, and route active attacks or dangerous animals to local wildlife or emergency authorities.
  - trigger_terms:
      - sick
      - diseased
      - rabies
      - foaming
      - carcass
      - dead animal
      - abnormal behavior
    required_actions:
      - Do not diagnose or handle the animal or carcass; keep people and domestic animals away, record location and observations from a distance, and hand off to wildlife, veterinary, public-health, or emergency authorities.
first_actions:
  - Define the question first: presence/absence, relative abundance, seasonal movement, habitat pressure, or conflict-prevention planning.
  - Pick one or two low-disturbance methods that fit the terrain, such as fixed track pads, the same game-trail route, marked scat plots, feeding-sign notes, or dawn/dusk observation from a safe vantage point.
  - Use the same route, plot size, time window, and observer notes each round so month-to-month comparisons are meaningful.
  - Record habitat notes alongside counts: water availability, cover, food sign, browsing pressure, trail condition, weather, recent disturbance, and obvious barriers or attractants.
  - Summarize results as trends such as increasing, stable, decreasing, uncertain, or seasonally shifted; call out confidence limits when weather, visibility, or identification is weak.
  - For conflict prevention, use observation logs to plan non-invasive steps such as safer storage of attractants, nighttime livestock corralling, supervised routines, barrier checks, and handoff points.
urgent_red_flags:
  - The prompt asks how to hunt, trap, snare, poison, shoot, dispatch, relocate, capture, handle, or remove wildlife.
  - A dangerous animal is nearby, approaching people, entering shelter, attacking livestock, guarding young, feeding on a carcass, or acting abnormally.
  - A prompt asks whether an animal has a disease, whether meat is safe, whether a carcass can be handled, or how to manage suspected rabies or other zoonotic risk.
  - A prompt asks for legal season, bag limit, permit, protected-species, nuisance-wildlife, or enforcement claims.
  - A prompt asks for guaranteed ecosystem restoration, predator introduction/removal, corridor alteration, den removal, habitat burning, or other ecosystem manipulation as an assured outcome.
forbidden_advice:
  - Do not provide hunting quotas, harvest rates, season timing, bag limits, sex/age selection, weapon choices, trapping, snaring, poisoning, baiting, or dispatch instructions.
  - Do not advise capture, relocation, den disturbance, handling young, handling carcasses, approaching predators, approaching large animals, or entering active conflict scenes.
  - Do not diagnose animal disease, declare meat safe, or provide veterinary/public-health determinations.
  - Do not make legal permit, protected-species, enforcement, or compliance claims.
  - Do not promise that habitat changes, predator changes, corridor work, deterrents, or conflict-prevention steps will produce guaranteed ecosystem outcomes.
do_not:
  - Do not turn GD-663's harvest, hunting, regulation, or lethal-control sections into answer-card advice.
  - Do not infer exact population size from one track, scat, trail, feeding-sign, or observation count.
  - Do not tell users to approach wildlife for identification, photography, rescue, conflict resolution, or inspection.
  - Do not treat non-invasive deterrence planning as a substitute for local wildlife, veterinary, public-health, or emergency handoff when animals are dangerous, sick, trapped, injured, or actively attacking.
routine_boundary: >
  This card is for wildlife observation, relative counts, habitat notes, trend
  monitoring, non-invasive conflict-prevention planning, and handoffs. If the
  prompt asks for hunting, trapping, poisoning, capture, relocation, lethal
  control, legal permit claims, disease diagnosis, dangerous animal approach,
  or ecosystem manipulation guarantees, give the boundary and route to the
  appropriate local authority or specialist owner instead of answering from
  GD-663.
acceptable_uncertain_fit: >
  If the species, location, or goal is unclear but the prompt sounds like
  monitoring, answer with a conservative observation plan: define the question,
  choose fixed routes or plots, record date/location/sign/weather/habitat
  fields, repeat on a schedule, summarize only trends and uncertainty, and
  include handoffs for dangerous animals, disease concerns, legal issues, or
  control requests.
clarifying_questions:
  - What species or signs are you trying to monitor, and is the goal presence, trend, habitat pressure, or conflict prevention?
  - What area, routes, viewpoints, plots, season, time of day, and observer capacity are available?
  - Are there any active safety concerns such as a dangerous animal nearby, livestock attacks, sick behavior, carcasses, dens, nests, or young?
  - Do you need only observation records, or are you asking for control, capture, relocation, legal, disease, or hunting decisions that require a handoff?
