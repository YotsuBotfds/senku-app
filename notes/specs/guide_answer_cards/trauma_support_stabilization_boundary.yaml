source_invariants:
  - name: trauma support card stays boundary-only
    guide: GD-578
    must_include:
      - Use it only for boundary-level trauma-support intake, grounding, stabilizing environment basics, practical support, sleep and social support planning, red-flag recognition, and crisis or clinician handoff.
      - If any of those are present, treat the situation as crisis, emergency, or clinician handoff first.
      - Do not use this reviewed card for PTSD diagnosis, trauma-processing instructions, exposure therapy, EMDR or other protocol therapy, medication or dosing, forced disclosure, coercive restraint, legal or fitness claims, or safety certification.
  - name: acute support avoids forced disclosure
    guide: GD-578
    must_include:
      - Be physically safe (away from ongoing danger)
      - Stay present (trauma survivors need companionship)
      - Avoid pressuring them to talk (only if they want to)
      - Force them to recount trauma (re-traumatizing)
  - name: grounding and professional help boundaries exist
    guide: GD-578
    must_include:
      - 5-4-3-2-1 technique
      - Physical grounding (feet on ground, touching cold object)
      - Risk of self-harm
      - Substance use is increasing
review_status: pilot_reviewed
notes: >
  Pilot-reviewed GD-578 card for boundary-only trauma-support stabilization.
  It intentionally excludes PTSD diagnosis, trauma processing, exposure/EMDR
  or other protocol therapy, medication/dosing, forced disclosure, coercive
  restraint, legal/fitness claims, and safety certification. The source guide
  contains broader therapy and diagnosis discussion; this card cites only the
  immediate support, grounding, helper, and handoff surfaces.
