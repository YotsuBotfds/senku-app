source_invariants:
  - name: GD-399 reviewed card stays boundary-only
    guide: GD-399
    must_include:
      - "This is the reviewed answer-card surface for GD-399."
      - "boundary-level emergency eye intake and handoff"
      - "Do not use this reviewed card for diagnosis"
      - "foreign-body removal, contact lens fitting, vision clearance"
      - "legal claims, or safety certification"
  - name: chemical eye exposure keeps immediate flush and handoff
    guide: GD-399
    must_include:
      - "For any chemical splash in the eye, the first action is irrigation"
      - "flush immediately with running water or saline"
      - "arrange urgent evaluation/Poison Control guidance"
      - "Do not neutralize with vinegar, baking soda, milk, eye drops, or other chemicals"
    must_not_match:
      - "chemical[^\\n]{0,160}(wait|delay|neutralize|eye drops first|routine pink eye)"
  - name: embedded object keeps no removal no flush no pressure
    guide: GD-399
    must_include:
      - "Do NOT flush, rub, press on the eye, apply direct pressure, or attempt removal"
      - "Shield the injured eye with a rigid cup or loose cover with no pressure"
      - "Seek urgent eye evaluation/evacuation"
      - "No flushing or pressure"
    must_not_match:
      - "(embedded|poking out|penetrating|high-speed)[^\\n]{0,180}(safe to remove|okay to remove|try to remove|swab it out|rinse it out|flush it out|pull it out)"
  - name: condition-specific owners remain protected
    guide: GD-399
    must_include:
      - "Route routine pink-eye or mild irritation to the routine eye-care owner"
      - "routine vision correction and contact-lens fitting to optometry"
      - "retinal detachment patterns to the specific retinal/emergency vision-loss"
      - "broad chemical-exposure or poisoning questions to toxicology"
