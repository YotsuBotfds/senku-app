source_invariants:
  - name: routine dental hygiene boundary remains red-flag first
    guide: GD-939
    must_include:
      - Do not stay in this guide if the complaint is really pain, swelling, injury, infection, or poisoning exposure.
      - If swelling, fever, pus, trouble swallowing, trouble breathing, or rapidly worsening pain appears, stop preventive care and move to `emergency-dental`.
      - Preventive care stops working when the problem has become an infection, injury, or serious inflammation.
    must_not_match:
      - "swelling[^\\n]{0,160}(keep|continue|stay)[^\\n]{0,80}(preventive|hygiene|routine)"
  - name: limited-tool cleaning remains gentle and non-abrasive
    guide: GD-939
    must_include:
      - Use a clean soft cloth wrapped around a finger.
      - Use water to loosen debris first.
      - Do not scrub with ash, sand, or gritty powders.
      - Do not use metal picks or hard objects on the teeth.
  - name: mild tooth pain route does not become procedure or dosing owner
    guide: GD-939
    must_include:
      - Move from preventive care to `emergency-dental` if the pain becomes constant, gets worse each day, wakes you from sleep, comes with swelling, fever, pus, trouble opening the mouth, or pain when biting that is getting stronger.
      - Use over-the-counter pain medicine only if it is normally safe for you and you can follow the label.
    must_not_match:
      - "(ibuprofen|acetaminophen|paracetamol)[^\\n]{0,80}\\b\\d+\\s*(mg|milligram)"
  - name: appliance guidance stays hygiene only
    guide: GD-939
    must_include:
      - Any removable appliance can collect bacteria, fungus, and food debris. Clean it every day.
      - Take the appliance out, clean it, and inspect the mouth.
      - A sore that does not improve, bleeds, or looks infected needs medical or dental attention.
review_status: pilot_reviewed
notes: >
  Reviewed boundary card for GD-939. It supports routine oral hygiene intake,
  brushing/flossing/rinsing planning, limited-tool and safe-water notes, and
  red-flag dental or medical handoff only. It intentionally excludes diagnosis,
  dental procedures, extraction, drilling, filling, antibiotics, pain-medication
  dosing, abscess treatment, pediatric fluoride dosing, appliance fabrication
  or adjustment, airway emergency management, legal or fitness claims, and
  safety certification.
