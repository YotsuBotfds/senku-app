source_invariants:
  - name: seizure first aid and status threshold
    guide: GD-900
    must_include:
      - Start timing immediately.
      - Do not restrain the limbs.
      - Do not put anything in the mouth.
      - a seizure lasts **more than 5 minutes**
      - repeated seizures occur **without return to normal awareness between them**
    must_not_match:
      - "Midazolam\\*\\* [0-9]"
      - "Diazepam\\*\\* [0-9]"
      - "Lorazepam\\*\\* [0-9]"
  - name: medication boundary is not a dosing protocol
    guide: GD-900
    must_include:
      - This guide is not a benzodiazepine dosing protocol.
      - do **not** improvise IV drugs or stack random sedatives
      - trained, equipped responders following an approved protocol
    must_not_match:
      - "common adult field options"
      - "[0-9]+\\s*mg"
review_status: pilot_reviewed
notes: >
  Reviewed bounded answer card for GD-900. The card preserves seizure first aid,
  the >5 minute or repeated-without-recovery status threshold, recovery-side
  positioning, and emergency escalation red flags. It intentionally excludes
  benzodiazepine dosing and any medication protocol beyond trained, equipped,
  protocol-approved responders.
