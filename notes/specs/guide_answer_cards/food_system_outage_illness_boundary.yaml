source_invariants:
  - name: food-system continuity through safe stored and preserved sources
    guide: GD-634
    must_include:
      - Use this guide for community food-system continuity after bad weather or short shelf-life disruption
      - Production is worthless if food spoils before you eat it.
      - Having food and having *complete nutrition* are different.
      - Grains (intact seeds)
  - name: emergency rationing protects vulnerable people
    guide: GD-591
    must_include:
      - Do NOT reduce rations for infants or young children
      - Daily Inventory Ledger
      - pregnant women
  - name: food safety before scarcity shortcuts
    guide: GD-666
    must_include:
      - Food in the 40°F–140°F zone
      - In survival, when in doubt, discard if you have alternatives.
      - isolate sick persons
      - Do not use tasting to rescue suspect food.
  - name: hygiene breaks food and contact transmission
    guide: GD-732
    must_include:
      - before preparing or eating food
      - after using the toilet or latrine
      - prioritize the moments with highest disease transmission risk
