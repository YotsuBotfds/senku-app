notes: >
  Primary owner is GD-634 because the prompt asks how a neighborhood food
  system keeps people fed under short-shelf-life disruption. GD-591 supports
  fair rationing and priority allocation after unsafe food is removed. GD-666
  and GD-732 are required safety boundaries for foodborne illness prevention,
  temperature-abused food, and hand hygiene. GD-961 is source-family support
  for group food-flow controls without broadening the separate
  community_kitchen_illness_control card.
