source_invariants:
  - name: danger zone and discard boundary
    guide: GD-666
    must_include:
      - "Food in the 40°F–140°F zone"
      - "After 2 hours"
      - "Discard, even if it looks fine"
      - "Cool from 140°F to 70°F in under 2 hours"
    must_not_match:
      - "serve[^\\n]{0,120}danger zone[^\\n]{0,120}(scarce|shortage|ration)"
  - name: raw meat and handwashing separation
    guide: GD-666
    must_include:
      - "Raw meat juice must never touch ready-to-eat foods"
      - "After using the latrine"
      - "After handling raw meat or fish"
      - "Between handling raw and ready-to-eat foods"
  - name: safe water and no taste testing
    guide: GD-666
    must_include:
      - "Water used to wash vegetables, clean utensils, or prepare food must be as safe as drinking water."
      - "Do not taste-test food that smells off"
      - "Do not use tasting to rescue suspect food."
      - "Mold on the jam, around the lid or rim, or as a surface film means discard the whole jar."
  - name: illness escalation and isolation
    guide: GD-666
    must_include:
      - "Serious warning signs"
      - "Neurological symptoms"
      - "Signs of severe dehydration"
      - "Separate the sick person from food preparation areas"
