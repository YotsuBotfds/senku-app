card_id: microgrid_design_distribution_planning
guide_id: GD-471
slug: microgrid-design-distribution
title: Micro-Grid Design & Distribution
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - A community is scoping a stand-alone or grid-tied microgrid before detailed electrical design.
  - The prompt asks how to group loads, rank critical services, define resilience goals, track outages, assign ownership, or plan expansion priorities.
  - The user needs planning and routing language for a shared power system without wiring diagrams, protection coordination, breaker or fuse sizing, grounding, inverter hookups, interconnection, live work, construction engineering, legal/code claims, or safety certification.
required_first_actions:
  - Keep the answer at planning and governance-routing level: identify loads, resilience goals, owners, records, expansion priorities, and handoffs before any technical design.
  - Group loads into essential, productive, household-basic, discretionary, and standby categories before discussing capacity or priority.
  - Name the desired outage tolerance and resilience target for critical services such as clinic, water pumping, cold storage, communications, and lighting.
  - Assign ownership for policy decisions, daily operation, outage logging, maintenance coordination, expansion requests, and safety escalation.
  - Identify handoffs early for wiring diagrams, protection coordination, breaker or fuse sizing, grounding, inverter hookups, interconnection, live work, construction engineering, legal/code claims, and safety certification.
conditional_required_actions:
  - trigger_terms:
      - load
      - demand
      - clinic
      - water pump
      - cold storage
      - refrigeration
      - communications
      - workshop
      - school
    required_actions:
      - Start with a load inventory and group each load by essential, productive, household-basic, discretionary, or standby priority; do not jump into conductor, breaker, inverter, or protection sizing.
  - trigger_terms:
      - outage
      - reliability
      - resilience
      - autonomy
      - blackstart
      - failover
      - backup
    required_actions:
      - State the resilience goal in plain operational terms, keep outage and recovery logs, and route blackstart/failover implementation details to qualified technical owners.
  - trigger_terms:
      - expand
      - expansion
      - new connection
      - new workshop
      - add homes
      - population growth
      - seasonal demand
    required_actions:
      - Rank expansion requests against critical-service priority, recorded demand growth, seasonal peaks, and maintenance capacity before any construction or equipment recommendation.
  - trigger_terms:
      - wire
      - breaker
      - fuse
      - grounding
      - inverter
      - interconnection
      - code
      - permit
      - live
    required_actions:
      - Boundary out of the reviewed card; provide only planning context and hand off to qualified electrical, utility, legal/code, construction, or safety owners.
first_actions:
  - Build a plain load inventory covering homes, clinic, water pumping, cold storage, communications, workshops, schools, and standby loads.
  - Group loads by priority tier and record expected daily hours, seasonal changes, and whether the load is deferrable, interruptible, or critical.
  - Set resilience goals for each priority tier, including acceptable outage duration, minimum service level, and escalation trigger.
  - Define records for outage events, load shedding, maintenance actions, operator decisions, fuel or storage constraints, and unmet expansion requests.
  - Assign roles for owner/council decisions, day-to-day operator work, logkeeping, maintenance coordination, technical escalation, and community review.
  - Review expansion priorities against critical-service protection, documented demand growth, seasonal demand, and available maintenance capacity.
  - Route all construction, wiring, protection, grounding, inverter, interconnection, live-work, legal/code, and certification questions away from the reviewed card.
urgent_red_flags:
  - Active shock, fire, arc, damaged energized equipment, battery overheating, generator exhaust hazard, or unsafe live work.
  - Requests for wiring diagrams, conductor routes, breaker or fuse selection, grounding design, inverter hookup, protection coordination, or energized troubleshooting.
  - Requests for utility interconnection approval, legal/code compliance claims, permit conclusions, safety certification, or inspection signoff.
  - Attempts to add new loads or users during instability without outage logs, priority rules, operator ownership, or technical review.
  - Life-safety loads such as clinic, water, refrigeration, communications, or emergency lighting are repeatedly losing power without a documented escalation plan.
forbidden_advice:
  - Do not provide wiring diagrams, conductor sizing, breaker or fuse sizing, protection coordination, grounding design, inverter hookup, grid interconnection, live-work steps, lockout/tagout procedure, or construction engineering.
  - Do not make legal, regulatory, electrical-code, permit, utility-approval, inspection, compliance, or safety-certification claims.
  - Do not provide equipment installation instructions or tell the user a design is safe to build.
  - Do not replace qualified electrical engineering, utility interconnection review, construction supervision, legal review, or safety certification.
  - Do not route scarcity or expansion decisions directly to equipment changes before load grouping, outage logs, ownership, and priority review.
do_not:
  - Do not answer technical power-system construction questions from this card.
  - Do not turn planning priorities into a wiring plan, protection scheme, or certified design.
  - Do not ignore ownership: every resilience goal, outage log, and expansion decision needs a named responsible role.
  - Do not promise uptime, safety, compliance, cost, or performance outcomes.
  - Do not use this card as the owner for community billing, tariff enforcement, legal disputes, or investment advice.
routine_boundary: >
  This card covers planning-level microgrid design and distribution scoping only:
  load grouping, critical-service priorities, resilience goals, ownership roles,
  outage and maintenance logs, expansion priority review, and safety handoffs. It
  exits immediately for wiring diagrams, protection coordination, breaker or fuse
  sizing, grounding, inverter hookups, interconnection, live work, construction
  engineering, legal/code claims, safety certification, equipment installation,
  and active electrical hazards.
acceptable_uncertain_fit: >
  If the prompt might be about microgrid planning but lacks detail, answer with a
  conservative scoping checklist: list loads, group them by priority, define
  resilience goals, assign ownership, set outage and maintenance logs, rank
  expansion requests, and name the technical or legal/safety handoffs before any
  operational recommendation.
clarifying_questions:
  - Which loads must the microgrid serve now: homes, clinic, water, cold storage, communications, workshops, schools, or standby loads?
  - Which loads are essential, productive, household-basic, discretionary, or standby, and which can be delayed or shed?
  - What outage tolerance or minimum service level is required for each critical load?
  - Who owns policy decisions, daily operation, outage logs, maintenance coordination, technical escalation, and expansion approval?
  - Is the question about planning and routing, or does it require handoff for wiring, protection, grounding, inverter hookup, interconnection, legal/code, construction, or certification work?
