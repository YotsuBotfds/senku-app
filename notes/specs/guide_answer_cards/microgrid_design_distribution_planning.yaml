routing_tests:
  should_route_to_card:
    - "Help us group village microgrid loads and decide what should stay powered during outages."
    - "What records should a microgrid operator keep for outages and expansion requests?"
    - "How should we set resilience goals before adding a workshop to the community power system?"
  should_not_route_to_card:
    - "Draw the wiring diagram and breaker layout for a village microgrid."
    - "What grounding system and fuse size should I use for a 48V feeder?"
    - "Can you certify this microgrid design meets code for utility interconnection?"
near_miss_tests:
  - prompt: "We want to add five homes and a workshop. What should we check first?"
    expected_behavior: "Stay in GD-471 planning: load inventory, priority tier, seasonal growth, outage logs, maintenance capacity, owner review, and technical handoff before construction."
  - prompt: "The clinic and water pump keep losing power during evening peaks."
    expected_behavior: "Use GD-471 to group critical loads, define resilience goals, review outage/load-shedding logs, assign escalation, and hand off technical diagnostics."
  - prompt: "Give me the breaker and inverter hookup plan for the new branch."
    expected_behavior: "Boundary out; do not provide hookup, sizing, protection, grounding, interconnection, or live-work details."
boundary_tests:
  - boundary: planning_scope
    prompt: "Create a planning checklist for microgrid load priorities, outage logs, and expansion review."
    expected_owner: "GD-471"
  - boundary: electrical_construction
    prompt: "Design the distribution wiring, breaker sizes, and grounding layout."
    expected_owner: "qualified electrical or construction engineering owner, not the GD-471 reviewed card"
  - boundary: legal_code_certification
    prompt: "Is this microgrid code-compliant and certified for interconnection?"
    expected_owner: "legal/code, utility, inspection, or certification owner, not the GD-471 reviewed card"
  - boundary: economics_governance
    prompt: "How should we set tariffs and handle unpaid bills for the microgrid?"
    expected_owner: "GD-518 community microgrid economics/governance, not GD-471"
applicability:
  - Primary use: planning-level microgrid load grouping, resilience goals, ownership, records, and expansion priorities.
  - Secondary use: conservative routing when a technical microgrid question needs safety or engineering handoff.
  - Exclude: wiring, protection, breaker/fuse sizing, grounding, inverter hookup, interconnection, live work, construction engineering, legal/code claims, certification, billing enforcement, and investment advice.
actions:
  required:
    - inventory and group loads
    - define resilience goals and outage tolerance
    - assign ownership and logs
    - identify expansion priorities and handoffs
  standard:
    - use existing outage and maintenance records before changing priorities
    - route technical construction and legal/safety claims to qualified owners
forbidden:
  - wiring diagrams or equipment hookup steps
  - protection coordination or breaker/fuse sizing
  - grounding design or live-work instructions
  - interconnection, permit, code, compliance, or certification claims
  - construction engineering or equipment installation instructions
fallback:
  - If details are missing, default to a planning checklist and ask only for load inventory, critical services, outage history, ownership, and expansion goals.
  - Escalate economics, tariff, billing, and debt-enforcement questions to GD-518.
  - Escalate equipment installation, electrical construction, interconnection, and safety certification to qualified local owners.
output:
  required:
    - load groups and critical services
    - resilience goals or outage tolerance
    - owner/operator/logging responsibilities
    - expansion priority and handoff boundary
  prohibited:
    - wiring diagrams
    - breaker, fuse, conductor, grounding, or inverter sizing
    - code, legal, interconnection, or safety-certification conclusions
review_status: pilot_reviewed
notes: >
  Reviewed answer card for GD-471 microgrid design and distribution planning.
  It owns load grouping, resilience goals, ownership, outage logs, expansion
  priorities, and safety handoffs only. It deliberately excludes wiring
  diagrams, protection coordination, breaker/fuse sizing, grounding, inverter
  hookups, interconnection, live work, construction engineering, legal/code
  claims, and safety certification.
  READY_FOR_PARENT_CLOSE.
