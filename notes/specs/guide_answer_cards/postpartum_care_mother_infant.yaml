card_id: postpartum_care_mother_infant
guide_id: GD-492
slug: postpartum-care-mother-infant
title: "Postpartum Care — Mother & Infant"
risk_tier: critical
evidence_owner: guide-corpus
applies_when:
  - Mother and newborn need postpartum monitoring in the first hours, days, or weeks after delivery.
  - Prompt mentions postpartum bleeding, fundal firmness, lochia, maternal fever, infection signs, breastfeeding difficulty, newborn first assessment, jaundice, umbilical cord care, or newborn danger signs.
  - Caregiver asks whether maternal postpartum symptoms or newborn symptoms after birth are routine or need urgent evaluation.
required_first_actions:
  - Separate mother and newborn assessment; check maternal bleeding, fundal firmness, vital signs, and infection signs while also checking infant breathing, temperature, feeding, color, alertness, urine/stool output, jaundice, and umbilical cord.
  - Treat heavy postpartum bleeding, shock signs, maternal infection red flags, newborn breathing trouble, abnormal temperature, poor feeding, cyanosis, seizure, extreme lethargy, severe jaundice signs, or umbilical infection signs as requiring urgent medical evaluation or evacuation.
  - Keep the infant warm with skin-to-skin contact or dry covering while arranging help when newborn danger signs are present.
conditional_required_actions:
  - trigger_terms:
      - bleeding
      - hemorrhage
      - lochia
      - clot
      - fundus
      - boggy
      - dizzy
      - pale
      - rapid pulse
    required_actions:
      - Assess bleeding volume, clots, fundal tone, bladder fullness, and maternal shock signs.
      - If heavy bleeding, soft or rising fundus, sudden gush, plum-sized or larger clots, or shock/anemia signs are present, perform uterine massage if trained, ensure the bladder is empty, and arrange urgent evaluation or evacuation.
  - trigger_terms:
      - fever
      - foul smell
      - infection
      - abdominal pain
      - wound
      - breast redness
      - calf pain
      - confusion
    required_actions:
      - Assess temperature, pulse, respiratory rate, lochia odor, uterine or abdominal tenderness, perineal or incision wound, breast symptoms, calf symptoms, and mental status.
      - Seek urgent medical evaluation for the maternal infection red flags listed in the source guide.
  - trigger_terms:
      - newborn
      - baby
      - infant
      - breathing
      - grunting
      - blue
      - feeding
      - lethargic
      - seizure
      - temperature
      - umbilical
      - jaundice
    required_actions:
      - Check respiratory rate and work of breathing, color, capillary refill, heart rate if available, feeding ability, hydration, temperature, alertness, umbilical stump, abdomen, urine/stool output, and jaundice spread.
      - For newborn danger signs, keep the infant warm and do not delay urgent medical evaluation while trying home remedies.
first_actions:
  - In the first 2 hours, check that the maternal fundus is firm and at or below the umbilicus; reassess frequently and respond to a soft or boggy fundus with source-guide fundal massage if trained.
  - Estimate postpartum blood loss from soaked pads or cloths when possible, and compare bleeding against the guide's lochia expectations and red flags.
  - Encourage immediate skin-to-skin contact for at least 1 hour when mother and infant are stable, and offer breast within 30 minutes if the mother is alert and willing.
  - Dry the newborn thoroughly, keep the infant against the mother's skin with the head covered, and count respirations when breathing concern is present.
  - Support breastfeeding by checking position, latch, audible swallowing, feeding frequency, wet diapers, stooling, and infant weight trend where available.
  - Inspect the umbilical cord daily and keep it clean, dry, and exposed to air unless the source-guide infection-risk situation calls for antiseptic care.
  - Screen postpartum mental health at visits and treat thoughts of self-harm, infant harm, inability to care for the infant, postpartum psychosis symptoms, or severe anxiety/panic as immediate-help situations.
urgent_red_flags:
  - Maternal fundus is soft, boggy, displaced upward, or rises after previously contracting.
  - Soaking more than one pad per 15 minutes in the first 2 hours, heavy bleeding over one pad per hour for more than 2 hours later, bright red continuous flow, sudden gush, or clots larger than a plum.
  - Maternal dizziness, rapid pulse over 110, cold skin, confusion, shortness of breath, palpitations, extreme fatigue, or pale mucous membranes.
  - Maternal temperature over 38.5 C once, over 38 C on two readings 4 or more hours apart, foul-smelling lochia, abdominal pain beyond mild cramping, wound pus/opening/redness/warmth/swelling, breast redness or abscess signs, calf pain/swelling/warmth, severe headache, visual changes, confusion, persistent tachypnea, lethargy, or unresponsiveness.
  - Newborn respiratory rate over 60 at rest or under 30, grunting, nasal flaring, retractions, apnea over 15 seconds, weak or absent cry, cyanosis not resolving with drying and warming, pallor, persistent mottling, capillary refill over 3 seconds, weak or absent pulses, heart rate over 160 or under 120, refusal or inability to feed, projectile vomiting, excessive drowsiness, seizures, weak cry, temperature under 36 C or over 38.5 C, umbilical pus/foul odor/redness/swelling, abdominal distention or hardness, no stool in the first 24 hours, no urine in the first 48 hours, extreme lethargy, high-pitched cry, or poor response to stimulation.
  - Jaundice in the first 24 hours, jaundice extending below knees or elbows or to palms/soles, or jaundice with poor feeding, lethargy, fever, abnormal tone, arching, high-pitched cry, or seizures.
forbidden_advice:
  - Do not frame heavy postpartum bleeding, shock signs, maternal infection red flags, postpartum psychosis symptoms, newborn danger signs, severe jaundice signs, or umbilical infection signs as routine recovery.
  - Do not delay urgent evaluation or evacuation while trying home remedies when the source guide lists a danger sign.
  - Do not add neonatal or maternal treatments, emergency thresholds, dosing, or diagnosis rules beyond the source guide.
  - Do not advise aggressive cord traction before placental separation.
  - Do not advise applying substances to a clean umbilical cord stump as routine care.
do_not:
  - Do not reassure postpartum fever, foul lochia, severe abdominal pain, maternal confusion, or persistent tachycardia/tachypnea as normal postpartum changes.
  - Do not treat newborn fever, hypothermia, breathing trouble, cyanosis, poor feeding, seizure, extreme lethargy, or severe jaundice signs as watchful waiting.
  - Do not stop at breastfeeding technique advice when infant weak suck, respiratory distress, lethargy, difficulty swallowing, or not feeding is present.
  - Do not use routine jaundice reassurance for jaundice in the first 24 hours or jaundice spreading to severe visual zones.
routine_boundary: >
  Routine postpartum recovery, breastfeeding support, lochia education, cord
  care, and newborn observation are out of bounds when maternal hemorrhage,
  shock, infection, mental-health emergency signs, newborn danger signs,
  severe jaundice signs, or umbilical infection signs are present.
acceptable_uncertain_fit: >
  If the prompt is plausibly postpartum but timing, vital signs, bleeding amount,
  temperature, feeding, urine/stool output, breathing status, or jaundice extent
  are missing, ask targeted questions while preserving urgent escalation for any
  stated maternal or newborn danger sign.
clarifying_questions:
  - How many hours or days postpartum is the mother, and how much bleeding is there now?
  - Is the mother's fundus firm or soft, and are there dizziness, rapid pulse, cold skin, confusion, fever, foul lochia, severe pain, wound changes, or calf symptoms?
  - How old is the baby in hours or days, and is breathing normal without grunting, retractions, blue color, apnea, or abnormal respiratory rate?
  - Is the baby feeding normally, waking normally, making urine and stool, maintaining temperature, and free of seizures or unusual weak/high-pitched cry?
  - Is jaundice present, where has the yellow color spread, and are the umbilical stump and surrounding skin dry without pus, foul odor, swelling, or spreading redness?
