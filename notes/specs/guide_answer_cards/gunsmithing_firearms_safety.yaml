source_invariants:
  - name: legal_existing_firearms_only
    guide: GD-133
    must_include:
      - Manufacturing firearms requires a Federal Firearms License (FFL) from the ATF.
      - This guide is intended as a reference for legal repair and maintenance of existing licensed firearms only.
      - Unauthorized manufacture of firearms is a federal crime.
  - name: unloaded_safe_direction_functional_checks
    guide: GD-133
    must_include:
      - Perform these tests on an **completely unloaded** firearm in a safe direction
      - Failed safety = firearm is unsafe to use.
      - All functional tests must be performed with firearm UNLOADED and pointed in safe direction.
      - Treat every firearm as if it will discharge.
  - name: storage_corrosion_ammunition_separation
    guide: GD-133
    must_include:
      - Proper storage is critical for preserving firearms across decades or centuries.
      - Visible corrosion on cases = discard.
      - "Ammunition storage: cool/dry location, separate from firearms"
      - "Ammunition storage:** Separate from firearm; stored in locked container"
  - name: headspace_unknown_chamber_do_not_fire
    guide: GD-133
    must_include:
      - Excessive headspace is dangerous (can cause case rupture and injury).
      - Always verify headspace with proper gauges before shooting unfamiliar firearms.
      - If uncertain, do not fire.
      - Chamber dimensions unknown
  - name: condemn_structural_red_flags
    guide: GD-133
    must_include:
      - Cracked receiver/action
      - Bulged or dented barrel
      - Deep corrosion (severe)
      - condemn the firearm (store unloaded and locked, clearly labeled "UNSAFE")
