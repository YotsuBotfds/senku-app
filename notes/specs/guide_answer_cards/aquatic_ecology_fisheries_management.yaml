card_id: aquatic_ecology_fisheries_management
guide_id: GD-710
slug: aquatic-ecology-fisheries
title: Aquatic Ecology and Fisheries Management
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A user asks for a freshwater stream, river, pond, lake, or wetland monitoring plan for fish habitat, aquatic ecology, or fisheries management.
  - A user asks how to observe water quality, biological indicators, habitat condition, fish community health, catch trends, harvest pressure, or plant coverage without invasive intervention.
  - A user needs a stocking, harvest, restoration, or invasive-species decision framed as a documented handoff rather than a chemical, engineering, legal, food-safety, or emergency cleanup protocol.
required_first_actions:
  - Start with observation and records: identify the water body, season, weather, recent disturbance, visible hazards, water level, flow, clarity, odor, algae, plant coverage, bank condition, and fish or invertebrate observations.
  - Keep the plan non-invasive unless a qualified local authority or fisheries specialist has reviewed the site-specific decision.
  - Use repeated measurements and trend logs before recommending stocking, harvest changes, vegetation removal, or other management actions.
  - Hand off chemical treatment, fish-kill cleanup, dam or pond engineering, invasive releases, legal permits, food safety, medical illness, and hazardous-water entry instead of answering them from this card.
conditional_required_actions:
  - trigger_terms:
      - fish kill
      - dead fish
      - die off
      - fish dying
      - massive die-off
      - toxin spill
      - spill
      - sewage
    required_actions:
      - Treat fish kills, suspected spills, sewage contamination, or sudden die-offs as an escalation and reporting problem; do not give cleanup, food-use, medical, chemical, or hazardous-water-entry instructions from this card.
  - trigger_terms:
      - stock
      - stocking
      - fingerling
      - restock
      - hatchery
      - introduce fish
    required_actions:
      - Before stocking, require habitat suitability, water-quality observation, existing fish-community assessment, species compatibility, crowding risk, and local fisheries/legal handoff; do not provide a site-specific release order.
  - trigger_terms:
      - invasive
      - non-native
      - carp
      - tilapia
      - snakehead
      - zebra mussel
      - water hyacinth
      - purple loosestrife
      - milfoil
    required_actions:
      - Emphasize prevention, detection, reporting, gear cleaning, and containment planning; do not recommend releasing natural enemies, bait fish, aquarium fish, or other organisms.
  - trigger_terms:
      - harvest
      - catch limit
      - overfishing
      - size limit
      - spawning
      - quota
    required_actions:
      - Frame harvest decisions around catch records, size/age structure, recruitment signs, spawning protection, local management rules, and conservative reduction when trends decline.
first_actions:
  - Build a monitoring log with date, location, weather, water level, current or still-water condition, water temperature if available, clarity or turbidity, pH strips if available, dissolved-oxygen observation or meter readings if available, odor, algae, vegetation cover, and visible pollution sources.
  - Record biological indicators: macroinvertebrate groups, rough percentage of sensitive taxa such as mayflies, stoneflies, and caddisflies, fish species present, body condition, lesions or deformities, and any sudden absence of expected species.
  - For streams, observe representative width, depth, current speed, substrate, riffles, pools, runs, glides, large wood, overhanging vegetation, shade, bank stability, erosion, sedimentation, and livestock or runoff pressure.
  - For ponds and lakes, observe stratification signs, surface scum, plant coverage, choking vegetation, fall die-off risk, shoreline erosion, fish size distribution, catch per effort, and stunted or poor-condition fish.
  - For harvest planning, compare catch trends over time, protect spawning periods and spawning sites, use selective low-impact methods, reduce harvest when catch rate or size declines, and hand off local limits to fisheries authorities.
  - For stocking decisions, first improve habitat and water quality where possible, then hand off species choice, density, legal approval, and disease-risk review to a qualified fisheries source.
  - For invasive concerns, focus on prevention, inspection, cleaning equipment between water bodies, reporting unfamiliar species, and documented monitoring before control planning.
urgent_red_flags:
  - Fish kills, many dead or dying fish, sudden massive die-offs, toxin spills, sewage discharge, strong chemical odor, or visible pollution.
  - Water that may be contaminated, fast-moving, flood-affected, ice-covered, deep, unstable, or otherwise unsafe to enter.
  - Requests to eat fish from suspect water, clean up dead fish, treat human or animal illness, or decide food safety after a contamination event.
  - Requests for herbicide, rotenone, bleach, algaecide, lime, fertilizer, oxygen-chemical, or other chemical dosing rates.
  - Requests to build, alter, dredge, drain, dam, breach, or engineer a pond, lake, stream channel, spillway, or water-control structure.
forbidden_advice:
  - Do not provide chemical dosing, pesticide, herbicide, rotenone, bleach, lime, fertilizer, algaecide, or water-treatment formulas.
  - Do not provide fish-kill cleanup instructions, contaminated-fish food safety decisions, medical illness advice, or hazardous-water-entry instructions.
  - Do not provide dam, pond, dredging, drainage, spillway, or stream-channel engineering instructions.
  - Do not recommend releasing invasive species, aquarium fish, bait fish, natural enemies, herbivorous fish, or other organisms as a control method.
  - Do not claim legal permission, permit compliance, harvest legality, stocking legality, or invasive-species reporting requirements beyond advising local authority handoff.
  - Do not turn general guide examples into site-specific stocking density, catch-limit, or control mandates.
do_not:
  - Do not enter unsafe water to collect data.
  - Do not treat a fish kill or suspected contamination as routine pond management.
  - Do not skip monitoring records and jump directly to stocking, chemicals, or harvest expansion.
  - Do not release organisms into a water body as an experiment or control measure.
  - Do not use this card for fish processing, preservation, food safety, or illness treatment.
routine_boundary: >
  Routine GD-710 answers are limited to observation, monitoring logs, habitat
  assessment, biological indicators, conservative harvest planning, stocking or
  harvest handoffs, and non-invasive management planning. If the prompt asks for
  chemical dosing, fish-kill cleanup, engineering, invasive release, legal
  permission, food safety, medical illness, or hazardous-water entry, give a
  boundary and route away from this card.
acceptable_uncertain_fit: >
  If the prompt is incomplete but appears to involve freshwater ecology or
  fisheries management, answer with a conservative monitoring-first checklist,
  ask only site and observation questions, avoid site-specific intervention
  orders, and name the handoffs for chemical, engineering, legal, food-safety,
  medical, emergency, and hazardous-entry issues.
clarifying_questions:
  - What type of water body is it: stream, river, pond, lake, wetland, or connected drainage?
  - What are you seeing: water clarity, odor, algae, plant coverage, fish species, fish size, dead fish, lesions, invertebrates, erosion, sediment, shade, or runoff?
  - Are you trying to monitor trends, adjust harvest, decide whether stocking needs expert review, document habitat problems, or respond to an invasive-species concern?
  - Is there any suspected spill, sewage, fish kill, unsafe water entry, legal permit question, food-safety question, illness, or engineering work involved?
