source_invariants:
  - name: emergency dental routing owns urgent pain swelling trauma and poisoning boundary
    guide: GD-047
    must_include:
      - Start here when the complaint is urgent first
      - Do not route routine hygiene complaints here just because they mention gums or teeth.
      - Do not route cleaner ingestion, unknown pill ingestion, or mixed-cleaner fume complaints here just because they mention the mouth, drooling, or burning.
  - name: infection airway and fever red flags require handoff
    guide: GD-047
    must_include:
      - with spreading facial swelling indicates possible systemic infection.
      - Difficulty swallowing (dysphagia) or drooling (suggests airway compromise)
      - Stridor or voice changes (airway obstruction)
      - Swelling extends to floor of mouth or neck
  - name: conservative broken tooth and handoff details are source backed
    guide: GD-047
    must_include:
      - Cover sharp edge with temporary cement or wax; avoid that side when chewing.
      - "Document: tooth number, reason for extraction, anesthetic used, bleeding control, complications, antibiotics given, date."
      - Seek professional care as soon as possible for X-rays and proper fixation
