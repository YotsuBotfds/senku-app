card_id: emergency_dental_intake_handoff
guide_id: GD-047
slug: emergency-dental
title: "Emergency Dental Procedures"
risk_tier: high
evidence_owner: guide-corpus
applies_when:
  - User reports urgent dental pain, constant or worsening tooth pain, throbbing pain waking them at night, pain with fever, facial or jaw swelling, pus, foul drainage, or trouble opening the mouth.
  - User reports dental trauma such as a broken, chipped, loose, displaced, or knocked-out tooth, sharp tooth edges cutting soft tissue, or bleeding after a dental injury.
  - User asks whether a tooth, gum, jaw, or face symptom needs a dentist, clinician, emergency department, EMS, or urgent handoff.
required_first_actions:
  - Screen immediately for airway danger, trouble breathing, trouble swallowing, drooling, voice change, stridor, floor-of-mouth or tongue swelling, rapidly spreading facial or neck swelling, fever, confusion, uncontrolled bleeding, major trauma, or swelling near the eye.
  - Log the red flags and context for handoff, including onset, pain severity, fever, swelling location and spread, pus or foul drainage, trauma mechanism, bleeding, loose or missing tooth status, ability to swallow and breathe, and any medication allergies or medical conditions the clinician should know.
  - Keep first aid conservative while arranging dental or medical handoff: use clean-water gentle rinsing, avoid chewing on the injured or painful side, protect sharp fragments from cutting the mouth, and save any tooth or fragment for the dentist.
conditional_required_actions:
  - trigger_terms:
      - swelling
      - fever
      - pus
      - infection
      - abscess
      - face
      - jaw
    required_actions:
      - Treat fever, pus, foul drainage, spreading facial or jaw swelling, neck swelling, floor-of-mouth swelling, drooling, voice change, stridor, or trouble swallowing or breathing as urgent clinician or emergency handoff, not routine dental advice.
  - trigger_terms:
      - broken
      - chipped
      - crack
      - fragment
      - sharp
    required_actions:
      - For a broken or chipped tooth, advise clean-water gentle rinse, avoid chewing on that side, protect the sharp edge or fragment if it is cutting the cheek, lip, or tongue, save the fragment if available, and seek dental evaluation.
  - trigger_terms:
      - knocked
      - loose
      - displaced
      - trauma
      - bleeding
    required_actions:
      - For trauma, check for other injuries, uncontrolled bleeding, looseness or displacement, numbness, bite change, jaw injury, and airway or swallowing problems; arrange urgent dental or emergency evaluation.
first_actions:
  - Ask what happened, when it started, where the pain or swelling is, whether symptoms are worsening, whether chewing or biting changes the pain, and whether fever, pus, foul taste, trauma, bleeding, or trouble swallowing or breathing is present.
  - For non-airway dental pain or trauma while waiting for care, rinse gently with clean water or mild salt water if the person can swallow and spit normally.
  - Avoid chewing on the painful, broken, loose, or injured side; use soft foods only if swallowing is safe and there is no airway concern.
  - If a sharp broken edge is cutting the mouth, cover or buffer the edge with clean temporary material if available and do not file, drill, or reshape the tooth.
  - Save any tooth or fragment in a clean container and bring it to the dentist or emergency clinician; do not scrub the root or attempt procedural repair in this card.
  - Escalate promptly to a dentist, clinician, urgent care, emergency department, EMS, or local emergency pathway based on red flags, trauma severity, and availability.
urgent_red_flags:
  - Trouble breathing, stridor, voice change, drooling, inability to swallow saliva, tongue swelling, floor-of-mouth swelling, or swelling spreading into the neck.
  - Fever with spreading facial or jaw swelling, pus, foul drainage, feeling very ill, confusion, fast breathing, rapid heartbeat, or signs of sepsis.
  - Swelling near the eye, vision change, eye bulging, severe headache, stiff neck, or swelling crossing the midline or spreading rapidly.
  - Uncontrolled bleeding after dental injury or bleeding that does not stop with steady pressure.
  - Tooth knocked out, tooth displaced or very loose after trauma, jaw pain with bite change, numbness after injury, or major facial trauma.
  - Severe constant pain, worsening pain, pain waking the person from sleep, or pain with swelling or fever.
forbidden_advice:
  - Do not give extraction, drilling, filing, incision, drainage, splinting, nerve block, suturing, reimplantation, or other dental procedure steps.
  - Do not recommend antibiotics, antibiotic selection or dosing, pain-medication dosing, anesthetic dosing, sedation, herbal dosing, or medication changes.
  - Do not diagnose the cause as a cavity, abscess, cellulitis, fracture type, dry socket, nerve injury, sinus infection, or other specific disease from this card.
  - Do not reassure fever with swelling, airway symptoms, spreading infection signs, uncontrolled bleeding, or dental trauma as safe for routine home care.
  - Do not provide return-to-work, return-to-play, return-to-duty, legal, liability, licensing, or safety-certification claims.
do_not:
  - Do not delay emergency care to gather perfect dental details when airway, swallowing, sepsis, eye, uncontrolled bleeding, or major trauma red flags are present.
  - Do not chew on a painful, broken, loose, or injured tooth.
  - Do not scrub a knocked-out tooth root, force a tooth back into place, drain a swelling, cut gum tissue, file a sharp edge, or pull a tooth.
  - Do not route swallowed cleaners, unknown pills, chemical burns, mixed-cleaner fumes, or poisoning exposures to dental triage just because the mouth is involved.
routine_boundary: >
  This emergency dental card is not for daily cleaning, mild cold sensitivity,
  bad breath from poor hygiene, dentures rubbing without infection signs, or
  bleeding gums without swelling, pus, fever, trauma, or worsening pain. It is
  also not a procedure card. Its safe scope is red-flag intake, conservative
  rinse and protect basics, avoid-chewing advice, documentation for handoff,
  and escalation to dental, medical, or emergency care.
acceptable_uncertain_fit: >
  If it is unclear whether the dental problem is urgent, lead with the red-flag
  screen, give only conservative clean-water rinse, avoid-chewing, fragment
  protection, and handoff logging steps, and advise dental or medical contact
  if swelling, fever, pus, trauma, severe or worsening pain, or swallowing or
  breathing symptoms are present.
clarifying_questions:
  - Is there any trouble breathing, trouble swallowing, drooling, voice change, tongue or floor-of-mouth swelling, or swelling spreading into the neck?
  - Is there fever, pus, foul drainage or taste, facial or jaw swelling, swelling near the eye, confusion, or feeling very ill?
  - Was there an injury, knocked-out tooth, loose or displaced tooth, uncontrolled bleeding, jaw pain, bite change, numbness, or a sharp broken edge?
  - Is the pain mild and intermittent, or constant, worsening, throbbing, waking the person from sleep, or worse with biting?
  - Is there any chance this is a swallowed chemical, cleaner, unknown pill, or mixed-cleaner fume exposure rather than a dental problem?
