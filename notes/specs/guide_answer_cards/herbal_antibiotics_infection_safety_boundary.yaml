notes: >
  Boundary-only reviewed answer card for GD-040 metadata/card audit closure.
  It intentionally limits the reviewed surface to infection concern intake,
  herbal/self-treatment risk warnings, severe infection and vulnerable-person
  red flags, product/source/label logs, stop-self-treatment language, and
  clinician, emergency, Poison Control, or veterinary routing. It excludes
  antibiotic claims, herbal regimens, dosing, preparation, diagnosis, wound
  procedures, medication substitution, delay-care reassurance, legal claims, and
  safety certification.
