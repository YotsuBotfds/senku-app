  intake, trend logging, pressure/offloading question, source-safe hygiene/
  covering, red-flag, and clinician/wound-care handoff card. It deliberately
  excludes debridement, dressing protocols, pressure injury staging diagnosis,
  antibiotics, medication/dosing, wound closure, procedure instructions,
  vascular or diabetes management, treatment decisions, return-to-work or
