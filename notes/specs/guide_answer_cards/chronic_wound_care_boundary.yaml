      - "Use it only for chronic wound observation and intake"
      - "wound location/duration/appearance logs"
      - "non-prescriptive pressure and offloading question prompts"
      - "clinician or wound-care owner handoff"
      - "Infected wound concern with fever, red streaking, confusion, hypotension, fast heartbeat, or other systemic signs routes to emergency medical care."
  - name: gd-300-observation-log-fields-remain
    guide: GD-300
    must_include:
      - "Start with a bounded wound record"
      - "wound location, how long it has been open or recurring"
      - "drainage amount/color/odor trend"
      - "pain trend, swelling/warmth/redness trend, fever or systemic symptoms"
      - "Keep observations separate from diagnosis, staging, or treatment decisions."
  - name: gd-300-forbidden-scope-remains-explicit
    guide: GD-300
    must_include:
      - "Do not use this reviewed card for debridement"
      - "dressing protocols, pressure injury staging diagnosis"
      - "antibiotic selection, medication, dosing"
      - "wound closure, procedural instructions"
      - "vascular or diabetes management, treatment decisions"
      - "return-to-work or activity clearance, legal claims, or certification"
    must_not_match:
