notes: >
  Reviewed boundary-only card for GD-351 metadata/card audit closure. It is a
  dental intake and owner-routing card only: classify pain, swelling, trauma,
  hygiene, restoration, prosthetic, orthodontic, and oral-anatomy concerns;
  collect symptom/location logs; screen red flags; and route to existing dental
  owner cards, dentist, clinician, emergency dental, EMS, emergency department,
  or local emergency pathway. It excludes diagnosis, extraction, drilling,
  filling, incision, drainage, splinting, reimplantation, anesthetic/procedure
  steps, antibiotics, pain-medication dosing, appliance fabrication or repair,
  return-to-chewing or work clearance, legal claims, and safety certification.
  READY_FOR_PARENT_CLOSE.
