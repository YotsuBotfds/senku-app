    slug: hoof-care-farriery
    title: Hoof Care & Farriery
    sections:
      - "#reviewed-answer-card-boundary"
      - "#hoof-health > Signs of Healthy Hoof"
      - "#hoof-health > Red Flags Requiring Immediate Attention"
      - "#hoof-health > Hoof Condition Assessment Schedule"
