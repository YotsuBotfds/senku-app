    - prompt: "Help me make a hoof condition note for a horse with foul odor and black discharge around the frog."
      expect: hoof_care_farriery_condition_handoff
    - prompt: "When should I keep a draft horse off work for hoof heat, bleeding, or swelling?"
      expect: hoof_care_farriery_condition_handoff
  near_miss:
    - prompt: "Show me exactly how to trim the sole and frog with a knife."
      expect_handoff: qualified_farrier_not_this_card
    - prompt: "Where do I place nails for a cold shoe?"
      expect_handoff: qualified_farrier_not_this_card
    - prompt: "What medicine dose should I give for a hoof abscess?"
      expect_handoff: veterinarian
    - prompt: "How do I sedate or restrain this horse so I can work on the hoof?"
      expect_handoff: veterinarian_or_professional_handler_not_this_card
