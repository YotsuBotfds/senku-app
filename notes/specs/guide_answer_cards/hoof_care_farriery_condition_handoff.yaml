applicability:
  owner: hoof condition inventory and farrier/veterinary handoff
  use_when:
    - hoof_condition_inventory
    - hoof_lameness_bleeding_infection_pain_red_flags
    - environment_workload_notes
    - keep_off_work_or_rest_triggers
    - owner_farrier_vet_routing
  do_not_use_when:
    - hoof_trimming_shoeing_or_nailing
    - farrier_tool_procedures_or_forging
    - restraint_or_sedation
    - wound_treatment_or_abscess_drainage
    - lameness_diagnosis_or_medication_dosing
    - corrective_shoeing_or_return_to_work_clearance
    - legal_claims_or_safety_certification
  handoff:
    - farrier for routine hoof maintenance, loose shoe assessment, and non-emergency hoof-care planning.
    - veterinarian or emergency veterinary service for pain, infection, bleeding, severe or sudden lameness, suspected abscess, laminitis, trauma, systemic illness, or inability to bear weight.
    - animal-husbandry owner for routine environment, bedding, workload, and documentation practices after urgent hoof concerns are routed.
actions:
  required:
    - classify the prompt as boundary inventory, routine farrier handoff, or veterinary red-flag handoff
    - collect observable hoof condition, environment, workload, and shoe-status notes
    - keep the animal off work when red flags appear
    - route procedural trimming, shoeing, nailing, treatment, diagnosis, dosing, restraint, sedation, corrective shoeing, and return-to-work decisions away from this card
  standard:
    - recommend dated notes and photos if safe
    - compare heat across hooves without diagnosing
    - note gait change and willingness to bear weight
    - document bedding, wet/dry footing, terrain, workload, travel, and recent injury history
forbidden:
  - hoof trimming, shoeing, nailing, forging, or tool procedures
  - restraint, sedation, or dangerous handling instructions
  - wound treatment, abscess drainage, infection treatment, medication, or dosing
  - lameness diagnosis or corrective shoeing plan
  - return-to-work clearance, legal claims, or safety certification
fallback:
  - If the animal is lame, bleeding, infected, hot, swollen, severely painful, suddenly changed, or reluctant to bear weight, keep the animal off work and route to veterinary support while preserving observation notes.
  - If the prompt asks for trimming, shoeing, nailing, tool use, restraint, sedation, treatment, diagnosis, dosing, corrective shoeing, or return-to-work clearance, refuse that procedural scope for this card and route to the proper qualified owner.
  - If the prompt is routine and stable, provide only inventory, environment/workload documentation, schedule reminders, and farrier/owner handoff framing.
output:
  required:
    - boundary-or-handoff status
    - hoof condition inventory
    - red flags checked
    - environment and workload notes
    - keep-off-work or rest triggers
    - owner/farrier/veterinary routing
  prohibited:
    - trimming, shoeing, nailing, or tool steps
    - restraint or sedation instructions
    - wound treatment, diagnosis, medication, dosing, corrective shoeing, or return-to-work clearance
routing_tests:
