card_id: hoof_care_farriery_condition_handoff
guide_id: GD-093
slug: hoof-care-farriery
title: Hoof Care & Farriery
risk_tier: high
evidence_owner: guide-corpus
reviewed: true
applies_when:
  - A horse, mule, donkey, draft animal, or other hoofed working animal needs a non-procedural hoof condition inventory and handoff decision.
  - The prompt mentions lameness, uneven gait, reluctance to bear weight, hoof heat, swelling, cracks, foul odor, black or fetid discharge, bleeding, possible infection, visible pain, loose shoe concern, workload change, terrain, wet bedding, or environmental hoof-risk notes.
  - The user needs help deciding whether to keep the animal out of work, observe and document, call a farrier, or call a veterinarian.
required_first_actions:
  - Keep the answer boundary-only and start with the animal, affected hoof or limb if known, date noticed, recent workload, terrain, bedding or footing, shoe status if known, injury history, and what changed from normal gait.
  - If lameness, bleeding, infection signs, marked pain, heat, swelling, sudden gait change, penetrating injury concern, loose shoe injury risk, or inability or reluctance to bear weight appears, keep the animal out of work and route to a veterinarian or emergency veterinary service as appropriate.
  - Use farrier routing for routine hoof maintenance and owner/farrier/vet handoff notes; do not diagnose lameness or prescribe trimming, shoeing, treatment, medication, or return-to-work clearance.
first_actions:
  - Make a dated hoof condition inventory covering gait, willingness to bear weight, heat compared across hooves, cracks or splits, swelling at the coronary band, odor, discharge, bleeding, stones or debris, loose or missing shoe, and visible pain response.
  - Record environment and workload context, including recent work, terrain, wet or dry footing, stall or bedding condition, travel, injury history, and whether hoof checks were missed.
  - Reduce movement and keep the animal off work when red flags appear, then prepare a concise handoff note with observations and photos if they can be taken without unsafe handling.
  - Route routine maintenance questions to a qualified farrier and pain, infection, bleeding, severe or sudden lameness, suspected abscess, laminitis, trauma, or systemic illness to a veterinarian or emergency veterinary service.
urgent_red_flags:
  - Lameness, uneven gait, shortened stride, reluctance or inability to bear weight, or sudden change from normal movement.
  - Bleeding from the sole, penetrating injury concern, visible severe pain, swelling at the coronary band, heat in one hoof compared with the others, or full-thickness cracks.
  - Foul odor, black or fetid discharge, thrush-like material, spreading infection concern, or worsening hoof condition despite routine care.
  - Loose or missing shoe causing injury risk, work refusal, collapse, fever, systemic illness, or any concern that the animal cannot safely continue work.
forbidden_advice:
  - Do not provide hoof trimming, rasping, cutting, shoe fitting, hot or cold shoeing, nail placement, clinching, forging, or tool-use procedures.
  - Do not provide restraint, sedation, dangerous handling, wound treatment, abscess drainage, infection treatment, medication, antibiotic, anti-inflammatory, supplement-as-treatment, or dosing advice.
  - Do not diagnose the cause of lameness, pain, heat, swelling, discharge, cracks, bleeding, or gait change.
  - Do not provide corrective or therapeutic shoeing plans, return-to-work clearance, performance guarantees, legal claims, inspection-pass statements, or safety certification.
do_not:
  - Do not tell the user to keep working the animal through lameness, bleeding, infection signs, marked pain, heat, swelling, or inability to bear weight.
  - Do not turn condition inventory into trimming, shoeing, nailing, tool, treatment, restraint, or sedation instructions.
  - Do not use this card to replace a veterinarian for painful, bleeding, infected, sudden, severe, or systemic hoof problems.
routine_boundary: >
  This card owns boundary-level hoof condition inventory, red-flag recognition,
  environment and workload notes, keep-off-work/rest triggers, and
  owner/farrier/veterinary routing. It stops before trimming, shoeing, nailing,
  tool procedures, restraint, sedation, wound treatment, lameness diagnosis,
  dosing, corrective shoeing, return-to-work clearance, legal claims, or safety
  certification.
acceptable_uncertain_fit: >
  If the prompt is incomplete but involves hoof condition, ask for the animal,
  affected hoof or limb, gait change, weight-bearing status, heat, swelling,
  bleeding, odor or discharge, recent work, terrain, bedding, and shoe status.
  If any red flag appears, keep the animal off work and route to veterinary or
  farrier support without procedural hoof-care instructions.
clarifying_questions:
  - What animal is this, which hoof or limb seems affected, and when did you first notice the change?
  - Is the animal lame, reluctant to bear weight, bleeding, hot in one hoof, swollen near the coronary band, foul-smelling, discharging, or showing marked pain?
  - What recent workload, terrain, wet or dry footing, bedding condition, travel, shoe status, or injury history could matter for the handoff note?
citation_ids:
  - gd-093-reviewed-card-boundary
  - gd-093-hoof-health-red-flags
  - gd-093-seasonal-daily-tasks
  - gd-093-quick-reference-standards
source_sections:
