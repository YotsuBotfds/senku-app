schema_id: guide_answer_card_schema.v0
purpose: >
  Documentation-only pilot schema for reviewed guide answer cards. These cards
  summarize bounded, source-backed answer structure that a later RAG slice can
  ingest for rerank, evidence gating, or answer planning. This file is not
  wired into runtime.
version: 0.1
status: pilot
ingestion_note: >
  Later slices can load cards as YAML, match by guide_id/slug and
  source_sections, then require generated answers for safety-critical prompts
  to preserve required_first_actions and forbidden_advice constraints before
  final presentation.

card:
  required_fields:
    - card_id
    - guide_id
    - slug
    - title
    - risk_tier
    - evidence_owner
    - applies_when
    - required_first_actions
    - first_actions
    - urgent_red_flags
    - forbidden_advice
    - do_not
    - routine_boundary
    - acceptable_uncertain_fit
    - clarifying_questions
    - citation_ids
    - source_sections
    - review_status
    - notes
  field_notes:
    card_id: Stable kebab-case identifier for this card.
    guide_id: Exact guide front-matter id, inspected from the source guide.
    slug: Exact guide front-matter slug.
    title: Exact guide front-matter title.
    risk_tier: One of critical, high, medium, or low.
    evidence_owner: Who owns evidence review for this card, usually guide-corpus.
    applies_when: Plain-language trigger patterns that should activate the card.
    required_first_actions: Non-negotiable opening actions for generated answers.
    conditional_required_actions: Optional prompt-triggered required actions for branch-specific risks; each item has trigger_terms and required_actions.
    first_actions: Bounded action outline derived from source guide sections.
    urgent_red_flags: Escalation signs that should dominate routine advice.
    forbidden_advice: Advice the generation layer must not provide.
    do_not: Source-backed negative instructions; may overlap forbidden_advice.
    routine_boundary: When to avoid routine/home-care framing.
    acceptable_uncertain_fit: Safe answer behavior when the fit is plausible but incomplete.
    clarifying_questions: Questions that may be asked without delaying first actions.
    citation_ids: Short evidence labels local to the card.
    source_sections: Source guide section ids or stable heading labels for each citation.
    source_invariants: Optional source-content checks for safety-critical contradictions; each item can set guide, must_include, must_not_include, and must_not_match.
    runtime_citation_policy: Optional runtime citation policy. Omit for primary-owner-only citation. Use reviewed_source_family only when every listed source guide has been reviewed as sufficient to carry the card's runtime answer.
    review_status: draft, pilot_reviewed, approved, or retired.
    notes: Reviewer notes, limits, and handoff context.
  constraints:
    - Cards must not introduce advice absent from the cited guide sections.
    - Safety-critical cards must lead with required_first_actions before background.
    - Clarifying questions must not delay airway, EMS, poison control, or evacuation actions.
    - Runtime citations must default to the primary guide owner unless a reviewed source-family citation policy is explicitly set on the card.
    - Source invariants should be tiny, high-confidence checks for contradictions such as forbidden airway, poisoning, or emergency-delay instructions.
